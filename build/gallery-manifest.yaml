- id: SVG-027
  name: substrate-parallel
  status: planned
  source: pending
  category: Genesis Illustrations
  chapter: genesis
  marker: "the threshold was crossed."
  sequence_group: genesis-argument
  sequence_order: 3
  description: >
    Side-by-side comparison. Left panel: beaker of organic molecules
    with catalytic arrows between them (warm colors). Right panel:
    2DEG substrate with anyonic quasiparticles and braiding arcs
    (blue colors). Center bridge: "same mathematics" with Kauffman's
    threshold equation hint. Shows the chapter's key intellectual
    move: what works in chemistry works in quantum substrates.
  notes: "Hardest of the four to execute well. Must be visually clear that both sides are governed by the same principle without being reductive. Jane needs to grasp 'same math, different stuff.' Rachel needs to see the specific parallel."

- id: SVG-028
  name: canopy-problem
  status: planned
  source: pending
  category: Genesis Illustrations
  chapter: genesis
  marker: "the ecological niche is full."
  description: >
    Forest canopy cross-section. Tall established trees with full
    green crowns blocking sunlight. Below: a small seedling in shadow,
    reaching upward but receiving no light. Sun rays hit only the
    canopy. Simple, dark implication lands without text. The visual
    metaphor for first-mover advantage in any substrate.
  notes: "Emotionally the darkest image in the chapter. The seedling is not attacked — it simply never gets the light. This is the visual that carries the canopy argument."
