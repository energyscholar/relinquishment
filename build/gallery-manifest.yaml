# SVG Gallery Manifest — source of truth for all book illustrations
# Consumed by build/generate-gallery.py to produce docs/gallery.html
#
# status values:
#   live      — exists and deployed in the book
#   hover     — exists in hover-definitions.yaml (popup only, not inline)
#   planned   — designed but not yet built
#   deferred  — considered and postponed (reason in notes)
#
# Each entry needs: id, name, status, source, category
# Optional: terms (hover triggers), chapter, marker (insertion point),
#           description, notes, sequence_group, sequence_order

