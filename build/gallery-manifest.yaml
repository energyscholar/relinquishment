- id: SVG-025
  name: autocatalytic-loop
  status: planned
  source: pending
  category: Genesis Illustrations
  chapter: genesis
  marker: "The whole network sustains itself."
  description: >
    Circular arrow diagram: three molecules (A, B, C) in a cycle.
    A catalyzes B, B catalyzes C, C catalyzes A. Arrows form a
    self-sustaining loop. Shows what autocatalysis LOOKS like —
    the chemistry version of what the filmstrip just showed
    physically. Simple, iconic, p1-readable.
  notes: "Placement: after 'The whole network sustains itself.' — right after the filmstrip lands the physical metaphor, this shows the chemical reality."

