collisionless plasma: "Plasma so thin that particles rarely collide directly. Mean free path exceeds a million meters. Thermal equilibrium arguments fail — 'hot' is not 'thermally coupled.' Different physics from ordinary gases. The magnetosphere is collisionless."

Parable of the Tribes: "Andrew Bard Schmookler's insight: among competing groups, one aggressor forces all others to arm, flee, or die. No group can unilaterally choose peace. Power is a one-way ratchet. Applies to technology races."

information asymmetry: "One party knows what the other doesn't. In game theory, the party with more information has a decisive strategic advantage. Extreme form: total surveillance without the target's knowledge."

gain-of-function research: "Deliberately engineering pathogens to be more transmissible or virulent — to study them, to prepare defenses, or both. The biology version of dual use. Classified as Dual-Use Research of Concern (DURC)."

directed evolution: "Frances Arnold's Nobel Prize technique (2018). Artificial selection applied to molecules — iterative rounds of mutation and screening find configurations that no rational design could specify. NK fitness landscapes explain why it works."

morphogenesis: "How biological form arises from a uniform starting point. Turing's last paper (1952): chemical gradients can spontaneously generate spatial patterns. A brain is not assembled — it precipitates."

reaction-diffusion: "Turing's mathematical model for pattern formation (1952). Two chemicals — an activator and an inhibitor — diffusing at different rates spontaneously produce stripes, spots, and spirals from uniform initial conditions."

quasiparticle: "Not a real particle — a collective excitation of many particles that behaves as if it were one. Phonons (sound), holes (missing electrons), anyons (2D braiding). The anyon is the quasiparticle that makes topological computation possible."

Great Filter: "Why don't we see aliens? Something kills technological civilizations before they can spread. Whether the filter is behind us (we got lucky) or ahead (we haven't hit it yet) is the question. Hanson (1998)."

Enigma: "German cipher machine used in WWII. Broken by Alan Turing and the team at Bletchley Park. The effort to break it produced Colossus — the world's first programmable electronic computer. The secret was kept for 35 years."

poised realm: "Kauffman's concept: systems at the quantum-classical boundary, poised at the edge of chaos, may sustain quantum coherence longer than bulk matter. Power-law rather than exponential decoherence. A theoretical bridge to room-temperature quantum effects."

# --- Tier 2 LOWER PRIORITY (selective — high-value terms only) ---

braid group: "The mathematical group describing how strands can cross over and under each other. The algebra behind anyon computation — each crossing is an operation, and the sequence of crossings encodes the computation."

# Reserved: only appears in appendix (firmware-update.tex). No body-chapter placement available.
topological insulator: "A material that is insulating inside but conducting on its surface. The surface states are topologically protected — they work at room temperature. Demonstrates that topological protection survives thermal noise."

# Reserved: only appears in appendix (firmware-update.tex). No body-chapter placement available.
graphene: "A single atom-thick layer of carbon arranged in a hexagonal lattice. A natural two-dimensional electron gas. The material where FQHE was demonstrated outside GaAs — proving substrate independence (Anchor 1)."

# Reserved: only appears in appendix (firmware-update.tex). No body-chapter placement available.
no-cloning theorem: "You cannot copy an unknown quantum state. Wootters & Zurek (1982). Fundamental limit — but it forbids copying unknowns, not fabricating known classical structures. Narrower than it sounds. Protects quantum cryptography."

# --- Stack chart interactive popups (bypass first-occurrence system) ---
# Keyed by stack-* prefix. Consumed by preprocess.py Stack chart post-processor.
# p1 text → p2-level definitions. Concrete examples, 8th-grade reading level.

# Row definitions (emergent properties)
stack-feeds-itself: "Sustains its own operation from available energy. Fire consumes fuel. Cells metabolize. The simplest requirement — without it, nothing persists."
stack-switches-on: "Converts energy from one form to another at a threshold. Below a certain temperature, nothing happens; above it, combustion begins. Every technology on this list is a transducer."
stack-holds-together: "Maintains structural integrity against entropy. A candle's wax column, an ant colony's nest architecture, a network's routing tables. Something keeps the parts organized."
stack-reaches: "Transmits information or influence across distance. Radio waves cross oceans. Ant pheromone trails guide foragers to food. The internet routes packets across continents."
stack-self-organizes: "Builds and maintains complex structure without external direction. No blueprint, no architect. Ant colonies, neural networks, market economies — order emerges from local rules."
stack-learns: "Changes behavior based on experience. Modifies its own operation in response to outcomes. Only AI and the unnamed technology do this among the technologies listed."
stack-wormholes: "Topological connections between distant points in a material. Not science fiction — condensed matter physics. The 2016 Nobel Prize was awarded for the theory. Only the unnamed technology has this property."

# Column definitions (technologies)
stack-fire: "Humanity's first technology. Feeds itself on fuel, switches energy forms. But it doesn't hold a shape, reach across distance, organize itself, learn, or connect distant points. Two properties."
stack-candle: "Fire plus structure. The wick and wax hold together — someone engineered sustained, portable combustion. Still doesn't reach, self-organize, learn, or connect. Three properties."
stack-radio: "Energy that reaches across distance. Electromagnetic waves carry information without wires. But a radio doesn't organize itself, doesn't learn, doesn't form topological connections. Four properties."
stack-ants: "E.O. Wilson's superorganism. No individual ant understands the colony, yet the colony solves problems no ant could. Self-organization from local chemical rules. Five properties."
stack-internet: "A self-organizing network that reaches globally and holds together through redundant routing. It doesn't learn on its own — it routes, it doesn't adapt. Five properties."
stack-ai: "The first human technology that learns. Changes its own behavior based on experience. Six properties out of seven. Missing only one — the one at the top of the stack."
stack-question-mark: "This technology stack currently has no name in any human language. It has all seven properties, including the one no other technology possesses. Later, this book will call it the Flat."
