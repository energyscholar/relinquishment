.0" stroke-dasharray="4,3" opacity="0.5"/><path d="M200,80 C210,50 240,50 250,80" fill="none" stroke="#2471a3" stroke-width="1.8" stroke-dasharray="4,3" opacity="0.8"/><path d="M110,80 C130,40 220,35 250,80" fill="none" stroke="#2471a3" stroke-width="0.6" stroke-dasharray="4,3" opacity="0.3"/><circle cx="60" cy="80" r="6" fill="#e8f0f8" stroke="#2471a3" stroke-width="1.5" opacity="0.9"/><circle cx="110" cy="80" r="5" fill="#e8f0f8" stroke="#2471a3" stroke-width="1.5" opacity="0.5"/><circle cx="140" cy="80" r="7" fill="#e8f0f8" stroke="#1a5276" stroke-width="2" opacity="1.0"/><circle cx="200" cy="80" r="7" fill="#e8f0f8" stroke="#1a5276" stroke-width="2" opacity="1.0"/><circle cx="250" cy="80" r="5.5" fill="#e8f0f8" stroke="#2471a3" stroke-width="1.5" opacity="0.7"/><circle cx="60" cy="80" r="3" fill="#2471a3" opacity="0.6"/><circle cx="110" cy="80" r="2" fill="#2471a3" opacity="0.3"/><circle cx="140" cy="80" r="3.5" fill="#1a5276" opacity="0.8"/><circle cx="200" cy="80" r="3.5" fill="#1a5276" opacity="0.8"/><circle cx="250" cy="80" r="2.5" fill="#2471a3" opacity="0.5"/><text x="60" y="105" text-anchor="middle" font-size="7" fill="#888" font-family="sans-serif">anyon</text><text x="140" y="105" text-anchor="middle" font-size="7" fill="#888" font-family="sans-serif">anyon</text><text x="200" y="105" text-anchor="middle" font-size="7" fill="#888" font-family="sans-serif">anyon</text><text x="250" y="105" text-anchor="middle" font-size="7" fill="#888" font-family="sans-serif">anyon</text><text x="155" y="30" text-anchor="middle" font-size="8" fill="#2471a3" font-family="serif" font-style="italic">wormhole connections</text><text x="155" y="42" text-anchor="middle" font-size="7" fill="#888" font-family="serif" font-style="italic">line thickness = entanglement strength = weight</text><text x="155" y="155" text-anchor="middle" font-size="8" fill="#666" font-family="serif">a nervous system wired by topology</text></svg>

