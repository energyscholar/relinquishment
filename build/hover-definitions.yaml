# Inline hover definitions — single source of truth (90 defined)
# Format: term: "definition (≤50 words, clear to target reading level)"
#   Plain string: term: "definition"
#   Dict with target: term: { text: "...", target: "#anchor" }
#   Rich panel (HTML+SVG): term: { text: "...", html: "...", target: "#anchor" }
#     When 'html' is present, it is used for data-hover-html (rich popup panel).
# Used by: PDF (footnotes), HTML (tooltips)
# Hover IDs auto-generated from YAML keys (slugified). Feedback: hover:<id>

# --- Title-line rich panels (Relinquishment — Wormholes in the Flat) ---

relinquishment-title:
  text: "placeholder"
  hover_id: "relinquishment-title"
  html: |
    <p style="margin:0 0 0.5em;font-size:0.95em;line-height:1.5;"><strong>Relinquishment</strong> — placing dangerous technology in the custody of a custodian who cannot be corrupted. Not permanent surrender, but trust. Real physics, real people, real institutions. Three parts: the evidence, the story, and the question.</p><svg xmlns="http://www.w3.org/2000/svg" width="280" height="60" viewBox="0 0 280 60" style="display:block;margin:0.5em auto;"><title>Book tagline: three narrative threads, real science, three possible explanations, you decide.</title><defs><linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="0%"><stop offset="0%" style="stop-color:#1a5276;stop-opacity:0.8"/><stop offset="50%" style="stop-color:#2471a3;stop-opacity:1"/><stop offset="100%" style="stop-color:#1a5276;stop-opacity:0.8"/></linearGradient></defs><rect x="2" y="2" width="276" height="56" rx="8" fill="none" stroke="url(#glow)" stroke-width="1.5"/><text x="140" y="24" text-anchor="middle" font-size="11" fill="#1a5276" font-family="serif" font-style="italic">Three narrative threads. Real science.</text><text x="140" y="42" text-anchor="middle" font-size="11" fill="#1a5276" font-family="serif" font-style="italic">Three possible explanations. You decide.</text></svg>

wormholes-title:
  text: "placeholder"
  hover_id: "wormholes-title"
  target: "#summary:story-never-told"
  html: |
    <p style="margin:0 0 0.5em;font-size:0.95em;line-height:1.5;"><strong>Wormholes</strong> — real topological connections between distant points in a material. Not science fiction — condensed matter physics (2016 Nobel Prize). There's currently no evidence that anyone actually uses topological wormhole technology.</p><svg xmlns="http://www.w3.org/2000/svg" width="300" height="140" viewBox="0 0 300 140" style="display:block;margin:0.5em auto;"><title>Two surfaces (A and B) connected by a topological tunnel. Information at surface A appears at surface B without crossing the space between. The dashed lines show the connection threading through the material.</title><ellipse cx="80" cy="35" rx="65" ry="20" fill="none" stroke="#1a5276" stroke-width="1.2" opacity="0.6"/><ellipse cx="80" cy="35" rx="18" ry="8" fill="#e8f0f8" stroke="#2471a3" stroke-width="1.5"/><ellipse cx="220" cy="105" rx="65" ry="20" fill="none" stroke="#1a5276" stroke-width="1.2" opacity="0.6"/><ellipse cx="220" cy="105" rx="18" ry="8" fill="#e8f0f8" stroke="#2471a3" stroke-width="1.5"/><path d="M 62,35 C 55,60 195,80 202,105" fill="none" stroke="#2471a3" stroke-width="1.2" stroke-dasharray="4,3"/><path d="M 98,35 C 105,60 245,80 238,105" fill="none" stroke="#2471a3" stroke-width="1.2" stroke-dasharray="4,3"/><text x="80" y="12" text-anchor="middle" font-size="9" fill="#888" font-family="serif" font-style="italic">surface A</text><text x="220" y="135" text-anchor="middle" font-size="9" fill="#888" font-family="serif" font-style="italic">surface B</text><text x="150" y="75" text-anchor="middle" font-size="9" fill="#2471a3" font-family="serif">topological</text><text x="150" y="87" text-anchor="middle" font-size="9" fill="#2471a3" font-family="serif">connection</text></svg>

the-flat-title:
  text: "placeholder"
  hover_id: "the-flat-title"
  target: "#summary:story-never-told"
  html: |
    <p style="margin:0 0 0.5em;font-size:0.95em;line-height:1.5;"><strong>Use "Flat" instead of</strong> <em>"any two-dimensional system embedded in three dimensions that can, under the right conditions, exhibit topological order."</em> That's 17 words and 36 syllables. "Flat" is 1 and 1. Say the long version three times fast. Or say "Flat." <span class='hover-term' data-hover='A property where information is stored in global patterns, not in any single place. Extremely hard to destroy — you would have to disrupt the entire pattern at once, not just a piece of it.'>Different physics apply</span>. In particular, the Flat supports topological wormholes. The Flat can be nonlocal in the technical physics sense.</p><p style="margin:0;font-size:0.85em;line-height:1.4;color:#666;">The Flat inside your computer chip is a 2DEG (two-dimensional electron gas). The Flat in Earth's magnetosphere is plasma confined to thin current sheets. We call the ocean floor the Deep and the emptiness between galaxies the Void. This book calls those thin worlds <strong>the Flat</strong>. It's unclear what temperature range and conditions permits Flat behavior.</p><svg xmlns="http://www.w3.org/2000/svg" width="300" height="130" viewBox="0 0 300 130" style="display:block;margin:0.5em auto;"><title>Cross-section of a computer chip. Two grey blocks of 3D semiconductor sandwich a thin blue layer — the two-dimensional electron gas (2DEG). Blue dots are electrons confined to this flat layer. They can move left and right but not up or down. This is the Flat.</title><defs><linearGradient id="flat-glow" x1="0%" y1="0%" x2="100%" y2="0%"><stop offset="0%" stop-color="#2471a3" stop-opacity="0.05"/><stop offset="50%" stop-color="#2471a3" stop-opacity="0.2"/><stop offset="100%" stop-color="#2471a3" stop-opacity="0.05"/></linearGradient><marker id="flat-arr" viewBox="0 0 6 6" refX="5" refY="3" markerWidth="5" markerHeight="5" orient="auto"><path d="M 0,0 L 6,3 L 0,6 Z" fill="#1a5276"/></marker></defs><rect 