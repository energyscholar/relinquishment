decoherence:
  text: "Loss of quantum behavior due to interaction with the environment. The enemy of quantum computing — random nudges from surroundings scramble quantum states. Topological protection defeats this by storing information in global patterns, not local states."
  target: "#pos09:the-factoring-game"

quantum coherence: "A quantum system maintaining its wave-like behavior — superposition and entanglement intact. Required for quantum computation. Typically fragile, but topological protection and certain substrates can extend it dramatically."

# --- Tier 2 MEDIUM PRIORITY: p3 chapters (popup = peer-reviewed definition) ---

Shor's algorithm: "Quantum algorithm that factors large numbers exponentially faster than any known classical method. Published by Peter Shor in 1994. Breaks RSA encryption. The reason governments care about quantum computing."

lattice gas automata: "Hasslacher's model: simulate fluid dynamics on a discrete grid. Simple collision rules at each node produce complex macroscopic flow. The bridge between discrete computation and continuous physics."

Connection Machine: "Danny Hillis's 1985 massively parallel supercomputer. 65,536 processors working simultaneously. Proved that parallelism could solve problems no serial machine could approach. DARPA-funded."

Chern-Simons theory: "Mathematical framework linking knot theory to quantum field theory. Witten's Fields Medal (1990). Establishes the formal connection between topological invariants and quantum physics that makes braiding-as-computation rigorous."

knot invariant: "A number or polynomial describing a knot that doesn't change when you deform the knot smoothly. If two knots have different invariants, they're truly different. Connects to anyonic braiding — braids are knots in spacetime."

Jones polynomial: "A knot invariant discovered by Vaughan Jones (1984, Fields Medal). Computable by braiding anyons in a topological quantum computer. The mathematical bridge connecting pure topology to physical computation."

MOSFET: "Metal-Oxide-Semiconductor Field-Effect Transistor. The transistor in every computer chip. Contains a two-dimensional electron gas at its oxide interface. Billions per chip. The most manufactured device in human history."

plasma sheet: "Hot charged particles trapped in a thin 2D sheet by Earth's magnetic field. Thousands of kilometers across but thin relative to its extent. The magnetosphere's largest confined two-dimensional structure."

heliospheric current sheet: "The solar system's largest two-dimensional structure — a vast warped surface separating regions of opposing magnetic polarity in the solar wind. Alfvén called it the 'ballerina skirt.' Extends beyond all the planets."

substorm: "Explosive energy release in Earth's magnetotail. Drives auroras. Injects energetic particles into the inner magnetosphere. Part of the magnetosphere's rhythmic energy cycle — loading, then sudden release."

self-organized criticality:
  text: "Systems that naturally evolve to a critical state where avalanches of all sizes occur. Sandpiles. Earthquakes. Forest fires. The magnetosphere. Bak, Tang & Wiesenfeld (1987). No tuning needed — the system tunes itself."
  html: >-
    <p style="margin:0 0 0.5em;font-size:0.95em;line-height:1.5;">
    <strong>Self-organized criticality</strong> — systems naturally evolve to
    a critical state where avalanches of all sizes occur. No tuning needed.
    Bak, Tang &amp; Wiesenfeld (1987).</p>
