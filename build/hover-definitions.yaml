non-abelian anyon: "An anyon whose exchange operations depend on ORDER — A then B is not the same as B then A. This non-commutativity is what makes topological quantum computation possible. The braiding IS the computation."

fractional quantum Hall effect:
  text: "Nobel Prize 1998. Electrons confined to 2D under a strong magnetic field produce quasiparticles with fractional electric charge. Proves anyons exist. The experimental foundation for topological quantum computing."
  target: "#pos10:the-braid"

TQNN:
  text: "Topological Quantum Neural Network — the book's central technology claim. A system combining all eight stack properties: self-sustaining, switching, self-maintaining, reaching, self-organizing, learning, and topological connection."
  target: "#t3:ch01:instantiation"

braiding:
  text: "Moving anyons around each other in 2D. The path IS the computation — information is encoded in how worldlines wind around each other. Like tying knots in spacetime. Topologically protected from errors."
  target: "#pos10:the-braid"
