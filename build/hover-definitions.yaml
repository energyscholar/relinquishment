# Inline hover definitions — single source of truth
# Format: term: "definition (≤40 words, clear to 12th grade reader)"
# Used by: PDF (footnotes), HTML (tooltips)

two-dimensional electron gas: "A thin layer where electrons can only move in two directions — trapped on a sheet. Found inside every computer chip and in Earth's magnetic field. Different physics applies in two dimensions than in three."
topological order: "A property where information is stored in global patterns, not in any single place. Extremely hard to destroy — you would have to disrupt the entire pattern at once, not just a piece of it."
entanglement: "Two particles linked so that measuring one instantly reveals information about the other, no matter how far apart. Einstein called it 'spooky action at a distance.' Demonstrated in labs worldwide since the 1970s."
quantum teleportation: "Transferring quantum information from one place to another without it crossing the space between. Not science fiction — demonstrated in labs since 1997. Requires entanglement plus an ordinary communication channel."
nonlocal: "Connected across distance without anything traveling between. In quantum systems, distant points share correlations — information about one place is encoded in another. This is a measured fact, not speculation."
autocatalytic: "Self-sustaining chemical reactions where each reaction's products help catalyze other reactions in the set. The result is a network that maintains itself — a hallmark of living systems."
classical backchannel: "An ordinary communication channel — radio, light, electrical signal. Required to complete quantum teleportation, which is why teleportation cannot transmit information faster than light."
magnetosphere: "Earth's magnetic field, extending thousands of kilometers into space. Contains thin layers where charged particles are trapped flat — two-dimensional electron gases on a planetary scale."
guided deduction: "Teaching someone to discover the answer from public information, rather than disclosing it directly. Legally distinct from disclosure — no classified information changes hands, only the sequence of questions."
topological protection: "Information stored in global patterns is shielded from local disturbances — including heat. This is why topological quantum computers could work at room temperature, when conventional designs require near-absolute-zero cooling."
relinquishment: "Voluntarily surrendering power — not to another owner, but permanently. Not because you're forced to, but because holding it is more dangerous than letting go. The word Bill Joy used in his 2000 essay."
flat worlds: "Real two-dimensional layers inside computer chips and in Earth's magnetic field. Different physics applies there — particles behave in ways impossible in three dimensions, including forming exotic states of matter."
Special Air Service: "The most elite special forces unit shared by Britain and Australia. Selection has a failure rate above 90 percent. Veterans are bound by the Official Secrets Act for life."
grew: "The system organized itself, the way living things grow. Not engineered component by component — emerged from the physics of the substrate. This is how autocatalytic systems work."
encryption: "Math that scrambles information so only the intended recipient can read it. Protects passwords, messages, bank accounts, and government secrets. Modern civilization depends on it — break the encryption, break the infrastructure."
