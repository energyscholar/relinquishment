edge of chaos:
  text: "The narrow regime between frozen order and random disorder. Where computation happens. Where life happens. Systems here are complex enough to process information but stable enough to remember it."
  html: >-
    <p style="margin:0 0 0.5em;font-size:0.95em;line-height:1.5;">
    <strong>Edge of chaos</strong> — the narrow regime between frozen order
    and random disorder. Where computation and life happen. Too ordered =
    frozen. Too random = noise. The edge = information processing.</p>
