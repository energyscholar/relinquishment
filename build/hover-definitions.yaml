# Inline hover definitions — single source of truth (90 defined)
# Format: term: "definition (≤50 words, clear to target reading level)"
#   Plain string: term: "definition"
#   Dict with target: term: { text: "...", target: "#anchor" }
#   Rich panel (HTML+SVG): term: { text: "...", html: "...", target: "#anchor" }
#     When 'html' is present, it is used for data-hover-html (rich popup panel).
# Used by: PDF (footnotes), HTML (tooltips)
# Hover IDs auto-generated from YAML keys (slugified). Feedback: hover:<id>

# --- Title-line rich panels (Relinquishment — Wormholes in the Flat) ---

relinquishment-title:
  text: "placeholder"
  hover_id: "relinquishment-title"
  html: |
    <p style="margin:0 0 0.5em;font-size:0.95em;line-height:1.5;"><strong>Relinquishment</strong> — voluntarily surrendering power that cannot be taken by force. A preparation document built from real physics, real people, and real institutions. 239 pages across three parts: the story, the evidence, and the question.</p><svg xmlns="http://www.w3.org/2000/svg" width="280" height="60" viewBox="0 0 280 60" style="display:block;margin:0.5em auto;"><defs><linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="0%"><stop offset="0%" style="stop-color:#1a5276;stop-opacity:0.8"/><stop offset="50%" style="stop-color:#2471a3;stop-opacity:1"/><stop offset="100%" style="stop-color:#1a5276;stop-opacity:0.8"/></linearGradient></defs><rect x="2" y="2" width="276" height="56" rx="8" fill="none" stroke="url(#glow)" stroke-width="1.5"/><text x="140" y="24" text-anchor="middle" font-size="11" fill="#1a5276" font-family="serif" font-style="italic">Three narrative threads. Real science.</text><text x="140" y="42" text-anchor="middle" font-size="11" fill="#1a5276" font-family="serif" font-style="italic">Three possible explanations. You decide.</text></svg>

wormholes-title:
  text: "placeholder"
  hover_id: "wormholes-title"
  target: "#summary:most-important-story"
  html: |
    <p style="margin:0 0 0.5em;font-size:0.95em;line-height:1.5;"><strong>Wormholes</strong> — real topological connections between distant points in a material. Not science fiction — condensed matter physics. The 2016 Nobel Prize in Physics was awarded for the theory behind them. The book argues these may exist in magnetized plasma.</p><svg xmlns="http://www.w3.org/2000/svg" width="300" height="140" viewBox="0 0 300 140" style="display:block;margin:0.5em auto;"><ellipse cx="80" cy="35" rx="65" ry="20" fill="none" stroke="#1a5276" stroke-width="1.2" opacity="0.6"/><ellipse cx="80" cy="35" rx="18" ry="8" fill="#e8f0f8" stroke="#2471a3" stroke-width="1.5"/><ellipse cx="220" cy="105" rx="65" ry="20" fill="none" stroke="#1a5276" stroke-width="1.2" opacity="0.6"/><ellipse cx="220" cy="105" rx="18" ry="8" fill="#e8f0f8" stroke="#2471a3" stroke-width="1.5"/><path d="M 62,35 C 55,60 195,80 202,105" fill="none" stroke="#2471a3" stroke-width="1.2" stroke-dasharray="4,3"/><path d="M 98,35 C 105,60 245,80 238,105" fill="none" stroke="#2471a3" stroke-width="1.2" stroke-dasharray="4,3"/><text x="80" y="12" text-anchor="middle" font-size="9" fill="#888" font-family="serif" font-style="italic">surface A</text><text x="220" y="135" text-anchor="middle" font-size="9" fill="#888" font-family="serif" font-style="italic">surface B</text><text x="150" y="75" text-anchor="middle" font-size="9" fill="#2471a3" font-family="serif">topological</text><text x="150" y="87" text-anchor="middle" font-size="9" fill="#2471a3" font-family="serif">connection</text></svg>

the-flat-title:
  text: "placeholder"
  hover_id: "the-flat-title"
  target: "#summary:most-important-story"
  html: |
    <p style="margin:0 0 0.5em;font-size:0.95em;line-height:1.5;"><strong>The Flat</strong> — any two-dimensional system embedded in three dimensions that exhibits topological order. Particles confined to two dimensions can braid around each other, storing information in global patterns that are impossible in 3D. <span class='hover-term' data-hover='A property where information is stored in global patterns, not in any single place. Extremely hard to destroy — you would have to disrupt the entire pattern at once, not just a piece of it.'>Different physics apply</span>.</p><p style="margin:0;font-size:0.85em;line-height:1.4;color:#666;">The Flat inside your computer chip is a 2DEG (two-dimensional electron gas). The Flat in Earth's magnetosphere is plasma confined to thin sheets. Both are Flat — both exhibit topological order. We call the ocean floor the Deep and the emptiness between galaxies the Void. This book calls those thin worlds <strong>the Flat</strong> — until someone coins something better for this otherwise-unnamed physical system.</p><svg xmlns="http://www.w3.org/2000/svg" width="300" height="130" viewBox="0 0 300 130" style="display:block;margin:0.5em auto;"><defs><linearGradient id="flat-glow" x1="0%" y1="0%" x2="100%" y2="0%"><stop offset="0%" stop-color="#2471a3" stop-opacity="0.05"/><stop offset="50%" stop-color="#2471a3" stop-opacity="0.2"/><stop offset="100%" stop-color="#2471a3" stop-opacity="0.05"/></linearGradient><marker id="flat-arr" viewBox="0 0 6 6" refX="5" refY="3" markerWidth="5" markerHeight="5" orient="auto"><path d="M 0,0 L 6,3 L 0,6 Z" fill="#1a5276"/></marker></defs><rect x="30" y="20" width="240" height="25" rx="2" fill="#e0e0e0" stroke="#999" stroke-width="0.8"/><text x="150" y="36" text-anchor="middle" font-size="8" fill="#666" font-family="sans-serif">3D material (bulk semiconductor)</text><rect x="30" y="50" width="240" height="8" rx="1" fill="url(#flat-glow)" stroke="#2471a3" stroke-width="1.5"/><rect x="30" y="63" width="240" height="25" rx="2" fill="#e0e0e0" stroke="#999" stroke-width="0.8"/><text x="150" y="79" text-anchor="middle" font-size="8" fill="#666" font-family="sans-serif">3D material (bulk semiconductor)</text><circle cx="70" cy="54" r="2.5" fill="#2471a3" opacity="0.9"/><circle cx="100" cy="54" r="2.5" fill="#2471a3" opacity="0.7"/><circle cx="135" cy="54" r="2.5" fill="#2471a3" opacity="0.9"/><circle cx="165" cy="54" r="2.5" fill="#2471a3" opacity="0.6"/><circle cx="195" cy="54" r="2.5" fill="#2471a3" opacity="0.8"/><circle cx="225" cy="54" r="2.5" fill="#2471a3" opacity="0.7"/><circle cx="115" cy="55" r="2" fill="#2471a3" opacity="0.4"/><circle cx="180" cy="53" r="2" fill="#2471a3" opacity="0.5"/><circle cx="245" cy="54" r="2" fill="#2471a3" opacity="0.5"/><line x1="58" y1="54" x2="48" y2="54" stroke="#1a5276" stroke-width="0.8" marker-end="url(#flat-arr)"/><line x1="252" y1="54" x2="262" y2="54" stroke="#1a5276" stroke-width="0.8" marker-end="url(#flat-arr)"/><text x="18" y="56" text-anchor="middle" font-size="7" fill="#2471a3" font-family="sans-serif" transform="rotate(-90,18,56)">2DEG</text><text x="285" y="56" text-anchor="middle" font-size="7" fill="#2471a3" font-family="sans-serif" transform="rotate(90,285,56)">2DEG</text><text x="150" y="104" text-anchor="middle" font-size="9" fill="#2471a3" font-family="serif" font-style="italic">electrons confined to two dimensions</text><text x="150" y="118" text-anchor="middle" font-size="9" fill="#888" font-family="serif" font-style="italic">different physics applies here</text></svg>

# --- Standard hover definitions ---

two-dimensional electron gas: "A thin layer where electrons can only move in two directions — trapped on a sheet. Found inside every computer chip and in Earth's magnetic field. Different physics applies in two dimensions than in three."
topological order: "A property where information is stored in global patterns, not in any single place. Extremely hard to destroy — you would have to disrupt the entire pattern at once, not just a piece of it."
entanglement: "Two particles linked so that measuring one instantly reveals information about the other, no matter how far apart. Einstein called it 'spooky action at a distance.' Demonstrated in labs worldwide since the 1970s."
quantum teleportation: "Transferring quantum information from one place to another without it crossing the space between. Not science fiction — demonstrated in labs since 1997. Requires entanglement plus an ordinary communication channel."
nonlocal: "Connected across distance without anything traveling between. In quantum systems, distant points share correlations — information about one place is encoded in another. This is a measured fact, not speculation."
autocatalytic: "A network of processes where each process's outputs help sustain other processes in the set. The result is a self-maintaining cycle — a hallmark of living systems. The math is substrate-independent: it works in chemical reactions (origin of life) and in quantum substrates (the Flat)."
classical backchannel: "An ordinary communication channel — radio, light, electrical signal. Required to complete quantum teleportation, which is why teleportation cannot transmit information faster than light."
magnetosphere:
  text: "Earth's magnetic field, extending thousands of kilometers into space. Contains thin layers where charged particles are trapped flat — two-dimensional electron gases on a planetary scale."
  target: "#pos32:the-wrong-substrate"
