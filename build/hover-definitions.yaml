# --- Tier 1: hook.tex (p1 → p2 popups) ---

quantum computer: "A machine that uses quantum effects — particles in two states at once, linked across distance — to solve problems no ordinary computer can. The race to build one is real and accelerating."

master keys: "Cryptographic keys that control access to an entire system. Whoever holds them can read anything the system protects. Surrendering them is permanent — there is no backup."

Universal Declaration of Human Rights: "A 1948 United Nations document listing 30 basic rights for all people. Written in the aftermath of World War II to say 'never again.' Not the law of any country — a set of principles that transcend borders."

# --- Tier 1: the-stack.tex (p1 → p2 popups) ---

stack:
  text: "A tower of technologies where each one does everything the one before it did, plus something new. Cumulative. The book's central organizing idea."
  target: "#stack-chart"

self-maintaining structure: "A structure that repairs and sustains itself without outside help. A candle recovers from wind. A cell repairs damage. This is more than just not falling apart — it actively holds together."

self-organizes: "Global order emerging from local rules with no central control. No ant knows the colony's plan. No neuron knows your thoughts. The pattern arises from interactions, not instructions."

topological wormhole:
  text: "Fold the paper so two points touch — the signal doesn't cross the distance; the distance disappears. Different physics from spacetime wormholes (Einstein-Rosen bridges) — information only, inside a material, no faster-than-light travel. Real — 2016 Nobel Prize."
  target: "#wormhole-disambiguation"

# Reserved: too generic as hovertip trigger. Fires at natural first occurrence via summary.tex.
two dimensions: "Movement restricted to a flat sheet. The third dimension is physically gone, not just ignored. Different rules take over — particles can braid around each other in ways impossible in 3D."

threshold: "Below: nothing happens. Above: everything changes. A match needs a minimum temperature to ignite. A network needs a minimum complexity to self-organize. Phase transitions in physics."

buttons:
  text: "Kauffman's thought experiment: scatter buttons on a floor, connect random pairs with threads. Below a threshold, small clusters. Above it, one thread lifts the whole room."
  hover_id: "buttons-and-threads"
  html: |
    <p style="margin:0 0 0.5em;font-size:0.95em;line-height:1.5;"><strong>Buttons and threads</strong> — Kauffman's thought experiment, mapped to the eleven scientific domains this book spans. Five colored clusters. Solid threads: published cross-references. Dashed grey: missing bridges. The whole network barely rises as one — the TQC cluster dangles by a single thread.</p><svg xmlns="http://www.w3.org/2000/svg" width="380" height="300" viewBox="0 0 500 400" style="display:block;margin:0.5em auto;"><title>Kauffman's buttons and threads, mapped to eleven scientific domains. Lift one button and the network rises — but topological quantum computation dangles by a single thread.</title><defs><filter id="btn-sh" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="1" dy="1" stdDeviation="1.5" flood-opacity="0.2"/></filter></defs><line x1="30" y1="370" x2="470" y2="370" stroke="#ccc" stroke-width="1" stroke-dasharray="4,4"/><text x="250" y="390" text-anchor="middle" font-family="Georgia, serif" font-size="9" fill="#bbb">floor</text><path d="M 248,18 C 248,10 252,10 252,18 L 252,28 L 248,28 Z" fill="#888" stroke="#666" stroke-width="0.5"/><line x1="250" y1="28" x2="250" y2="48" stroke="#888" stroke-width="1"/><line x1="140" y1="95" x2="95" y2="140" stroke="#2471a3" stroke-width="1.5" opacity="0.7"/><line x1="95" y1="140" x2="60" y2="195" stroke="#2471a3" stroke-width="1.5" opacity="0.7"/><line x1="310" y1="90" x2="360" y2="130" stroke="#e67e22" stroke-width="1.5" opacity="0.7"/><line x1="390" y1="85" x2="430" y2="135" stroke="#8e44ad" stroke-width="1.5" opacity="0.7"/><line x1="200" y1="75" x2="250" y2="110" stroke="#27ae60" stroke-width="1.5" opacity="0.7"/><line x1="170" y1="150" x2="130" y2="195" stroke="#c0392b" stroke-width="1.5" opacity="0.7"/><line x1="310" y1="90" x2="250" y2="110" stroke="#666" stroke-width="1.2" opacity="0.5"/><line x1="200" y1="75" x2="140" y2="95" stroke="#666" stroke-width="1.2" opacity="0.5"/><line x1="390" y1="85" x2="360" y2="130" stroke="#666" stroke-width="1.2" opacity="0.5"/><line x1="170" y1="150" x2="140" y2="95" stroke="#666" stroke-width="1.2" opacity="0.5"/><line x1="250" y1="48" x2="200" y2="75" stroke="#888" stroke-width="1"/><line x1="60" y1="195" x2="55" y2="265" stroke="#2471a3" stroke-width="1.0" stroke-dasharray="3,2" opacity="0.6"/><line x1="55" y1="265" x2="310" y2="90" stroke="#ddd" stroke-width="0.8" stroke-dasharray="3,3"/><line x1="55" y1="265" x2="250" y2="110" stroke="#ddd" stroke-width="0.8" stroke-dasharray="3,3"/><line x1="55" y1="265" x2="430" y2="135" stroke="#ddd" stroke-width="0.8" stroke-dasharray="3,3"/><line x1="360" y1="130" x2="95" y2="140" stroke="#ddd" stroke-width="0.8" stroke-dasharray="3,3"/><line x1="130" y1="195" x2="310" y2="90" stroke="#ddd" stroke-width="0.8" stroke-dasharray="3,3"/><circle cx="200" cy="75" r="14" fill="#27ae60" stroke="#1e8449" stroke-width="1.5" filter="url(#btn-sh)"/><text x="200" y="79" text-anchor="middle" font-family="Helvetica, sans-serif" font-size="6.5" fill="white" font-weight="bold">NN</text><circle cx="250" cy="110" r="14" fill="#2ecc71" stroke="#27ae60" stroke-width="1.5" filter="url(#btn-sh)"/><text x="250" y="114" text-anchor="middle" font-family="Helvetica, sans-serif" font-size="6" fill="white" font-weight="bold">Neuro</text><circle cx="140" cy="95" r="14" fill="#2980b9" stroke="#1a5276" stroke-width="1.5" filter="url(#btn-sh)"/><text x="140" y="99" text-anchor="middle" font-family="Helvetica, sans-serif" font-size="5.5" fill="white" font-weight="bold">CMP</text><circle cx="95" cy="140" r="14" fill="#3498db" stroke="#2471a3" stroke-width="1.5" filter="url(#btn-sh)"/><text x="95" y="144" text-anchor="middle" font-family="Helvetica, sans-serif" font-size="5.5" fill="white" font-weight="bold">TFT</text><circle cx="310" cy="90" r="14" fill="#e67e22" stroke="#ca6f1e" stroke-width="1.5" filter="url(#btn-sh)"/><text x="310" y="94" text-anchor="middle" font-family="Helvetica, sans-serif" font-size="5.5" fill="white" font-