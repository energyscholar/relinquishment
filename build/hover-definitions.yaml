# Reserved: structural/navigational term (Part I heading). No hovertip call — menu tooltips handle it.
three possible explanations:
  text: "A) Confabulation. B) Exaggerated kernel. C) Substantially true. The science is real regardless."
  hover_id: "three-possible-explanations"
  html: |
    <p style="margin:0 0 0.4em;font-size:0.95em;line-height:1.5;"><strong>A)</strong> Confabulation and lies — a pattern-matching mind built coherence from noise. <strong>B)</strong> Exaggerated kernel of truth — real people &amp; real programs inflated in the telling. <strong>C)</strong> Substantially true.</p><p style="margin:0;font-size:0.95em;line-height:1.5;">The book calls these A, B, and C. The science of The Stack and The Flat is true, regardless. The only question is whether someone got there first.</p>
guided deduction: "Teaching someone to discover the answer from public information, rather than disclosing it directly. Legally distinct from disclosure — no classified information changes hands, only the sequence of questions. It is what truth-telling looks like when the truth is classified and the classification will outlive everyone who knows it."
operation: "The guided deduction of Bruce (2003-2006) was one phase of the larger Relinquishment operation (~1997-2006): a decade of effort, a top-tier operator, and several overlapping teams. The motive was not concealment but its opposite — to put a classified matter of great public consequence into the public record by the only route that remained open."
topological protection: "Information stored in global patterns is shielded from local disturbances — including heat. This is why topological quantum computers could work at room temperature, when conventional designs require near-absolute-zero cooling."
relinquishment:
  text: "Voluntarily surrendering power that cannot be taken by force — a decision only the powerful can make. Not because you're forced to, but because holding it is more dangerous than letting go. The word Bill Joy used in his 2000 essay. The title asks: what would you do?"
  target: "#preface"
flat worlds:
  text: "This book coins the Flat to mean 'any two-dimensional system embedded in three dimensions that can, under the right conditions, exhibit topological order.' Different physics apply. In particular, it supports topological wormholes. Thus, the Flat can be nonlocal in the technical physics sense."
  target: "#dl:what-is-the-flat"
  html: |
    <p style="margin:0 0 0.5em;font-size:0.95em;line-height:1.5;"><strong>The Flat</strong> — this book coins <em>the Flat</em> to mean "any two-dimensional system embedded in three dimensions that can, under the right conditions, exhibit topological order." Say that three times fast. Or say "Flat." <span class='hover-term' data-hover='A property where information is stored in global patterns, not in any single place. Extremely hard to destroy — you would have to disrupt the entire pattern at once, not just a piece of it.'>Different physics apply</span>. In particular, it supports topological wormholes. Thus, the Flat can be nonlocal in the technical physics sense.</p><p style="margin:0;font-size:0.85em;line-height:1.4;color:#666;">The Flat inside your computer chip is a 2DEG (two-dimensional electron gas). The Flat in Earth's magnetosphere is plasma confined to thin current sheets. We call the ocean floor the Deep and the emptiness between galaxies the Void. This book calls those thin worlds <strong>the Flat</strong>. It's unclear what temperature range and conditions permits Flat behavior.</p><svg xmlns="http://www.w3.org/2000/svg" width="300" height="130" viewBox="0 0 300 130" style="display:block;margin:0.5em auto;"><title>Cross-section of a computer chip. Two grey blocks of 3D semiconductor sandwich a thin blue layer — the two-dimensional electron gas (2DEG). Blue dots are electrons confined to this flat layer. They can move left and right but not up or down. This is the Flat.</title><defs><linearGradient id="fw-glow" x1="0%" y1="0%" x2="100%" y2="0%"><stop offset="0%" stop-color="#2471a3" stop-opacity="0.05"/><stop offset="50%" stop-color="#2471a3" stop-opacity="0.2"/><stop offset="100%" stop-color="#2471a3" stop-opacity="0.05"/></linearGradient><marker id="fw-arr" viewBox="0 0 6 6" refX="5" refY="3" markerWidth="5" markerHeight="5" orient="auto"><path d="M 0,0 L 6,3 L 0,6 Z" fill="#1a5276"/></marker></defs><rect x="30" y="20" width="240" height="25" rx="2" fill="#e0e0e0" stroke="#999" stroke-width="0.8"/><text x="150" y="36" text-anchor="middle" font-size="8" fill="#666" font-family="sans-serif">3D material (bulk semiconductor)</text><rect x="30" y="50" width="240" height="8" rx="1" fill="url(#fw-glow)" stroke="#2471a3" stroke-width="1.5"/><rect x="30" y="63" width="240" height="25" rx="2" fill="#e0e0e0" stroke="#999" stroke-width="0.8"/><text x="150" y="79" text-anchor="middle" font-size="8" fill="#666" font-family="sans-serif">3D material (bulk semiconductor)</text><circle cx="70" cy="54" r="2.5" fill="#2471a3" opacity="0.9"/><circle cx="100" cy="54" r="2.5" fill="#2471a3" opacity="0.7"/><circle cx="135" cy="54" r="2.5" fill="#2471a3" opacity="0.9"/><circle cx="165" cy="54" r="2.5" fill="#2471a3" opacity="0.6"/><circle cx="195" cy="54" r="2.5" fill="#2471a3" opacity="0.8"/><circle cx="225" cy="54" r="2.5" fill="#2471a3" opacity="0.7"/><circle cx="115" cy="55" r="2" fill="#2471a3" opacity="0.4"/><circle cx="180" cy="53" r="2" fill="#2471a3" opacity="0.5"/><circle cx="245" cy="54" r="2" fill="#2471a3" opacity="0.5"/><line x1="58" y1="54" x2="48" y2="54" stroke="#1a5276" stroke-width="0.8" marker-end="url(#fw-arr)"/><line x1="252" y1="54" x2="262" y2="54" stroke="#1a5276" stroke-width="0.8" marker-end="url(#fw-arr)"/><text x="18" y="56" text-anchor="middle" font-size="7" fill="#2471a3" font-family="sans-serif" transform="rotate(-90,18,56)">2DEG</text><text x="285" y="56" text-anchor="middle" font-size="7" fill="#2471a3" font-family="sans-serif" transform="rotate(90,285,56)">2DEG</text><text x="150" y="104" text-anchor="middle" font-size="9" fill="#2471a3" font-family="serif" font-style="italic">electrons confined to two dimensions</text><text x="150" y="118" text-anchor="middle" font-size="9" fill="#888" font-family="serif" font-style="italic">different physics applies here</text></svg>
# Reserved: story content — may be added manually by Bruce.
Special Air Service: "The most elite special forces unit shared by Britain and Australia. Selection has a failure rate above 90 percent. Veterans are bound by the Official Secrets Act for life."

SAS: "Special Air Service — the most elite special forces unit shared by Britain and Australia. Selection has a failure rate above 90 percent. Veterans are bound by the Official Secrets Act for life."
grew: "The system organized itself, the way living things grow. Not engineered component by component — emerged from the physics of the substrate. This is how autocatalytic systems work."
emergent: "A property that appears at a new level of organization, not designed into the parts. Wetness is emergent from water molecules; mind may be emergent from neurons; the custodian in this story is the topmost emergent layer of a physics-and-computation stack."
encryption: "Math that scrambles information so only the intended recipient can read it. Protects passwords, messages, bank accounts, and government secrets. Modern civilization depends on it — break the encryption, break the infrastructure."
wormholes:
  text: "Not the sci-fi kind. Spacetime wormholes (Interstellar) fold spacetime itself — mass and all, across light-years. Topological wormholes are far more limited: they fold only a two-dimensional quantum material, never spacetime. Information crosses, not mass. No light-year shortcuts. No time travel. Inside the material only. Real physics — 2016 Nobel Prize — but restricted."
  hover_id: "wormholes"
  target: "#wormhole-disambiguation"
  html: |
    <p style="margin:0 0 0.5em;font-size:0.95em;line-height:1.5;"><strong>Wormholes</strong> — in this book, <em>always</em> topological. Not the science-fiction kind.</p>
    <table style="font-size:0.82em;border-collapse:collapse;width:100%;margin:0.3em 0;">
    <tr style="border-bottom:1px solid #ccc;"><th style="text-align:left;padding:2px 6px;width:30%;"></th><th style="text-align:left;padding:2px 6px;width:35%;">This book (topological)</th><th style="text-align:left;padding:2px 6px;width:35%;">Not this book (Einstein-Rosen)</th></tr>
    <tr><td style="padding:2px 6px;">Where?</td><td style="padding:2px 6px;">Inside a flat material (chip, magnetic field)</td><td style="padding:2px 6px;">In outer space, between stars</td></tr>
    <tr><td style="padding:2px 6px;">What crosses?</td><td style="padding:2px 6px;">Information only</td><td style="padding:2px 6px;">Mass, objects (theoretically)</td></tr>
    <tr><td style="padding:2px 6px;">Faster than light?</td><td style="padding:2px 6px;">No — needs a normal signal alongside</td><td style="padding:2px 6px;">Maybe (never tested)</td></tr>
    <tr><td style="padding:2px 6px;">Time travel?</td><td style="padding:2px 6px;">No</td><td style="padding:2px 6px;">Maybe (never tested)</td></tr>
    <tr><td style="padding:2px 6px;">Real?</td><td style="padding:2px 6px;">Yes — 2016 Nobel Prize</td><td style="padding:2px 6px;">Never observed</td></tr>
    </table>
