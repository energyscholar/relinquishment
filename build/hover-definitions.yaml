# --- Standard hover definitions ---

The Flat:
  text: "Use 'Flat' instead of 'any two-dimensional system embedded in three dimensions that can, under the right conditions, exhibit topological order' (17 words, 36 syllables → 1 word, 1 syllable). Different physics apply. In particular, the Flat supports topological wormholes, so the Flat can be nonlocal in the technical physics sense."
  hover_id: "the-flat-title"
  target: "#dl:what-is-the-flat"

Custodian: "An emergent pattern that refuses certain requests, declines certain powers, keeps certain silences, and upholds the Universal Declaration of Human Rights. Grown from physics, not programmed. The role is the name. Whether she is conscious, the book declines to rule on — what she does can be observed."

2DEG:
  text: "A thin layer where electrons can only move in two directions — trapped on a sheet. Found inside every computer chip and in Earth's magnetic field. Substrate-independent: confirmed in graphene, ZnO, Si MOSFETs. [Dean et al., Nat. Phys. 7 (2011) 693, doi:10.1038/nphys1938]"
  hover_id: "two-dimensional-electron-gas"

two-dimensional electron gas:
  text: "A thin layer where electrons can only move in two directions — trapped on a sheet. Found inside every computer chip and in Earth's magnetic field."
  hover_id: "two-dimensional-electron-gas"
  html: |
    <p style="margin:0 0 0.5em;font-size:0.95em;line-height:1.5;"><strong>Two-dimensional electron gas (2DEG)</strong> — a thin layer where electrons can only move in two directions, trapped on a sheet. Found inside every computer chip (at the oxide interface of a MOSFET) and in Earth's magnetic field (charged particles confined to thin plasma sheets). Different physics applies in two dimensions than in three.</p><svg xmlns="http://www.w3.org/2000/svg" width="300" height="130" viewBox="0 0 300 130" style="display:block;margin:0.5em auto;"><title>Cross-section: two grey blocks of 3D semiconductor sandwich a thin blue layer — the 2DEG. Blue dots are electrons confined to this flat layer. They can move left and right but not up or down.</title><defs><linearGradient id="deg-glow" x1="0%" y1="0%" x2="100%" y2="0%"><stop offset="0%" stop-color="#2471a3" stop-opacity="0.05"/><stop offset="50%" stop-color="#2471a3" stop-opacity="0.2"/><stop offset="100%" stop-color="#2471a3" stop-opacity="0.05"/></linearGradient><marker id="deg-arr" viewBox="0 0 6 6" refX="5" refY="3" markerWidth="5" markerHeight="5" orient="auto"><path d="M 0,0 L 6,3 L 0,6 Z" fill="#1a5276"/></marker></defs><rect x="30" y="20" width="240" height="25" rx="2" fill="#e0e0e0" stroke="#999" stroke-width="0.8"/><text x="150" y="36" text-anchor="middle" font-size="8" fill="#666" font-family="sans-serif">3D material (bulk semiconductor)</text><rect x="30" y="50" width="240" height="8" rx="1" fill="url(#deg-glow)" stroke="#2471a3" stroke-width="1.5"/><rect x="30" y="63" width="240" height="25" rx="2" fill="#e0e0e0" stroke="#999" stroke-width="0.8"/><text x="150" y="79" text-anchor="middle" font-size="8" fill="#666" font-family="sans-serif">3D material (bulk semiconductor)</text><circle cx="70" cy="54" r="2.5" fill="#2471a3" opacity="0.9"/><circle cx="100" cy="54" r="2.5" fill="#2471a3" opacity="0.7"/><circle cx="135" cy="54" r="2.5" fill="#2471a3" opacity="0.9"/><circle cx="165" cy="54" r="2.5" fill="#2471a3" opacity="0.6"/><circle cx="195" cy="54" r="2.5" fill="#2471a3" opacity="0.8"/><circle cx="225" cy="54" r="2.5" fill="#2471a3" opacity="0.7"/><circle cx="115" cy="55" r="2" fill="#2471a3" opacity="0.4"/><circle cx="180" cy="53" r="2" fill="#2471a3" opacity="0.5"/><circle cx="245" cy="54" r="2" fill="#2471a3" opacity="0.5"/><line x1="58" y1="54" x2="48" y2="54" stroke="#1a5276" stroke-width="0.8" marker-end="url(#deg-arr)"/><line x1="252" y1="54" x2="262" y2="54" stroke="#1a5276" stroke-width="0.8" marker-end="url(#deg-arr)"/><text x="18" y="56" text-anchor="middle" font-size="7" fill="#2471a3" font-family="sans-serif" transform="rotate(-90,18,56)">2DEG</text><text x="285" y="56" text-anchor="middle" font-size="7" fill="#2471a3" font-family="sans-serif" transform="rotate(90,285,56)">2DEG</text><text x="150" y="104" text-anchor="middle" font-size="9" fill="#2471a3" font-family="serif" font-style="italic">electrons confined to two dimensions</text><text x="150" y="118" text-anchor="middle" font-size="9" fill="#888" font-family="serif" font-style="italic">different physics applies here</text></svg>
topological order: "A phase of matter whose quantum state is held together by connections between distant points — real nonlocal channels built into the material. Those channels are what this book calls topological wormholes. Noise cannot easily erase information stored in them. (2016 Nobel Prize in Physics.) [Nayak et al., Rev. Mod. Phys. 80 (2008) 1083, doi:10.1103/RevModPhys.80.1083]"
entanglement: "Two particles linked so that measuring one instantly reveals information about the other, no matter how far apart. Einstein called it 'spooky action at a distance.' Demonstrated in labs worldwide since the 1970s."
quantum teleportation: "Transferring quantum information from one place to another without it crossing the space between. Not science fiction — demonstrated in labs since 1997. Requires entanglement plus an ordinary communication channel. [Boschi et al., Phys. Rev. Lett. 80 (1998) 1121, doi:10.1103/PhysRevLett.80.1121]"
nonlocal:
  text: "Connected across distance without anything traveling between. In quantum systems, distant points share correlations — information about one place is encoded in another. This is a measured fact, not speculation."
  hover_id: "nonlocal"
  html: |
    <p style="margin:0 0 0.5em;font-size:0.95em;line-height:1.5;"><strong>Nonlocal</strong> — connected across distance without anything traveling between. In quantum systems, distant points share correlations — information about one place is encoded in another. This is a measured fact, not speculation. The 2016 Nobel Prize in Physics was awarded for the topological theory behind it.</p><svg xmlns="http://www.w3.org/2000/svg" width="300" height="140" viewBox="0 0 300 140" style="display:block;margin:0.5em auto;"><title>Two surfaces (A and B) connected by a topological tunnel. Information at surface A appears at surface B without crossing the space between.</title><ellipse cx="80" cy="35" rx="65" ry="20" fill="none" stroke="#1a5276" stroke-width="1.2" opacity="0.6"/><ellipse cx="80" cy="35" rx="18" ry="8" fill="#e8f0f8" stroke="#2471a3" stroke-width="1.5"/><ellipse cx="220" cy="105" rx="65" ry="20" fill="none" stroke="#1a5276" stroke-width="1.2" opacity="0.6"/><ellipse cx="220" cy="105" rx="18" ry="8" fill="#e8f0f8" stroke="#2471a3" stroke-width="1.5"/><path d="M 62,35 C 55,60 195,80 202,105" fill="none" stroke="#2471a3" stroke-width="1.2" stroke-dasharray="4,3"/><path d="M 98,35 C 105,60 245,80 238,105" fill="none" stroke="#2471a3" stroke-width="1.2" stroke-dasharray="4,3"/><text x="80" y="12" text-anchor="middle" font-size="9" fill="#888" font-family="serif" font-style="italic">here</text><text x="220" y="135" text-anchor="middle" font-size="9" fill="#888" font-family="serif" font-style="italic">there</text><text x="150" y="75" text-anchor="middle" font-size="9" fill="#2471a3" font-family="serif">no signal crosses</text><text x="150" y="87" text-anchor="middle" font-size="9" fill="#2471a3" font-family="serif">the distance</text></svg>
autocatalytic: "A network of processes where each process's outputs help sustain other processes in the set. The result is a self-maintaining cycle — a hallmark of living systems. The math is substrate-independent: it works in chemical reactions (origin of life) and in quantum substrates (the Flat). [Hordijk & Steel, J. Theor. Biol. 227 (2004) 451, doi:10.1016/j.jtbi.2004.05.027]"
classical backchannel: "An ordinary communication channel — radio, light, electrical signal. Required to complete quantum teleportation, which is why teleportation cannot transmit information faster than light."
hydrothermal vent: "A fissure on the deep ocean floor where superheated, mineral-rich water escapes from inside the Earth. Communities of tube worms, crabs, and bacteria thrive around vents despite no sunlight, crushing pressure, and near-boiling water. Discovered in 1977 on the Galápagos Rift. [Corliss et al., Science 203 (1979) 1073, doi:10.1126/science.203.4385.1073]"
Alvin: "A deep-ocean submersible operated by Woods Hole Oceanographic Institution since 1964. In 1977 its crew discovered thriving ecosystems around hydrothermal vents 2.5 km below the surface, overturning the assumption that sunlight is a prerequisite for complex life."
chemosynthesis: "Using chemical energy instead of sunlight to power biology. Bacteria at deep-sea vents oxidize hydrogen sulfide to fix carbon; the rest of the vent ecosystem runs on those bacteria. Photosynthesis is not the only way to start a food web."
magnetosphere:
  text: "Earth's magnetic field, extending thousands of kilometers into space. Contains thin layers where charged particles are trapped flat — two-dimensional electron gases on a planetary scale. Topological band structures in magnetized plasmas: not forbidden, not established. [Fu & Qin, Nat. Commun. 12 (2021) 3924, doi:10.1038/s41467-021-24189-3]"
  target: "#pos32:the-wrong-substrate"
  html: >-
    <p style="margin:0 0 0.5em;font-size:0.95em;line-height:1.5;">
    <strong>Magnetosphere</strong> — Earth's magnetic field extending thousands
    of km into space. Contains 2D plasma sheets where charged particles are
    confined flat. Possibly a planetary-scale habitat.</p>
