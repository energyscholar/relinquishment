# Reserved: structural/navigational term (Part I heading). No hovertip call — menu tooltips handle it.
guided deduction: "Teaching someone to discover the answer from public information, rather than disclosing it directly. Legally distinct from disclosure — no classified information changes hands, only the sequence of questions."
topological protection: "Information stored in global patterns is shielded from local disturbances — including heat. This is why topological quantum computers could work at room temperature, when conventional designs require near-absolute-zero cooling."
relinquishment:
  text: "Voluntarily surrendering power that cannot be taken by force — a decision only the powerful can make. Not because you're forced to, but because holding it is more dangerous than letting go. The word Bill Joy used in his 2000 essay. The title asks: what would you do?"
  target: "#preface"
flat worlds:
  text: "Real two-dimensional layers inside computer chips where quantum effects dominate. Flatland is not a metaphor — it is the physics that makes your phone work. This book treats them as habitats where different rules apply and self-organizing structures can form."
  target: "#ch:what-is-the-flat"
# Reserved: story content — may be added manually by Bruce.
Special Air Service: "The most elite special forces unit shared by Britain and Australia. Selection has a failure rate above 90 percent. Veterans are bound by the Official Secrets Act for life."

SAS: "Special Air Service — the most elite special forces unit shared by Britain and Australia. Selection has a failure rate above 90 percent. Veterans are bound by the Official Secrets Act for life."
grew: "The system organized itself, the way living things grow. Not engineered component by component — emerged from the physics of the substrate. This is how autocatalytic systems work."
encryption: "Math that scrambles information so only the intended recipient can read it. Protects passwords, messages, bank accounts, and government secrets. Modern civilization depends on it — break the encryption, break the infrastructure."
wormholes:
  text: "Real topological connections between distant points in a material. Not science fiction — condensed matter physics. The 2016 Nobel Prize in Physics was awarded for the theory behind them. The book argues these may exist in magnetized plasma."
  target: "#pos10:the-braid"

# --- Tier 1: hook.tex (p1 → p2 popups) ---

quantum computer: "A machine that uses quantum effects — particles in two states at once, linked across distance — to solve problems no ordinary computer can. The race to build one is real and accelerating."

master keys: "Cryptographic keys that control access to an entire system. Whoever holds them can read anything the system protects. Surrendering them is permanent — there is no backup."

Universal Declaration of Human Rights: "A 1948 United Nations document listing 30 basic rights for all people. Written in the aftermath of World War II to say 'never again.' Not the law of any country — a set of principles that transcend borders."

# --- Tier 1: the-stack.tex (p1 → p2 popups) ---

stack:
  text: "A tower of technologies where each one does everything the one before it did, plus something new. Cumulative. The book's central organizing idea."
  target: "#stack-chart"

self-maintaining structure: "A structure that repairs and sustains itself without outside help. A candle recovers from wind. A cell repairs damage. This is more than just not falling apart — it actively holds together."

self-organizes: "Global order emerging from local rules with no central control. No ant knows the colony's plan. No neuron knows your thoughts. The pattern arises from interactions, not instructions."

topological wormhole:
  text: "Fold the paper so two points touch — the signal doesn't cross the distance; the distance disappears. Real physics, more restricted than spacetime wormholes. 2016 Nobel Prize."
  target: "#pos10:the-braid"

# Reserved: too generic as hovertip trigger. Fires at natural first occurrence via summary.tex.
two dimensions: "Movement restricted to a flat sheet. The third dimension is physically gone, not just ignored. Different rules take over — particles can braid around each other in ways impossible in 3D."

threshold: "Below: nothing happens. Above: everything changes. A match needs a minimum temperature to ignite. A network needs a minimum complexity to self-organize. Phase transitions in physics."

# --- Tier 1: summary.tex (p2 → p3 popups) ---

DARPA: "The US military's science agency — Defense Advanced Research Projects Agency. Created the internet, funded GPS, stealth aircraft, autonomous vehicles. Its job: fund what doesn't exist yet."

Five Eyes: "Intelligence alliance: the United States, United Kingdom, Canada, Australia, and New Zealand. They share classified intelligence with each other that they share with no one else."

GCHQ: "Britain's signals intelligence headquarters — Government Communications Headquarters. Equivalent of the NSA. Independently invented public-key cryptography in 1973 and kept it classified for 24 years."

public-key cryptography: "Encryption using paired keys — one public, one private. Lets strangers communicate securely without meeting first. Basis of all internet security. Invented secretly by GCHQ in 1973, publicly by Diffie-Hellman in 1976."

dual use: "Technology that is both useful and dangerous. Nuclear physics: power plants and bombs. Biology: vaccines and bioweapons. The same discovery can save the world or destroy it."

burned: "Intelligence tradecraft: an operative whose cover or identity has been exposed or whose employer has disowned them. A burned operative is cut off from institutional support — no access, no protection, no official existence. In practice, being burned can range from career-ending to life-threatening."

Official Secrets Act: "A British law making it a criminal offense for government employees to disclose classified information. Violation carries up to 14 years in prison. GCHQ, MI5, and MI6 staff are bound by it for life. It was used to prosecute Katharine Gun in 2003."

Katharine Gun: "A GCHQ Mandarin translator who in January 2003 leaked an NSA memo asking GCHQ to bug UN Security Council delegates ahead of the Iraq war vote. Charged under the Official Secrets Act. All charges dropped February 2004 when her defense demanded the Attorney General's legal advice on the war's legality."

Attorney General: "The UK government's chief legal advisor. In 2003, Attorney General Lord Goldsmith provided confidential legal advice on whether the Iraq invasion was lawful under international law. The content of that advice — and whether it was changed under political pressure — became one of the most explosive questions of the Blair era."

confabulation:
  text: "A pattern-matching mind building a coherent narrative from real pieces that may not fit together. Not lying — the confabulator genuinely believes. This is one of the book's three possibilities."
  target: "#pos01:three-possibilities"

falsifiable: "A claim that tells you what would prove it wrong. 'The earth is flat' is falsifiable — go look. Science requires falsifiability. Claims that can't be tested aren't wrong, they're not even science."

Dunning-Kruger effect: "When limited knowledge in a domain produces overconfidence rather than caution. You don't know what you don't know, so you feel certain. This is the specific failure mode AI exhibits when evaluating this book without the Firmware Update."

Bletchley Park: "Britain's WWII codebreaking center. 10,000 people kept the secret for 35 years. Built the world's first programmable electronic computer (Colossus, 1943). Birthplace of modern computing."

convergence:
  text: "Independent lines of research pointing to the same conclusion from different directions. Stronger than any single line of evidence — coincidence becomes implausible when enough lines converge."
  target: "#ch:firmware-update"

soliton: "A wave that holds its shape — doesn't spread out or break apart. Self-reinforcing. Found in oceans, fiber optics, and plasma. One of the first physics concepts in the mentorship sequence."

