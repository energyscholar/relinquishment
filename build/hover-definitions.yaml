  text: "A particle that exists only in two dimensions. Exchange two anyons and you get any phase angle — not just +1 (boson) or −1 (fermion). The 'any' in anyon. Predicted 1977, confirmed experimentally 2020."
  target: "#pos10:the-braid"
  html: >-
    <p style="margin:0 0 0.5em;font-size:0.95em;line-height:1.5;">
    <strong>Anyon braiding</strong> — two particles winding around each other
    in 2+1D spacetime. The path is the computation. Topologically protected:
    only the winding matters, not the details.</p>
