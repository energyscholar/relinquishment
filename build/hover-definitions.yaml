computational universality: "Any sufficiently complex system can compute anything any other system can. Turing's 1936 insight. Means the substrate doesn't matter — if it's complex enough, it can think."

cellular automata:
  text: "A grid of cells following simple local rules. Can generate unlimited complexity from trivial starting conditions. Wolfram's central object — proof that simple rules produce complex behavior."
  html: >-
    <p style="margin:0 0 0.5em;font-size:0.95em;line-height:1.5;">
    <strong>Cellular automata</strong> — a grid of cells following simple local
    rules. Can generate unlimited complexity from trivial starting conditions.
    Rule 110 (shown below) is Turing-complete: this pattern, generated by one
    of the simplest possible rules, can compute anything any computer can.</p>
