cellular automaton:
  text: "A grid of cells following simple local rules. Can generate unlimited complexity from trivial starting conditions. Wolfram's central object — proof that simple rules produce complex behavior."
  html: >-
    <p style="margin:0 0 0.5em;font-size:0.95em;line-height:1.5;">
    <strong>Cellular automaton</strong> — a grid of cells following simple local
    rules. Can generate unlimited complexity from trivial starting conditions.
    Rule 110 (shown below) is Turing-complete: this pattern, generated by one
    of the simplest possible rules, can compute anything any computer can.</p>
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 164 115" width="164"
    height="115" style="display:block;margin:0.3em auto;">
    <title>Rule 110 cellular automaton — a triangular pattern of blue and white cells growing downward from a single cell. Each row is computed from the row above using one simple rule. Despite the trivial rule, the pattern is complex and never repeats. This specific rule (number 110 out of 256 possible) was proven Turing-complete — it can compute anything.</title>
