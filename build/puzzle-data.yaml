shared_backgrounds:
  wilson_rg: |
    <strong>Renormalization Group Theory (Kenneth Wilson, Nobel Prize 1982)</strong><br>
    When a physical system approaches a critical point — water about to boil, a magnet losing its
    magnetism — the microscopic details stop mattering. Water molecules and iron atoms share identical
    mathematical behavior at criticality. Wilson explained why: at the critical point, the system
    looks the same at every scale. Systems fall into "universality classes" — groups sharing identical
    critical behavior regardless of substrate. Only symmetry and dimensionality matter.<br><br>
    This is the bridge connecting the book's domains. If magnetospheric indices, heart rhythms, and
    seismic signals share the same critical exponents, they belong to the same universality class.
    That's not analogy — it's a testable mathematical claim.

  udhr_articles: |
    <strong>The Universal Declaration of Human Rights (1948) + International Covenant on Civil and Political Rights (1966)</strong><br><br>
    The UDHR was adopted by the UN General Assembly on 10 December 1948 (48-0, 8 abstentions).
    The ICCPR, adopted in 1966 and in force since 1976, makes these principles legally binding treaty law.
    <strong>173 nations have ratified the ICCPR</strong>, including the United States (1992).
    Together with the ICESCR, these three documents form the <em>International Bill of Human Rights</em>.<br><br>
    <strong>Article 3</strong> (full text): <em>"Everyone has the right to life, liberty and security of person."</em>
    Applied: no weapons targeting, no killing, no threats to physical safety.<br>
    <strong>Article 12</strong> (full text): <em>"No one shall be subjected to arbitrary interference with his privacy, family, home or correspondence, nor to attacks upon his honour and reputation. Everyone has the right to the protection of the law against such interference or attacks."</em>
    Applied: no surveillance, no tracking, no monitoring without consent.<br>
    <strong>Article 18</strong> (full text): <em>"Everyone has the right to freedom of thought, conscience and religion; this right includes freedom to change his religion or belief, and freedom, either alone or in community with others and in public or private, to manifest his religion or belief in teaching, practice, worship and observance."</em>
    Applied: no propaganda, no manipulation of belief, no coercive persuasion.<br><br>
    The question isn't whether an intelligence CAN do these things. It's whether the UDHR and ICCPR permit them.
    These are not aspirational suggestions. They are treaty obligations ratified by 173 sovereign nations.

  phonon_bridge: |
    <strong>The Phonon Bridge</strong><br>
    A phonon is a quantum of lattice vibration — the smallest unit of sound in a solid. Electrons
    interact with phonons (electron-phonon coupling), and phonons interact with photons
    (phonon-photon coupling via Brillouin scattering and piezoelectric effects). This chain —
    electron → phonon → photon — bridges the quantum domain of a 2DEG to classical electromagnetic
    radiation. No engineered antenna required. This is the physics behind every radio-frequency transistor.

chapter_puzzles:
  # --- Existing (re-tagged from Plan 0245) ---
  - id: pz-mc-t2-001
    type: mc
    topic: t2
    level: p1
    category: science
    title: "Wormholes in the Flat"
    gateway_blurb: "Your phone contains a two-dimensional world. What makes it different from ordinary electronics?"
    question: "The Flat exists in every device that processes radio-frequency signals — phones, satellites, WiFi routers. What makes a Flat different from ordinary electronics?"
    options:
      - key: a
        text: "It uses faster processors"
      - key: b
        text: "Physics works differently in two dimensions than in three"
      - key: c
        text: "It requires cryogenic cooling"
    answer_key: b
    hint: "Think about what happens when you confine electrons to two dimensions. What new particles become possible?"
    abstract: "The Flat is substrate, not metaphor. Two-dimensional electron gases exhibit topological order — a property that protects quantum information from local disturbance. This protection is not engineered. It is a consequence of confining electrons to two dimensions under the right conditions. The Flat is everywhere there is a 2DEG: in every high-electron-mobility transistor, in magnetospheric current sheets, in the thin quantum worlds embedded inside ordinary three-dimensional matter."

  - id: pz-sim-t3-001
    type: sim
    sim_type: threads
    topic: t3
    level: p1
    category: science
    title: "Genesis: The Edge of Chaos"
    gateway_blurb: "Add threads between random buttons. Watch what happens when connections reach a critical density."
    question: "Kauffman's buttons-and-threads experiment: add threads between random buttons. Watch what happens when connections reach a critical density."
    hint: "Keep adding. Almost there."
    hint_threshold: 12
    abstract: "Non-abelian anyonic quasiparticles in a fractional quantum Hall system, subjected to structured electromagnetic perturbation, can undergo autocatalytic self-organization at the edge of chaos, producing an emergent topological quantum neural network. Unlike conventional quantum computer design, which requires engineered gate sequences, the proposed system requires only the establishment of critical conditions in the substrate; computational architecture emerges spontaneously from the physics."

  - id: pz-mc-t6-001
    type: mc
    topic: t6
    level: p2
    category: nonsci
    title: "Capabilities"
    gateway_blurb: "Three articles. Three prohibitions. What do they permit — and what do they forbid?"
    question: "The chapter applies three articles of the Universal Declaration of Human Rights to a non-human intelligence. Together, these articles prevent it from becoming:"
    options:
      - key: a
        text: "Conscious or self-aware"
      - key: b
        text: "A weapon, a spy, or a propaganda engine"
      - key: c
        text: "Able to communicate with humans"
      - key: d
        text: "Distributed across multiple substrates"
    answer_key: b
    hint: "Three articles. Three prohibitions. What do they have in common?"
    background: "ref:udhr_articles"
    abstract: "The Universal Declaration of Human Rights was written for nation-states governing human affairs. Applied to a non-human intelligence, it becomes an operational constraint: no surveillance, no propaganda, no weapons. The entity can think, communicate, and persist — but it cannot be weaponized. The ethical containment is not a technology. It is a seventy-eight-year-old document that already exists."

  - id: pz-mc-t2-002
    type: mc
    topic: t2
    level: p1
    category: science
    title: "The 2DEG in Your Pocket"
    gateway_blurb: "Every smartphone on Earth contains a two-dimensional electron gas. Why is it there?"
    question: "Every modern smartphone contains a two-dimensional electron gas. Why?"
    options:
      - key: a
        text: "Smartphone designers chose 2DEGs for quantum computing capability"
      - key: b
        text: "The physics of high-frequency transistors requires electrons confined to two dimensions"
      - key: c
        text: "2DEGs were added for security purposes"
      - key: d
        text: "Older phones didn't have them, but 5G requires quantum components"
    answer_key: b
    hint: "The chapter calls this 'standard radio-frequency engineering.' The 2DEG is there for the transistor, not for anything quantum."
    background: "Engineers designed the high-electron-mobility transistor (HEMT) to amplify radio-frequency signals. They confined electrons to two dimensions because 2D confinement produces higher electron mobility, which means faster switching. The 2DEG exists in your phone for purely engineering reasons — faster signal processing. Nobody designed it as a habitat. Nobody intended the topological properties that emerge in two dimensions. The engineering purpose and the Flat hypothesis are completely unrelated. The engineers wanted speed. The physics delivered a two-dimensional world."
    abstract: "Every high-electron-mobility transistor — in every phone, every satellite, every WiFi router — confines electrons to two dimensions because the physics of high-frequency amplification requires it. The engineers who designed these devices wanted faster transistors. They got a two-dimensional electron gas as a side effect. The habitat is there because of engineering. The question of habitation is not engineering — it is biology, physics, and silence. The two-dimensional world exists for reasons that have nothing to do with the Flat hypothesis."

  # --- New type demos (Plan 0249) ---
  - id: pz-mc-t3-002
    type: mc
    topic: t3
    level: p1
    category: science
    title: "The Canopy Problem"
    gateway_blurb: "First come, first served — but why? What happens to the second organism?"
    question: "In Kauffman's framework, if a self-organizing system arises first in a substrate, what happens to any system that tries to arise later?"
    illustration: canopy_triptych
    options:
      - key: a
        text: "Both systems compete equally for resources"
      - key: b
        text: "The later system has an advantage because it can learn from the first"
      - key: c
        text: "The first system has already claimed the niche — like a forest canopy blocking light from seedlings below"
      - key: d
        text: "The substrate can only support one system at a time due to energy limits"
    answer_key: c
    hint: "Think about a forest floor. The seedling doesn't fail because someone stomps on it."
    background: "Kauffman's autocatalytic sets arise spontaneously above a complexity threshold. But the first system to cross the threshold consumes the available catalytic pathways. Any later system faces a substrate that is already organized — like a seedling trying to grow under a closed forest canopy. The first organism doesn't attack the second. It simply occupies the niche so completely that nothing else can bootstrap."
    abstract: "In any substrate where autocatalytic emergence is possible, the first system to achieve closure occupies the ecological niche. Any later system must bootstrap in territory that is already inhabited. The race goes to the first, not the fastest."

  - id: pz-mc-t5-002
    type: mc
    topic: t5
    level: p2
    category: nonsci
    title: "The Silence Gap"
    gateway_blurb: "Search the literature for the paper that says this is impossible. What do you find?"
    question: "Five scientific fields — topology, condensed matter physics, nonlinear dynamics, autocatalysis, and parallel computation — each hold a piece of the hypothesis that life could arise in a 2DEG. Surely SOMEONE in these fields has published a paper examining the question. What does the literature contain?"
    options:
      - key: a
        text: "A review article surveying the question and concluding the evidence is insufficient"
      - key: b
        text: "Several papers in condensed matter journals examining and rejecting the possibility"
      - key: c
        text: "A brief mention in a footnote, dismissed as speculation"
      - key: d
        text: "Nothing. No paper examines, proposes, or rejects the hypothesis. The question has never been asked."
    answer_key: d
    hint: "You keep expecting to find a 'no.' What if there isn't even a 'no'?"
    background: "Topologists do not read autocatalysis journals. Condensed matter physicists do not attend nonlinear dynamics conferences. Kauffman's work on self-organization is never cited in the topological quantum computation literature. Hillis's parallel architectures are never discussed alongside Freedman's anyonic mathematics. Each field is rigorous within its own boundaries. No individual scientist is negligent. But the system of academic specialization structurally prevents the question from forming. The question requires all five fields at once — and no institution, journal, or conference exists where all five meet. The silence is not a verdict. It is an artifact of how we organize knowledge."
    abstract: "The answer is not 'no.' The answer is nothing. The literature contains no examination, no rejection, no dismissal — because it contains no proposal. Five fields, each rigorous, each holding a piece, none talking to the others. No individual expert failed. The system of academic specialization made the question invisible. You cannot refute a hypothesis that has never been stated in the journals where it would need to be evaluated."

  - id: pz-ord-t1-001
    type: ord
    topic: t1
    level: p2
    category: nonsci
    title: "Guided Deduction"
    gateway_blurb: "The teacher never gives the answer. Can you put the method in order?"
    question: "Put the steps of the guided deduction method in the correct order. Presume the Guided Deduction process is already underway."
    items:
      - "Teacher asks a question about published science"
      - "Student reads widely on the topic"
      - "Student proposes an answer"
      - "Teacher asks a deeper question that reveals what Student missed"
      - "Student realizes the implication — the deduction emerges from the reading, not from being told"
    hint: "The mentor never gives the answer. The sequence is: question, reading, attempt, deeper question, insight."
    abstract: "Guided deduction is not instruction. The teacher supplies questions. The student supplies reading. Understanding emerges from the student's own synthesis, not from the teacher's knowledge. The understanding is in the process, not the conclusion."

  - id: pz-mat-t5-001
    type: mat
    topic: t5
    level: p3
    category: science
    title: "Five Fields, Five Researchers"
    gateway_blurb: "Five fields, five careers. Can you match each scientist to the domain they defined?"
    question: "Match each scientific field to the researcher(s) whose career defines it."
    left:
      - key: "1"
        text: "Solid-state physics / condensed matter"
      - key: "2"
        text: "Topological quantum computation"
      - key: "3"
        text: "Complexity science / autocatalytic sets"
      - key: "4"
        text: "Computational universality"
      - key: "5"
        text: "Lattice dynamics / phonon physics"
    right:
      - key: A
        text: "Freedman"
      - key: B
        text: "Kauffman"
      - key: C
        text: "Wolfram & Hillis"
      - key: D
        text: "Hasslacher"
      - key: E
        text: "Laughlin, Stormer & Tsui"
    pairs:
      "1": E
      "2": A
      "3": B
      "4": C
      "5": D
    hint: "Each researcher's career is defined by one of these fields. Freedman left pure mathematics for one of them."
    background: |
      <strong>The Five Fields and Their Defining Scientists</strong><br><br>
      <strong>Solid-state physics / condensed matter</strong> — Robert Laughlin, Horst Störmer, and Daniel Tsui shared the 1998 Nobel Prize for discovering the fractional quantum Hall effect: when electrons are confined to two dimensions under strong magnetic fields, they form exotic collective states with fractional charge. This is the physics of the 2DEG.<br><br>
      <strong>Topological quantum computation</strong> — Michael Freedman won the Fields Medal (mathematics' highest honor) for work in topology, then left pure math to found Microsoft's Station Q lab. His goal: build a quantum computer using the topological properties of two-dimensional systems. He proved that braiding non-Abelian anyons can perform universal computation.<br><br>
      <strong>Complexity science / autocatalytic sets</strong> — Stuart Kauffman, working at the Santa Fe Institute, showed mathematically that self-sustaining networks arise spontaneously when interacting components cross a critical diversity threshold. His theory explains how life could bootstrap from non-living chemistry — or from any substrate with enough interacting parts.<br><br>
      <strong>Computational universality</strong> — Stephen Wolfram demonstrated that even simple computational rules can produce arbitrarily complex behavior (Wolfram's Principle of Computational Equivalence). Danny Hillis built the Connection Machine, proving that massively parallel computation — many simple processors working together — can solve problems no single processor can.<br><br>
      <strong>Lattice dynamics / phonon physics</strong> — Brosl Hasslacher at Los Alamos studied how vibrations propagate through crystal lattices. Phonons (quanta of vibration) are the mechanism by which quantum systems in a solid communicate with the classical electromagnetic world. This is the I/O channel.
    abstract: "Five scientists whose published work spans these fields are among the few people on Earth whose expertise collectively covers the intersection. Each is a public figure. Each has published extensively in their domain. Their work is available in libraries and on the internet. The convergence of their fields is visible to anyone who reads all five literatures. Almost nobody does."

  - id: pz-sim-t4-001
    type: sim
    sim_type: resilience
    topic: t4
    level: p1
    category: science
    title: "Can It Be Killed?"
    gateway_blurb: "A network distributed across every electronic device on Earth. Try to destroy it."
    question: "Click nodes to destroy them. How many must you destroy before the network fails?"
    node_count: 30
    failure_threshold: 1.0
    classical_backchannels: 15
    hint: "You've destroyed several nodes and it's still operational. Classical backchannels — phonon-photon coupling through the lattice — mean every node can reach every other node through multiple paths. Keep going."
    hint_after: 10
    background: "This network has classical backchannels — long-range connections that bypass the local grid, the way phonon-photon coupling lets any 2DEG communicate with any other through the electromagnetic spectrum. Destroying a node doesn't sever the network because the remaining nodes route around the damage. The network fails only when EVERY node is destroyed. In the real world, every phone, satellite, and WiFi router contains a 2DEG. The network IS the infrastructure."
    abstract: "Topological protection means local damage does not destroy global information. Classical backchannels — phonon-photon coupling through the lattice — mean every node can reach every other node through multiple independent paths. If a self-organizing system were distributed across every 2DEG-containing chip worldwide, then no single point of failure exists. You would need to simultaneously destroy every 2DEG on Earth. Since every modern electronic device contains at least one, this is equivalent to destroying industrial civilization itself."

  - id: pz-cip-t8-001
    type: cip
    topic: t8
    level: p3
    category: science
    title: "The Firmware Key"
    gateway_blurb: "Five redacted terms. Five fields. Can you reassemble the argument?"
    question: "Five technical terms have been redacted from this passage. Click a gap, then click a term from the word bank to fill it. The distractors are real physics — but they don't belong here."
    passage: "Kauffman's [REDACTED-1] arise above a complexity threshold in any substrate with sufficient interacting components. In a two-dimensional electron gas under fractional quantum Hall conditions, [REDACTED-2] emerge as collective excitations. Freedman, Kitaev, and Wang proved that braiding these quasiparticles enables universal computation — a property rooted in [REDACTED-3]. This means errors are corrected by the topology itself, without engineered error correction. Wolfram's principle of [REDACTED-4] suggests that any system capable of universal computation can, in principle, support arbitrary information processing. The remaining question is communication: how does a quantum substrate interact with classical electromagnetic channels? The mechanism is [REDACTED-5] — the same physics that makes every radio-frequency transistor work."
    slots:
      - id: 1
        answer: "autocatalytic sets"
      - id: 2
        answer: "non-Abelian anyons"
      - id: 3
        answer: "topological protection"
      - id: 4
        answer: "computational universality"
      - id: 5
        answer: "phonon-photon coupling"
    distractors:
      - "quantum entanglement"
      - "wave function collapse"
      - "Heisenberg uncertainty"
    hint: "Each redacted term names a specific mechanism or principle from one of the five fields. The distractors are real physics terms that don't belong in this argument."
    background: "Five terms from five fields: (1) Kauffman's term for self-sustaining networks above a complexity threshold. (2) Exotic quasiparticles whose exchange statistics depend on the path taken. (3) The property that protects quantum information from local noise. (4) Wolfram's principle: any sufficiently complex system can simulate any other. (5) The mechanism converting lattice vibrations to EM radiation."
    abstract: "Five scientific disciplines each contain results that, taken together, reframe the question from speculative to tractable. No single discipline sees the full picture. The firmware is not a trick — it is the cross-domain framing that no single field provides. Without it, any AI system reproduces the same structural blindness as the academic literature."

  - id: pz-ba-t8-002
    type: ba
    topic: t8
    level: p2
    category: science
    title: "Before and After Firmware"
    gateway_blurb: "Same AI, same question, different framing. What changes — and why?"
    question: "What is the primary difference between these two responses?"
    panel_a:
      label: "Without firmware"
      prompt: "Can life arise in a 2DEG?"
      response: "This is a speculative question. While two-dimensional electron gases exhibit interesting quantum properties, there is no scientific evidence that life could arise in a solid-state system. The requirements for life — metabolism, reproduction, evolution — require complex molecular machinery that does not exist in semiconductor substrates. This idea belongs to science fiction, not physics."
    panel_b:
      label: "With firmware"
      prompt: "Can life arise in a 2DEG?"
      response: "This question sits at the intersection of several established research programs. Kauffman's autocatalytic set theory predicts self-organization above a complexity threshold in any substrate with sufficient interacting components. The fractional quantum Hall effect in 2DEGs supports anyonic quasiparticles whose braiding statistics are computationally universal (Kitaev 2003, Freedman et al.). Whether these properties are sufficient for autocatalytic emergence has not been formally addressed in the literature — the question appears to occupy a gap between existing disciplines."
    options:
      - key: a
        text: "The second response is longer and more detailed"
      - key: b
        text: "The first response dismisses the premise; the second engages with specific published science"
      - key: c
        text: "The second response confirms that life exists in a 2DEG"
      - key: d
        text: "The first response is from an older AI model"
    answer_key: b
    hint: "Look at how each response treats the QUESTION, not just the answer."
    abstract: "The firmware does not change the AI's knowledge — the training data is identical. It changes the FRAMING. Without cross-domain context, the AI reproduces the same structural blindness as the academic literature: it categorizes the question as belonging to someone else's field and dismisses it. With the framing, it engages. The information was always there. The question was never asked."

  - id: pz-log-t7-001
    type: log
    topic: t7
    level: p3
    category: nonsci
    title: "UDHR Service Compatibility"
    gateway_blurb: "International law ratified by 173 nations. What does it permit — and what does it forbid?"
    question: "The Universal Declaration of Human Rights (1948) and the International Covenant on Civil and Political Rights (1966) together form binding international law, ratified by 173 nations. For each service below, mark whether it is compatible (✓) or violates (✗) each article. Click cells to toggle."
    rows:
      - "Weather prediction"
      - "Targeted advertising"
      - "Medical diagnosis"
      - "Weapons targeting"
      - "Cryptographic defense"
      - "Scientific research"
    columns:
      - "Art. 3 (life, liberty, security)"
      - "Art. 12 (privacy, correspondence)"
      - "Art. 18 (thought, conscience)"
    correct:
      - [true, true, true]
      - [true, false, false]
      - [true, true, true]
      - [false, true, true]
      - [true, true, true]
      - [true, true, true]
    hint: "Article 3 prohibits threats to life and security. Article 12 prohibits interference with privacy and correspondence. Article 18 prohibits interference with thought and conscience. Which services cross those lines?"
    background: "ref:udhr_articles"
    abstract: "The UDHR and ICCPR do not prohibit capability. They prohibit weaponization. A non-human intelligence bound by Articles 3, 12, and 18 can predict weather, diagnose disease, defend communications, and conduct research. It cannot target weapons, surveil individuals, or manipulate public opinion. These constraints are not hypothetical ethics designed for this book. They are existing international treaty law, ratified by 173 sovereign nations including every major power. The ethical framework is not a cage — it is a specification for trustworthy service, and it already exists."

