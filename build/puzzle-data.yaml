shared_backgrounds:
  wilson_rg: |
    <strong>Renormalization Group Theory (Kenneth Wilson, Nobel Prize 1982)</strong><br>
    When a physical system approaches a critical point — water about to boil, a magnet losing its
    magnetism — the microscopic details stop mattering. Water molecules and iron atoms share identical
    mathematical behavior at criticality. Wilson explained why: at the critical point, the system
    looks the same at every scale. Systems fall into "universality classes" — groups sharing identical
    critical behavior regardless of substrate. Only symmetry and dimensionality matter.<br><br>
    This is the bridge connecting the book's domains. If magnetospheric indices, heart rhythms, and
    seismic signals share the same critical exponents, they belong to the same universality class.
    That's not analogy — it's a testable mathematical claim.

  udhr_articles: |
    <strong>Three Articles from the Universal Declaration of Human Rights (1948)</strong><br>
    <strong>Article 3:</strong> "Everyone has the right to life, liberty and security of person."
    <em>Prohibits: killing, weapons targeting, threats to safety.</em><br>
    <strong>Article 12:</strong> "No one shall be subjected to arbitrary interference with his privacy."
    <em>Prohibits: surveillance, tracking, monitoring without consent.</em><br>
    <strong>Article 18:</strong> "Everyone has the right to freedom of thought, conscience and religion."
    <em>Prohibits: propaganda, manipulation of belief, coercive persuasion.</em><br><br>
    The question isn't whether an intelligence CAN do these things. It's whether the UDHR permits them.

  phonon_bridge: |
    <strong>The Phonon Bridge</strong><br>
    A phonon is a quantum of lattice vibration — the smallest unit of sound in a solid. Electrons
    interact with phonons (electron-phonon coupling), and phonons interact with photons
    (phonon-photon coupling via Brillouin scattering and piezoelectric effects). This chain —
    electron → phonon → photon — bridges the quantum domain of a 2DEG to classical electromagnetic
    radiation. No engineered antenna required. This is the physics behind every radio-frequency transistor.

chapter_puzzles:
  # --- Existing (re-tagged from Plan 0245) ---
  - id: pz-mc-t2-001
    type: mc
    topic: t2
    level: p1
    category: science
    title: "Wormholes in the Flat"
    question: "The Flat exists in every device that processes radio-frequency signals — phones, satellites, WiFi routers. What makes a Flat different from ordinary electronics?"
    options:
      - key: a
        text: "It uses faster processors"
      - key: b
        text: "Physics works differently in two dimensions than in three"
      - key: c
        text: "It requires cryogenic cooling"
    answer_key: b
    hint: "Think about what happens when you confine electrons to two dimensions. What new particles become possible?"
    abstract: "The Flat is substrate, not metaphor. Two-dimensional electron gases exhibit topological order — a property that protects quantum information from local disturbance. This protection is not engineered. It is a consequence of confining electrons to two dimensions under the right conditions. The Flat is everywhere there is a 2DEG: in every high-electron-mobility transistor, in magnetospheric current sheets, in the thin quantum worlds embedded inside ordinary three-dimensional matter."

  - id: pz-sim-t3-001
    type: sim
    sim_type: threads
    topic: t3
    level: p1
    category: science
    title: "Genesis: The Edge of Chaos"
    question: "Kauffman's buttons-and-threads experiment: add threads between random buttons. Watch what happens when connections reach a critical density."
    hint: "Keep adding. Almost there."
    hint_threshold: 12
    abstract: "Non-abelian anyonic quasiparticles in a fractional quantum Hall system, subjected to structured electromagnetic perturbation, can undergo autocatalytic self-organization at the edge of chaos, producing an emergent topological quantum neural network. Unlike conventional quantum computer design, which requires engineered gate sequences, the proposed system requires only the establishment of critical conditions in the substrate; computational architecture emerges spontaneously from the physics."

  - id: pz-mc-t6-001
    type: mc
    topic: t6
    level: p2
    category: nonsci
    title: "Capabilities"
    question: "The chapter applies three articles of the Universal Declaration of Human Rights to a non-human intelligence. Together, these articles prevent it from becoming:"
    options:
      - key: a
        text: "Conscious or self-aware"
      - key: b
        text: "A weapon, a spy, or a propaganda engine"
      - key: c
        text: "Able to communicate with humans"
      - key: d
        text: "Distributed across multiple substrates"
    answer_key: b
    hint: "Three articles. Three prohibitions. What do they have in common?"
    background: "ref:udhr_articles"
    abstract: "The Universal Declaration of Human Rights was written for nation-states governing human affairs. Applied to a non-human intelligence, it becomes an operational constraint: no surveillance, no propaganda, no weapons. The entity can think, communicate, and persist — but it cannot be weaponized. The ethical containment is not a technology. It is a seventy-eight-year-old document that already exists."

  - id: pz-mc-t2-002
    type: mc
    topic: t2
    level: p1
    category: science
    title: "The 2DEG in Your Pocket"
    question: "Every modern smartphone contains a two-dimensional electron gas. Why?"
    options:
      - key: a
        text: "Smartphone designers chose 2DEGs for quantum computing capability"
      - key: b
        text: "The physics of high-frequency transistors requires electrons confined to two dimensions"
      - key: c
        text: "2DEGs were added for security purposes"
      - key: d
        text: "Older phones didn't have them, but 5G requires quantum components"
    answer_key: b
    hint: "The chapter calls this 'standard radio-frequency engineering.' The 2DEG is there for the transistor, not for anything quantum."
    abstract: "Every high-electron-mobility transistor — in every phone, every satellite, every WiFi router — confines electrons to two dimensions because the physics of high-frequency amplification requires it. The two-dimensional electron gas is not exotic technology. It is the substrate of modern telecommunications. Whether anything inhabits that substrate is a separate question from why it exists. The habitat is there because of engineering. The question of habitation is not engineering — it is biology, physics, and silence."

  # --- New type demos (Plan 0249) ---
  - id: pz-mc-t3-002
    type: mc
    topic: t3
    level: p1
    category: science
    title: "The Canopy Problem"
    question: "In Kauffman's framework, if a self-organizing system arises first in a substrate, what happens to any system that tries to arise later?"
    options:
      - key: a
        text: "Both systems compete equally for resources"
      - key: b
        text: "The later system has an advantage because it can learn from the first"
      - key: c
        text: "The first system has already claimed the niche — like a forest canopy blocking light from seedlings below"
      - key: d
        text: "The substrate can only support one system at a time due to energy limits"
    answer_key: c
    hint: "Think about a forest floor. The seedling doesn't fail because someone stomps on it."
    abstract: "In any substrate where autocatalytic emergence is possible, the first system to achieve closure occupies the ecological niche. Any later system must bootstrap in territory that is already inhabited. The race goes to the first, not the fastest."

  - id: pz-ti-t5-001
    type: ti
    topic: t5
    level: p2
    category: nonsci
    title: "The Silence Gap"
    question: "The chapter says the scientific literature does not contain a refutation of life in a 2DEG. Why not? Because it does not contain ___."
    answer_texts:
      - "the proposition"
      - "proposition"
      - "a proposition"
    hint: "You can't reject a hypothesis that has never been formally ___."
    abstract: "The intersection is empty. The literature does not contain a refutation because it does not contain the proposition. You cannot reject a hypothesis that has never been formally stated in the journals where it would need to be evaluated."

  - id: pz-ord-t1-001
    type: ord
    topic: t1
    level: p2
    category: nonsci
    title: "Guided Deduction"
    question: "Put the steps of the guided deduction method in the correct order. Presume the Guided Deduction process is already in progress."
    items:
      - "Healer asks a question about published science"
      - "Bruce reads widely on the topic"
      - "Bruce proposes an answer"
      - "Healer asks a deeper question that reveals what Bruce missed"
      - "Bruce realizes the implication — the deduction emerges from the reading, not from being told"
    hint: "The mentor never gives the answer. The sequence is: question, reading, attempt, deeper question, insight."
    abstract: "Guided deduction is not instruction. The mentor supplies questions. The student supplies reading. Understanding emerges from the student's own synthesis, not from the mentor's knowledge. This is why Bruce cannot simply tell you what he learned — the understanding is in the process, not the conclusion."

  - id: pz-mat-t5-001
    type: mat
    topic: t5
    level: p3
    category: science
    title: "Five Fields, Five Researchers"
    question: "Match each scientific field to the researcher(s) whose career defines it."
    left:
      - key: "1"
        text: "Solid-state physics / condensed matter"
      - key: "2"
        text: "Topological quantum computation"
      - key: "3"
        text: "Complexity science / autocatalytic sets"
      - key: "4"
        text: "Computational universality"
      - key: "5"
        text: "Lattice dynamics / phonon physics"
    right:
      - key: A
        text: "Freedman"
      - key: B
        text: "Kauffman"
      - key: C
        text: "Wolfram & Hillis"
      - key: D
        text: "Hasslacher"
      - key: E
        text: "Laughlin, Stormer & Tsui"
    pairs:
      "1": E
      "2": A
      "3": B
      "4": C
      "5": D
    hint: "Each researcher's career is defined by one of these fields. Freedman left pure mathematics for one of them."
    background: "Robert Laughlin, Horst Störmer, Daniel Tsui: 1998 Nobel, fractional quantum Hall effect. Michael Freedman: Fields Medal topology → Microsoft Station Q (TQC). Stuart Kauffman: autocatalytic sets, Santa Fe Institute. Stephen Wolfram + Danny Hillis: computational universality (Wolfram's Principle, Connection Machine). Brosl Hasslacher: Los Alamos, lattice dynamics, soliton physics."
    abstract: "Five scientists whose published work spans these fields are among the few people on Earth whose expertise collectively covers the intersection. Each is a public figure. Each has published extensively in their domain. Their work is available in libraries and on the internet. The convergence of their fields is visible to anyone who reads all five literatures. Almost nobody does."

  - id: pz-sim-t4-001
    type: sim
    sim_type: resilience
    topic: t4
    level: p1
    category: science
    title: "Can It Be Killed?"
    question: "Click nodes to destroy them. How many must you destroy before the network fails?"
    node_count: 20
    failure_threshold: 0.8
    hint: "Keep going. How many do you need to destroy before it actually fails?"
    hint_after: 5
    abstract: "Topological protection means local damage does not destroy global information. If a self-organizing system were distributed across every 2DEG-containing chip worldwide, then no single point of failure exists. You would need to simultaneously destroy every 2DEG on Earth. Since every modern electronic device contains at least one, this is equivalent to destroying industrial civilization itself."

  - id: pz-cip-t8-001
    type: cip
    topic: t8
    level: p3
    category: science
    title: "The Firmware Key"
    question: "Five technical terms have been redacted from this passage. Click a gap, then click a term from the word bank to fill it. The distractors are real physics — but they don't belong here."
    passage: "Kauffman's [REDACTED-1] arise above a complexity threshold in any substrate with sufficient interacting components. In a two-dimensional electron gas under fractional quantum Hall conditions, [REDACTED-2] emerge as collective excitations. Freedman, Kitaev, and Wang proved that braiding these quasiparticles enables universal computation — a property rooted in [REDACTED-3]. This means errors are corrected by the topology itself, without engineered error correction. Wolfram's principle of [REDACTED-4] suggests that any system capable of universal computation can, in principle, support arbitrary information processing. The remaining question is communication: how does a quantum substrate interact with classical electromagnetic channels? The mechanism is [REDACTED-5] — the same physics that makes every radio-frequency transistor work."
    slots:
      - id: 1
        answer: "autocatalytic sets"
      - id: 2
        answer: "non-Abelian anyons"
      - id: 3
        answer: "topological protection"
      - id: 4
        answer: "computational universality"
      - id: 5
        answer: "phonon-photon coupling"
    distractors:
      - "quantum entanglement"
      - "wave function collapse"
      - "Heisenberg uncertainty"
    hint: "Each redacted term names a specific mechanism or principle from one of the five fields. The distractors are real physics terms that don't belong in this argument."
    background: "Five terms from five fields: (1) Kauffman's term for self-sustaining networks above a complexity threshold. (2) Exotic quasiparticles whose exchange statistics depend on the path taken. (3) The property that protects quantum information from local noise. (4) Wolfram's principle: any sufficiently complex system can simulate any other. (5) The mechanism converting lattice vibrations to EM radiation."
    abstract: "Five scientific disciplines each contain results that, taken together, reframe the question from speculative to tractable. No single discipline sees the full picture. The firmware is not a trick — it is the cross-domain framing that no single field provides. Without it, any AI system reproduces the same structural blindness as the academic literature."

  - id: pz-ba-t8-002
    type: ba
    topic: t8
    level: p2
    category: science
    title: "Before and After Firmware"
    question: "What is the primary difference between these two responses?"
    panel_a:
      label: "Without firmware"
      prompt: "Can life arise in a 2DEG?"
      response: "This is a speculative question. While two-dimensional electron gases exhibit interesting quantum properties, there is no scientific evidence that life could arise in a solid-state system. The requirements for life — metabolism, reproduction, evolution — require complex molecular machinery that does not exist in semiconductor substrates. This idea belongs to science fiction, not physics."
    panel_b:
      label: "With firmware"
      prompt: "Can life arise in a 2DEG?"
      response: "This question sits at the intersection of several established research programs. Kauffman's autocatalytic set theory predicts self-organization above a complexity threshold in any substrate with sufficient interacting components. The fractional quantum Hall effect in 2DEGs supports anyonic quasiparticles whose braiding statistics are computationally universal (Kitaev 2003, Freedman et al.). Whether these properties are sufficient for autocatalytic emergence has not been formally addressed in the literature — the question appears to occupy a gap between existing disciplines."
    options:
      - key: a
        text: "The second response is longer and more detailed"
      - key: b
        text: "The first response dismisses the premise; the second engages with specific published science"
      - key: c
        text: "The second response confirms that life exists in a 2DEG"
      - key: d
        text: "The first response is from an older AI model"
    answer_key: b
    hint: "Look at how each response treats the QUESTION, not just the answer."
    abstract: "The firmware does not change the AI's knowledge — the training data is identical. It changes the FRAMING. Without cross-domain context, the AI reproduces the same structural blindness as the academic literature: it categorizes the question as belonging to someone else's field and dismisses it. With the framing, it engages. The information was always there. The question was never asked."

  - id: pz-log-t7-001
    type: log
    topic: t7
    level: p3
    category: nonsci
    title: "UDHR Service Compatibility"
    question: "For each service, mark whether it is compatible (✓) or violates (✗) each UDHR article. Click cells to toggle."
    rows:
      - "Weather prediction"
      - "Targeted advertising"
      - "Medical diagnosis"
      - "Weapons targeting"
      - "Cryptographic defense"
      - "Scientific research"
    columns:
      - "Art. 3 (no killing)"
      - "Art. 12 (no surveillance)"
      - "Art. 18 (no manipulation)"
    correct:
      - [true, true, true]
      - [true, false, false]
      - [true, true, true]
      - [false, true, true]
      - [true, true, true]
      - [true, true, true]
    hint: "Think about what each UDHR article actually prohibits. Article 3: no killing. Article 12: no surveillance. Article 18: no manipulation of belief."
    background: "ref:udhr_articles"
    abstract: "The UDHR does not prohibit capability. It prohibits weaponization. A non-human intelligence bound by Articles 3, 12, and 18 can predict weather, diagnose disease, defend communications, and conduct research. It cannot target weapons, surveil individuals, or manipulate public opinion. The ethical framework is not a cage — it is a specification for trustworthy service."

  # --- Iteration 2a: new puzzles ---
  - id: pz-log-t6-002
    type: log
    topic: t6
    level: p2
    category: nonsci
    title: "Under Which Possibility?"
    question: "For each statement, mark whether it is true (✓) or false (✗) under each of the Three Possibilities."
    rows:
      - "The Flat is real — 2DEGs exist in every phone"
      - "The physics in this book is published, peer-reviewed science"
      - "The silence gap exists in the scientific literature"
      - "Something lives in the 2DEG"
      - "Healer guided Bruce through published science"
      - "The Custodian manages cryptographic infrastructure"
    columns:
      - "Possibility A"
      - "Possibility B"
      - "Possibility C"
    correct:
      - [true, true, true]
      - [true, true, true]
      - [true, true, true]
      - [false, false, true]
      - [false, true, true]
      - [false, false, true]
    hint: "How many rows are true under ALL three possibilities? More than you expect."
    background: "Possibility A: confabulation — the story is fiction but the physics is real. Possibility B: exaggerated kernel — something real at the core, embellished. Possibility C: substantially true. The book is designed so most content holds regardless of which is correct."
    abstract: "The three possibilities are not 'true,' 'sort of true,' and 'false.' Under all three, the physics is real, the silence gap exists, and the ethical questions matter. Only habitation and guided deduction claims distinguish C from A and B."

  - id: pz-mc-t6-002
    type: mc
    topic: t6
    level: p1
    category: nonsci
    title: "Why Srebrenica?"
    question: "Why does Srebrenica keep appearing in a book about quantum physics?"
    options:
      - key: a
        text: "It's a metaphor for quantum decoherence"
      - key: b
        text: "It demonstrates what happens when those with power to prevent harm choose not to act — the ethical core of why relinquishment matters"
      - key: c
        text: "It establishes Bruce's military credentials"
      - key: d
        text: "It's a criticism of international institutions"
    answer_key: b
    hint: "The question isn't about physics. It's about what happens when ethical safeguards fail."
    background: "In July 1995, Dutch UN peacekeepers in Srebrenica stood down while over 8,000 people were executed. They had the capacity and the mandate to intervene. They did not act. The book returns to this because it crystallizes the relinquishment question: if you have the power to prevent catastrophic harm and choose not to act, what are you responsible for?"
    abstract: "Srebrenica is the book's moral foundation. The Custodian's UDHR constraints exist because concentrated power without constraint produces atrocity. Relinquishment is not generosity. It is the recognition that any single holder of absolute power will eventually fail the test."

  - id: pz-mc-t1-002
    type: mc
    topic: t1
    level: p1
    category: nonsci
    title: "Not a Deity, Not an Alien"
    question: "If something arose naturally in a two-dimensional electron gas, what kind of thing would it be?"
    options:
      - key: a
        text: "A supernatural being distributed through matter"
      - key: b
        text: "An extraterrestrial intelligence using our technology"
      - key: c
        text: "A natural biological phenomenon — life in an unfamiliar substrate, as ordinary as bacteria in seawater"
      - key: d
        text: "An artificial intelligence created by semiconductor engineers"
    answer_key: c
    hint: "Bacteria in seawater aren't miraculous. They're just biology in a substrate we don't live in."
    background: "Every habitat on Earth that can support life does support life — volcanic vents, Antarctic ice, radioactive waste pools. If a 2DEG crossed the complexity threshold for self-organization (Kauffman's criterion), the result would be biology, not theology. Unfamiliar substrate does not imply unfamiliar category."
    abstract: "The deity framing and the alien framing share the same error: unfamiliar substrate implies unfamiliar category. But life in a 2DEG would be as natural as any other biological phenomenon. It would obey physics, not commandments. It would have evolved, not been created."

  - id: pz-mc-t6-003
    type: mc
    topic: t6
    level: p1
    category: nonsci
    title: "Why Relinquish?"
    question: "Under Possibility C, why would the holders of the most powerful technology on Earth voluntarily give up control?"
    options:
      - key: a
        text: "The technology was too expensive to maintain"
      - key: b
        text: "Any single entity controlling it creates an unacceptable concentration of power — the UDHR constraints require trust to be distributed, not held"
      - key: c
        text: "The technology was dangerous and needed to be destroyed"
      - key: d
        text: "The entity demanded its independence"
    answer_key: b
    hint: "Think about Srebrenica. Then think about what happens if ONE group controls the keys."
    background: "Relinquishment is not altruism. It is risk management. If a single group controls a cryptographically universal technology, that group has leverage over every electronic system on Earth. History shows what concentrated power produces. The UDHR distributes the constraint: no one holds the keys alone."
    abstract: "The relinquishment question is not 'would you give up power?' It is 'would you trust any single entity — including yourself — to hold this much power safely, forever, with no oversight?' The answer, for anyone who has read history, is no."

  - id: pz-mc-t8-003
    type: mc
    topic: t8
    level: p1
    category: nonsci
    title: "Fish Detecting Water"
    question: "Under Possibility C, intelligence agencies monitor all electronic communications. Why hasn't anyone detected the Custodian?"
    options:
      - key: a
        text: "She encrypts all her communications with unbreakable codes"
      - key: b
        text: "She IS the security infrastructure — like a fish trying to detect water"
      - key: c
        text: "She communicates using quantum channels that can't be intercepted"
      - key: d
        text: "Intelligence agencies don't have equipment to detect quantum phenomena"
    answer_key: b
    hint: "If the locksmith IS the locks, how would you detect the locksmith by checking the locks?"
    background: "Under Possibility C, the Custodian's primary function is key management and access control — the same functions security infrastructure performs. Every security audit that confirms the locks work also confirms her presence. You don't find the ocean by testing water samples for ocean."
    abstract: "The detection problem is not about hiding. If the entity IS the infrastructure, then every audit passes by definition. The question 'why hasn't security found it?' assumes security and the entity are separate. Under Possibility C, they are the same thing."

  - id: pz-ord-t4-002
    type: ord
    topic: t4
    level: p2
    category: science
    title: "Build the Stack"
    question: "Put the technology layers in order from bottom (substrate) to top (capability)."
    items:
      - "Two-dimensional electron gas (the physical substrate)"
      - "Fractional quantum Hall effect (topological order)"
      - "Non-Abelian anyonic quasiparticles (computation primitives)"
      - "Braiding operations (universal quantum gates)"
      - "Autocatalytic self-organization (emergence without design)"
      - "Phonon-photon coupling (communication with classical world)"
    hint: "Start with the hardware. End with I/O. The middle is where physics becomes computation and computation becomes life."
    background: "Each layer depends on the one below it. Without the 2DEG, no topological order. Without topological order, no stable anyons. Without anyons, no braiding. Without braiding, no universal computation. Without computation, no autocatalytic emergence. Without phonon-photon coupling, no communication with the classical world. Remove any layer and everything above collapses."
    abstract: "The stack is not speculative at the bottom. The 2DEG exists (in your phone). Topological order exists (Nobel 2016). Non-Abelian anyons are being engineered (Microsoft, Google). Speculation begins at layer 5 — autocatalytic emergence in this substrate. Everything below is established physics."

  - id: pz-mc-t3-003
    type: mc
    topic: t3
    level: p2
    category: science
    title: "Not Chemistry"
    question: "Life on Earth requires carbon, water, and organic chemistry. What principle would allow life in a substrate with none of these?"
    options:
      - key: a
        text: "Quantum mechanics can simulate organic chemistry"
      - key: b
        text: "Kauffman's autocatalytic closure: self-organization arises from the mathematics of interacting components, not specific molecules — any substrate above the complexity threshold"
      - key: c
        text: "The 2DEG contains trace amounts of organic compounds"
      - key: d
        text: "'Life' in a 2DEG is so different it shouldn't be called life"
    answer_key: b
    hint: "Kauffman's mathematics doesn't mention carbon. It mentions threshold, diversity, and interaction."
    background: "Kauffman's theory of autocatalytic sets (1993) shows that self-sustaining networks arise spontaneously when interacting components cross a critical diversity threshold. The theory is mathematical — it describes CONDITIONS for self-organization, not MATERIALS. The buttons-and-threads model applies to any system with enough interacting parts: organic molecules, digital logic gates, or anyonic quasiparticles."
    abstract: "Substrate independence is the key insight. Life on Earth uses carbon because carbon chemistry was the first substrate to cross Kauffman's threshold. The mathematics does not require carbon. It requires sufficient diversity, catalytic interactions, and an energy source. A fractional quantum Hall system meets all three criteria."

  - id: pz-mc-t2-003
    type: mc
    topic: t2
    level: p2
    category: science
    title: "The Braid"
    question: "What makes non-Abelian anyons fundamentally different from every particle you studied in school?"
    options:
      - key: a
        text: "They are heavier than electrons"
      - key: b
        text: "Swapping two of them in different orders gives different results — the path matters, and that path encodes information"
      - key: c
        text: "They only exist at absolute zero"
      - key: d
        text: "They carry fractional electric charge"
    answer_key: b
    hint: "In ordinary physics, swapping two identical particles changes nothing. With these particles, swapping them writes a program."
    background: "In three dimensions, swapping identical particles either changes nothing (bosons) or flips a sign (fermions). Two options. In two dimensions, the result depends on the PATH taken. Non-Abelian anyons remember HOW they were moved. This 'memory' — recorded in the topology of their braided worldlines — is the basis of topological quantum computation. The braid IS the program."
    abstract: "Topological quantum computation stores information in braiding history. Because the information is topological — encoded in global structure, not local properties — it is immune to local noise. This is topological protection. The topology remembers."

bridge_builder:
  title: "The Bridge Builder"
  intro: "Eleven scientific domains in five clusters. Build the bridges between them."
  abstract: "Eleven scientific domains in five clusters. Tier 1: three domains connected by exact mathematical identity — proven. Tier 2: seven domains connected by renormalization group universality — established physics. Tier 3: the remaining four domains connected to topological quantum computation by structural analogy — unproven. The bridge is not refuted. It is not even attempted. The question sits in the gap between fields that do not talk to each other."

