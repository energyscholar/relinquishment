  cluster_colors:
    topological: "#2471a3"
    origin: "#e67e22"
    nonlinear: "#c0392b"
    computation: "#8e44ad"
    materials: "#b8860b"

  puzzles:
    - id: pz-bridge-all-001a
      sub_type: mat
      tier: 1
      title: "Bridge 1: DFA ↔ Hurst"
      question: "Match the scaling exponent to its field."
      left:
        - { key: "1", text: "DFA scaling α" }
        - { key: "2", text: "Hurst exponent H" }
      right:
        - { key: A, text: "Cardiology / heart rate variability" }
        - { key: B, text: "Hydrology / river levels" }
      pairs: { "1": A, "2": B }
      edges: [[sol, nld]]
      hint: "These are the same number computed by different fields."
      background: "Detrended Fluctuation Analysis (DFA) produces a scaling exponent α that measures long-range correlations in time series. Cardiologists use it for heart rate variability. The Hurst exponent H, developed by Harold Hurst studying Nile river levels (1951), measures the same property. For stationary series, α = H exactly. Two fields, two names, one mathematical object."
      abstract: "Two different fields, two different names, one mathematical object. The bridge between them is exact."

    - id: pz-bridge-all-001b
      sub_type: mc
      tier: 1
      title: "Bridge 2: Hurst ↔ Spectral β"
      question: "A third measure from physics/engineering is mathematically identical to both. β = 2H + 1 = 2α − 1. What does this identity tell us?"
      options:
        - { key: a, text: "The three fields are studying different phenomena that happen to produce similar numbers" }
        - { key: b, text: "The three fields are measuring the same underlying property using different methods" }
        - { key: c, text: "The relationship is approximate and breaks down at large scales" }
        - { key: d, text: "One field copied the method from another" }
      answer_key: b
      edges: [[cmp, sol], [cmp, nld]]
      tier_label: "Tier 1: Exact Math (3 domains)"
      hint: "The equation is exact, not approximate. What does that imply?"
      background: |
        ref:wilson_rg
        <br><br>The spectral exponent β from power spectral density (1/f^β noise) relates to the others by exact identity: β = 2H + 1 = 2α − 1. Three independent measurement methods from three fields, one underlying quantity.
      abstract: "Three domains connected by exact mathematical identity — proven."

    - id: pz-bridge-all-001c
      sub_type: mc
      tier: 2
      title: "Bridge 3: Scaling → Complexity"
      question: "Kauffman's autocatalytic networks at the edge of chaos exhibit the same scaling exponents. What framework explains why different substrates share critical exponents?"
      options:
        - { key: a, text: "They all obey the same differential equations" }
        - { key: b, text: "Renormalization group theory — same universality class, substrate-independent (Wilson, Nobel 1982)" }
        - { key: c, text: "Coincidence from limited measurement precision" }
        - { key: d, text: "They all contain water" }
      answer_key: b
      edges: [[acs, sol], [auto, nld]]
      hint: "Kenneth Wilson won the Nobel Prize for explaining exactly this."
      background: "ref:wilson_rg"
      abstract: "Complexity cluster connected via universality class membership."

    - id: pz-bridge-all-001d
      sub_type: mc
      tier: 2
      title: "Bridge 4: Scaling → Nonlinear"
      question: "What connects lattice vibrations (phonons) to the scaling framework?"
      options:
        - { key: a, text: "Phonons are a type of scaling exponent" }
        - { key: b, text: "Lattice systems at critical points share the same universality class — substrate irrelevant" }
        - { key: c, text: "Only quantum lattices show scaling behavior" }
        - { key: d, text: "Solitons cause phonons" }
      answer_key: b
      edges: [[ce, sol], [par, nld]]
      hint: "'Substrate irrelevance' — universality classes transcend the specific system. A lattice at criticality obeys the same math as any other critical system."
      background: |
        ref:phonon_bridge
        <br><br>ref:wilson_rg
        <br><br>The connection: phonons propagate through crystal lattices. At critical points, lattice systems exhibit the same scaling behavior as any other critical system — same universality class, regardless of what the lattice is made of. The phonon bridge connects the quantum substrate (2DEG) to classical electromagnetic radiation. The universality bridge connects the lattice to every other critical system. Same math, different substrate.
      abstract: "Nonlinear dynamics cluster connected via shared universality class. Phonon-photon coupling provides the physical mechanism; universality class membership provides the mathematical proof."

    - id: pz-bridge-all-001e
      sub_type: mc
      tier: 2
      title: "Bridge 5: Seven Domains"
      question: "A published paper demonstrates that time series from magnetospheric, cardiac, hydrological, seismic, financial, and other domains share identical critical scaling exponents. What does that mean?"
      options:
        - { key: a, text: "They all study the same physical system" }
        - { key: b, text: "They all use the same equipment" }
        - { key: c, text: "Sharing the same critical exponents means they belong to the same universality class — the same mathematics governs their tipping points regardless of substrate" }
        - { key: d, text: "They were all developed at the Santa Fe Institute" }
      answer_key: c
      edges: [[mat, ce], [mat, acs]]
      tier_label: "Tier 2: Same Universality Class (~7 domains)"
      hint: "Wilson's renormalization group theory (Nobel 1982) says: if two systems share the same critical exponents, they are in the same universality class. Same math, different substrate."
      background: |
        <strong>The Paper</strong><br>
        Stephenson &amp; Macomber, <em>"Convergent Discovery of Critical Phenomena Mathematics Across Disciplines: A Cross-Domain Analysis"</em> (arXiv 2601.22389, endorsed by Didier Sornette of ETH Zurich). In peer review at FACETS.<br><br>
        The paper documents that between 1935 and 2025, researchers in at least six fields independently developed mathematical tools for detecting when systems approach tipping points — power grid blackouts, cardiac failures, market crashes, ecosystem collapse. Each field published in its own journals, invented its own terminology, and cited its own literature. Cross-domain awareness was minimal until after 2010.<br><br>
        <strong>The key finding:</strong> these domains share identical critical scaling exponents. Under Wilson's renormalization group theory (Nobel 1982), sharing the same exponents means they belong to the same <em>universality class</em>. This is not analogy — it is a testable, mathematical claim. The same mathematics governs their phase transitions regardless of what the system is made of.<br><br>
        Read the plain-language summary at <strong>freethemath.org</strong>, or start with Appendix B of the arXiv paper.
        <br><br>ref:wilson_rg
      abstract: "Seven-domain cluster complete. Sharing the same critical exponents places them in the same universality class — the same mathematics governs their tipping points regardless of substrate. This is what renormalization group theory predicts: at criticality, only symmetry and dimensionality matter. The substrate disappears."

    - id: pz-bridge-all-001f
      sub_type: log
      tier: 3
      title: "Bridge 6: The Empty Cell"
      question: "For each field cluster, mark whether a published connection to the TQC domain cluster (Topology, Topological Field Theory, Condensed Matter Physics, Topological Quantum Computation) exists. ✓ = yes, ✗ = no."
      rows:
        - "Complexity science (Kauffman, autocatalytic sets)"
        - "Computational theory (Wolfram, Hillis)"
        - "Nonlinear dynamics (solitons, chaos, SOC)"
        - "Materials science (pHEMT, semiconductors)"
      columns:
        - "Bridge paper"
        - "Joint conference"
        - "Shared funding"
      correct:
        - [false, false, false]
        - [false, false, false]
        - [false, false, false]
        - [false, false, false]
      edges: []
      tqc_pulse: true
      hint: "Search your memory. Has anyone formally connected these fields to the TQC cluster?"
      background: |
        <strong>The TQC Domain Cluster</strong><br>
        The question is not about TQC alone. It is about the entire topological cluster — four tightly connected domains:<br>
        <strong>Topology</strong> (Freedman, knot theory, Fields Medal) — the pure mathematics of shapes that survive deformation.<br>
        <strong>Topological Field Theory</strong> (Witten 1989) — the physics framework connecting topology to quantum fields.<br>
        <strong>Condensed Matter Physics</strong> (Laughlin/Störmer/Tsui, Nobel 1998) — the experimental discovery of fractional quantum Hall states in 2DEGs.<br>
        <strong>Topological Quantum Computation</strong> (Freedman-Kitaev-Wang) — using anyonic braiding for fault-tolerant quantum computation.<br><br>
        These four domains are already bridged to each other by published work. The question is whether ANY of the other field clusters have a published bridge to this cluster. Look for papers, conferences, or funding programs that formally connect complexity science, computational theory, nonlinear dynamics, or materials science to any of these four topological domains.
      abstract: "The grid is empty. No published paper, joint conference, or shared funding program connects these four field clusters to the topological domain cluster. The silence is not rejection. It is the absence of a question."

    - id: pz-bridge-all-001g
      sub_type: mc
      tier: 3
