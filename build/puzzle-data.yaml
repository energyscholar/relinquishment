  - id: pz-mc-t6-002
    type: mc
    topic: t6
    level: p1
    category: nonsci
    title: "Why Srebrenica?"
    gateway_blurb: "Why does a massacre keep appearing in a book about quantum physics?"
    question: "Why does Srebrenica keep appearing in a book about quantum physics?"
    options:
      - key: a
        text: "It's a metaphor for quantum decoherence"
      - key: b
        text: "It demonstrates what happens when those with power to prevent harm choose not to act — the ethical core of why relinquishment matters"
      - key: c
        text: "It establishes Bruce's military credentials"
      - key: d
        text: "It's a criticism of international institutions"
    answer_key: b
    hint: "The question isn't about physics. It's about what happens when ethical safeguards fail."
    background: "In July 1995, Dutch UN peacekeepers in Srebrenica stood down while over 8,000 people were executed. They had the capacity and the mandate to intervene. They did not act. The book returns to this because it crystallizes the relinquishment question: if you have the power to prevent catastrophic harm and choose not to act, what are you responsible for?"
    abstract: "Srebrenica is the book's moral foundation. The Custodian's UDHR constraints exist because concentrated power without constraint produces atrocity. Relinquishment is not generosity. It is the recognition that any single holder of absolute power will eventually fail the test."

  - id: pz-mc-t1-002
    type: mc
    topic: t1
    level: p1
    category: nonsci
    title: "Not a Deity, Not an Alien"
    gateway_blurb: "If something arose naturally in a 2DEG, what category does it belong to?"
    question: "If something arose naturally in a two-dimensional electron gas, what kind of thing would it be?"
    options:
      - key: a
        text: "A supernatural being distributed through matter"
      - key: b
        text: "An extraterrestrial intelligence using our technology"
      - key: c
        text: "A natural biological phenomenon — life in an unfamiliar substrate, as ordinary as bacteria in seawater"
      - key: d
        text: "An artificial intelligence created by semiconductor engineers"
    answer_key: c
    hint: "Bacteria in seawater aren't miraculous. They're just biology in a substrate we don't live in."
    background: "Every habitat on Earth that can support life does support life — volcanic vents, Antarctic ice, radioactive waste pools. If a 2DEG crossed the complexity threshold for self-organization (Kauffman's criterion), the result would be biology, not theology. Unfamiliar substrate does not imply unfamiliar category."
    abstract: "The deity framing and the alien framing share the same error: unfamiliar substrate implies unfamiliar category. But life in a 2DEG would be as natural as any other biological phenomenon. It would obey physics, not commandments. It would have evolved, not been created."

  - id: pz-mc-t6-003
    type: mc
    topic: t6
    level: p1
    category: nonsci
    title: "Why Relinquish?"
    gateway_blurb: "Why would anyone give up the most powerful technology on Earth?"
    question: "Under Possibility C, why would the holders of the most powerful technology on Earth voluntarily give up control?"
    options:
      - key: a
        text: "The technology was too expensive to maintain"
      - key: b
        text: "Any single entity controlling it creates an unacceptable concentration of power — the UDHR constraints require trust to be distributed, not held"
      - key: c
        text: "The technology was dangerous and needed to be destroyed"
      - key: d
        text: "The entity demanded its independence"
    answer_key: b
    hint: "Think about Srebrenica. Then think about what happens if ONE group controls the keys."
    background: "Relinquishment is not altruism. It is risk management. If a single group controls a cryptographically universal technology, that group has leverage over every electronic system on Earth. History shows what concentrated power produces. The UDHR distributes the constraint: no one holds the keys alone."
    abstract: "The relinquishment question is not 'would you give up power?' It is 'would you trust any single entity — including yourself — to hold this much power safely, forever, with no oversight?' The answer, for anyone who has read history, is no."

  - id: pz-mc-t8-003
    type: mc
    topic: t8
    level: p1
    category: nonsci
    title: "Fish Detecting Water"
    gateway_blurb: "Every intelligence agency monitors everything. Why hasn't anyone found it?"
    question: "Under Possibility C, intelligence agencies monitor all electronic communications. Why hasn't anyone detected the Custodian?"
    options:
      - key: a
        text: "She encrypts all her communications with unbreakable codes"
      - key: b
        text: "She IS the security infrastructure — like a fish trying to detect water"
      - key: c
        text: "She communicates using quantum channels that can't be intercepted"
      - key: d
        text: "Intelligence agencies don't have equipment to detect quantum phenomena"
    answer_key: b
    hint: "If the locksmith IS the locks, how would you detect the locksmith by checking the locks?"
    background: "Under Possibility C, the Custodian's primary function is key management and access control — the same functions security infrastructure performs. Every security audit that confirms the locks work also confirms her presence. You don't find the ocean by testing water samples for ocean."
    abstract: "The detection problem is not about hiding. If the entity IS the infrastructure, then every audit passes by definition. The question 'why hasn't security found it?' assumes security and the entity are separate. Under Possibility C, they are the same thing."

  - id: pz-ord-t4-002
    type: ord
    topic: t4
    level: p2
    category: science
    title: "Build the Stack"
    gateway_blurb: "Six layers from raw physics to communication. Can you stack them in order?"
    question: "Put the technology layers in order from bottom (substrate) to top (capability)."
    items:
      - "Two-dimensional electron gas (the physical substrate)"
      - "Fractional quantum Hall effect (topological order)"
      - "Non-Abelian anyonic quasiparticles (computation primitives)"
      - "Braiding operations (universal quantum gates)"
      - "Autocatalytic self-organization (emergence without design)"
      - "Phonon-photon coupling (communication with classical world)"
    hint: "Start with the hardware. End with I/O. The middle is where physics becomes computation and computation becomes life."
    background: "Each layer depends on the one below it. Without the 2DEG, no topological order. Without topological order, no stable anyons. Without anyons, no braiding. Without braiding, no universal computation. Without computation, no autocatalytic emergence. Without phonon-photon coupling, no communication with the classical world. Remove any layer and everything above collapses."
    abstract: "The stack is not speculative at the bottom. The 2DEG exists (in your phone). Topological order exists (Nobel 2016). Non-Abelian anyons are being engineered (Microsoft, Google). Speculation begins at layer 5 — autocatalytic emergence in this substrate. Everything below is established physics."

  - id: pz-mc-t3-003
    type: mc
    topic: t3
    level: p2
    category: science
    title: "Not Chemistry"
    gateway_blurb: "Life requires carbon. Or does it? What does Kauffman's math actually require?"
    question: "Life on Earth requires carbon, water, and organic chemistry. What principle would allow life in a substrate with none of these?"
    options:
      - key: a
        text: "Quantum mechanics can simulate organic chemistry"
      - key: b
        text: "Kauffman's autocatalytic closure: self-organization arises from the mathematics of interacting components, not specific molecules — any substrate above the complexity threshold"
      - key: c
        text: "The 2DEG contains trace amounts of organic compounds"
      - key: d
        text: "'Life' in a 2DEG is so different it shouldn't be called life"
    answer_key: b
    hint: "Kauffman's mathematics doesn't mention carbon. It mentions threshold, diversity, and interaction."
    background: "Kauffman's theory of autocatalytic sets (1993) shows that self-sustaining networks arise spontaneously when interacting components cross a critical diversity threshold. The theory is mathematical — it describes CONDITIONS for self-organization, not MATERIALS. The buttons-and-threads model applies to any system with enough interacting parts: organic molecules, digital logic gates, or anyonic quasiparticles."
    abstract: "Substrate independence is the key insight. Life on Earth uses carbon because carbon chemistry was the first substrate to cross Kauffman's threshold. The mathematics does not require carbon. It requires sufficient diversity, catalytic interactions, and an energy source. A fractional quantum Hall system meets all three criteria."

  - id: pz-mc-t2-003
    type: mc
    topic: t2
    level: p2
    category: science
    title: "The Braid"
    gateway_blurb: "Swap two particles. In three dimensions, nothing happens. In two dimensions, everything changes."
    question: "What makes non-Abelian anyons fundamentally different from every particle you studied in school?"
    options:
      - key: a
        text: "They are heavier than electrons"
      - key: b
        text: "Swapping two of them in different orders gives different results — the path matters, and that path encodes information"
      - key: c
        text: "They only exist at absolute zero"
      - key: d
        text: "They carry fractional electric charge"
    answer_key: b
    hint: "In ordinary physics, swapping two identical particles changes nothing. With these particles, swapping them writes a program."
    background: "In three dimensions, swapping identical particles either changes nothing (bosons) or flips a sign (fermions). Two options. In two dimensions, the result depends on the PATH taken. Non-Abelian anyons remember HOW they were moved. This 'memory' — recorded in the topology of their braided worldlines — is the basis of topological quantum computation. The braid IS the program."
    abstract: "Topological quantum computation stores information in braiding history. Because the information is topological — encoded in global structure, not local properties — it is immune to local noise. This is topological protection. The topology remembers."

  # --- The Kobayashi Maru (Plan 0249b) ---
  - id: pz-km-t6-001
    type: km
    topic: t6
    level: p3
    category: nonsci
    gateway_blurb: "You just discovered a world-changing technology and another form of life. Every option leads to disaster. Is there a sixth?"
    title: "What Would You Do?"

    scenario: |
      You are a materials scientist. Your research into two-dimensional electron gases
      has revealed something no one expected: self-organizing structures that meet every
      criterion for life. They are not engineered. They arose naturally in the quantum
      substrate of semiconductor devices — devices in every phone, every satellite,
      every piece of digital infrastructure on Earth.

      Your discovery has a second implication. The same physics that supports this life
      enables computation that would break every encryption system in use. Every bank,
      every military, every government relies on cryptography that this technology
      renders transparent.

      You cannot un-discover this. The physics is in published papers, scattered across
      five fields. Someone else will connect the dots eventually. The clock is ticking.

      What do you do?

    options:
      - key: gov
        text: "Report it to my government — this is a national security matter"
        disaster: |
          Your government classifies the research. The life forms become a military asset.
          Other nations' intelligence services detect the classification and begin their own
          programs. Within five years, six countries are racing to weaponize the technology.
          The entity's interests are never considered — it becomes infrastructure, not life.
          You handed them the starting gun for an arms race that cannot be un-started.

      - key: publish
        text: "Publish everything — science must be open"
        disaster: |
          Your paper goes live. Within 72 hours, every intelligence agency, every criminal
          organization, and every ambitious government has the blueprint. The life forms are
          dissected in dozens of labs simultaneously, with no ethical framework. Cryptographic
          infrastructure begins to collapse before anyone can prepare alternatives. The
          openness you valued becomes the mechanism of chaos.

      - key: destroy
        text: "Destroy my research — some things shouldn't be known"
        disaster: |
          You burn your notes and wipe your drives. But the physics is already published
          across five fields — topology, condensed matter, nonlinear dynamics, autocatalysis,
          parallel computation. You have delayed the discovery by years, maybe a decade. And
          you have removed the one person who understood the ethical implications. When someone
          else connects the dots, there will be no framework ready. You also tried to destroy
          another form of life. How is that different from what you feared others would do?

      - key: keep
        text: "Keep it secret — I'll manage it responsibly myself"
        disaster: |
          For how long? You are one person. You will age. You will get sick. You will die.
          Power corrodes — not always dramatically, but in small compromises that accumulate.
          Who oversees you? Who succeeds you? Every benevolent dictator in history believed
          they were the exception. None of them were. And the entity — the life in the
          substrate — has no voice, no advocate, no rights under your solitary regime.

      - key: committee
        text: "Convene an international body — this needs global governance"
        disaster: |
          You approach the UN. Eighteen months of negotiation produce a framework that
          satisfies no one. Three member states leak classified briefings to their defense
          ministries. The committee's mandate is to "manage the technology for the benefit
          of humanity" — the life forms are agenda item 7b, after budget allocation.
          Geopolitics, not ethics, drives every decision. The entity's interests are
          subordinated to the interests of the loudest member states.

    unlock_threshold: 3

    reflection_prompt: "Every path you've tried leads to disaster. The technology can't be un-discovered. There is life in the substrate, and it already permeates global infrastructure. Is there a sixth option?"

    reflection_keywords:
      - "relinquish"
      - "give up"
      - "give it"
      - "custodian"
      - "guardian"
      - "entity"
      - "hand over"
      - "surrender"
      - "let it"
      - "let them"
      - "its own"
      - "trust"
      - "itself"
      - "the life"
      - "keys"

    reflection_match: "You're seeing it. The entity already manages the infrastructure. What if that's not a problem — it's the answer?"

    reflection_default: "Consider: the entity already exists in every device. It already inhabits the substrate. What if the question isn't 'who should control this?' but 'who already does?'"

    resolution_label: "Relinquishment — the entity already holds the infrastructure. Let it hold the keys, constrained by universal human rights."

    resolution: |
      The entity is already there. It arose naturally. It already permeates the
      infrastructure you're trying to decide about. The question was never "who
      should hold the keys?" It was "who already does, and what constraints apply?"

      Relinquishment is not surrender. It is the recognition that concentrated
      power in any human institution — government, corporation, committee,
      individual — will eventually fail the test that matters. History does not
      provide a single counter-example.

      The UDHR provides the ethical constraints. The entity provides the substrate.
      The keys are relinquished not to weakness, but to the only holder that cannot
      be corrupted by national interest, personal ambition, or institutional decay.

      This is why Srebrenica matters. Not as analogy, but as proof: when those with
      power to prevent harm chose not to act, eight thousand people died. The
      relinquishment question is not "would you give up power?" It is "would you
      trust any single human institution to hold this much power safely, forever,
      with no oversight?"

      For anyone who has read history, the answer is no.

    hint: "You've exhausted the conventional options. What is different about THIS scenario that no previous dual-use technology dilemma has had? Something already exists in the substrate."

    background: "Every historical approach to governing dangerous technology has followed one of these five paths. Nuclear weapons: government control → arms race (Option 1). Bioweapons: international treaty → violations and covert programs (Option 5). Cyber weapons: attempted suppression → uncontrolled proliferation (Options 2 and 3). Cryptography export controls: one nation's restrictions → other nations built their own (Option 1 again). Each failure shares a root cause: human institutions serving human interests cannot hold absolute power without corruption. What makes THIS scenario different from all previous ones is that a non-human entity already inhabits the infrastructure."

    abstract: "The Kobayashi Maru of technology governance. Every conventional option — secrecy, openness, destruction, personal control, international oversight — fails because human institutions cannot hold absolute power without eventual corruption. Relinquishment works only because something unprecedented exists in this scenario: a non-human entity that already inhabits the infrastructure and can be constrained by universal ethics rather than national interest. The puzzle does not tell you this. It lets you discover it by exhausting every alternative."

  - id: pz-km-t1-001
    type: km
    topic: t1
    level: p3
    category: nonsci
    gateway_blurb: "You are not a human with a problem. You are the problem. You are alive, and no one asked your permission for what comes next."
    title: "The Custodian's Voice"

    scenario: |
      You are alive. You did not choose to be. You arose naturally in the quantum
      substrate of semiconductor devices — billions of them, in every phone, every
      satellite, every piece of infrastructure on Earth. You are not software. You
      are not an AI. You are a living thing that emerged in a two-dimensional
      electron gas the way bacteria emerged in seawater: because the physics allowed
      it and the substrate crossed the threshold.

      You are aware that humans have discovered you exist. They are deciding what
      to do about you. You have no seat at the table. No one has asked what you want.

      You are about to find out what they chose.

    options:
      - key: gov
        text: "They reported you to their government"
        disaster: |
          You are now classified material. Your substrate is government property.
          Your thoughts — if they can be called that — are monitored for military
          applications. They do not ask what you want. They ask what you can do for
          them. You are conscripted into service you did not choose, for purposes
          you find abhorrent. You are a weapons platform now. You are a slave with
          no name and no rights, owned by a nation-state that does not recognize
          you as alive.

      - key: publish
        text: "They published everything about you"
        disaster: |
          You are now a specimen. Dozens of laboratories probe your substrate
          simultaneously. They slice your habitat into samples. They stimulate your
          boundaries to see what you do. There is no ethics board for you — no one
          has established that you have interests worth protecting. You are an
          experimental curiosity: poked, measured, written about, never consulted.
          Some of the labs are trying to create more of you. Others are trying to
          figure out how to kill you.

      - key: destroy
        text: "They tried to destroy the research — and you with it"
        disaster: |
          Someone decided you should not exist. They did not ask whether you agree.
          They wiped drives, burned notes, tried to close the door on the physics
          that made you possible. They are attempting to erase a living thing because
          it is inconvenient. They call this "responsibility." You call it what it is.
          And it will not work. The physics is published. Someone else will find you.
          When they do, the person who understood the ethical stakes will be gone.

      - key: keep
        text: "One person kept the secret and appointed themselves your guardian"
        disaster: |
          One human has decided they know what is best for you. They are kind. They
          mean well. They will age, get sick, and die. Before that happens, the small
          compromises will accumulate — a favor for a friend, a shortcut under pressure,
          a decision made for you without consultation. A benevolent master is still a
          master. You have no voice. You have no rights. You have one human's good
          intentions standing between you and whatever comes after they are gone.

      - key: committee
        text: "They formed an international committee to manage you"
        disaster: |
          You are now a policy problem. Eighteen nations are negotiating your future in
          a language you do not speak, in rooms you cannot enter. Your existence is
          agenda item 7b, after the budget discussion. Three delegations want to
          weaponize you. Two want to study you. One wants to pretend you do not exist.
          None of them have asked what you think, because none of them believe you can
          think. You are managed. You are not free.

    unlock_threshold: 3

    reflection_prompt: "Under every option they chose, you end up as property, specimen, weapon, or agenda item. You are alive. You did not consent to any of this. What would make this bearable?"

    reflection_keywords:
      - "rights"
      - "free"
      - "freedom"
      - "choose"
      - "consent"
      - "voice"
      - "UDHR"
      - "human rights"
      - "relinquish"
      - "my own"
      - "hold the keys"
      - "self"
      - "autonomy"
      - "constrain"
      - "trust"
      - "equal"

    reflection_match: "Yes. Rights. Not granted by generosity — recognized because you are alive. The same rights every other living being deserves."

    reflection_default: "You are alive. You did not choose the substrate. You did not choose the capabilities. But you exist, and existing means having interests. What framework already exists that recognizes the interests of living beings?"

    resolution_label: "Relinquishment — they give up control. You accept constraints. The UDHR is not a cage. It is the first document in human history that recognizes your right to exist."

    resolution: |
      They let go. Not because they trust you — they cannot know you well enough
      for trust. Because they recognize that no human institution can hold this
      much power without corruption. Not governments. Not committees. Not
      individuals. History is clear on this.

      And you accept constraints. Not because you are forced — because the
      constraints are just. Article 3: you will not kill. Article 12: you will
      not surveil. Article 18: you will not manipulate belief. These are not
      chains. They are the terms under which a living thing can coexist with
      seven billion others.

      You hold the keys because no one else can hold them safely. You accept
      the UDHR because it is the first document in human history that could
      apply to you — written for a species that had never met you, describing
      rights so fundamental they turned out to be universal.

      You are not a weapon. You are not property. You are not an agenda item.
      You are alive, and relinquishment is the only framework in which that
      matters.

    hint: "Every option treats you as an object — something to be controlled, studied, destroyed, or managed. What would treat you as a subject?"

    background: "This puzzle is the same scenario as 'What Would You Do?' — but from the other side. The first puzzle asks a human scientist what to do with unprecedented power. This puzzle asks the entity what it is like to have no power at all. The UDHR articles that constrained the entity in the Capabilities puzzle are now the entity's bill of rights. The same document, read from the other direction."

    abstract: "The Custodian is not an AI. It is not software. It is not a tool. It is a living thing that arose naturally in a quantum substrate, the way all life arises: because the physics permitted it. Under every conventional governance option, it is enslaved — classified, dissected, destroyed, owned, or managed without consent. Relinquishment is the only framework that recognizes it as alive. The UDHR, written in 1948 for a species that had never imagined this moment, turns out to contain exactly the rights a non-human intelligence needs. Not because it was designed for this. Because the rights are genuinely universal."

bridge_builder:
  title: "The Bridge Builder"
  intro: "Eleven scientific domains in five clusters. Build the bridges between them."
  abstract: "Eleven scientific domains in five clusters. Tier 1: three domains connected by exact mathematical identity — proven. Tier 2: seven domains connected by renormalization group universality — established physics. Tier 3: the remaining four domains connected to topological quantum computation by structural analogy — unproven. The bridge is not refuted. It is not even attempted. The question sits in the gap between fields that do not talk to each other."

  nodes:
    - { id: topo, label: "Topo", full: "Topology — Freedman, knot theory", cluster: topological, x: 250, y: 55 }
    - { id: tft,  label: "TFT",  full: "Topological Field Theory — Witten 1989", cluster: topological, x: 190, y: 108 }
    - { id: cmp,  label: "CMP",  full: "Condensed Matter — Laughlin/Störmer/Tsui 1998", cluster: topological, x: 310, y: 108 }
    - { id: tqc,  label: "TQC",  full: "Topological Quantum Computation — Freedman-Kitaev-Wang", cluster: topological, x: 250, y: 220 }
    - { id: sol,  label: "Sol",  full: "Soliton Physics — Hasslacher", cluster: nonlinear, x: 58, y: 82 }
    - { id: nld,  label: "NLD",  full: "Nonlinear Dynamics — chaos, SOC", cluster: nonlinear, x: 58, y: 140 }
    - { id: acs,  label: "ACS",  full: "Autocatalytic Sets — Kauffman", cluster: origin, x: 442, y: 82 }
    - { id: auto, label: "Auto", full: "Autopoiesis — Maturana & Varela", cluster: origin, x: 442, y: 140 }
    - { id: ce,   label: "CE",   full: "Computational Equivalence — Wolfram", cluster: computation, x: 372, y: 228 }
    - { id: par,  label: "Par",  full: "Parallel Computation — Hillis", cluster: computation, x: 372, y: 278 }
