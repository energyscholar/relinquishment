# Top-level containers
"introduction": "What a technology stack is, and why the one at the top of this stack has no name yet."
"the-flat": "The Flat — this book coins 'the Flat' to mean any two-dimensional system embedded in three dimensions that can, under the right conditions, exhibit topological order. Different physics apply. In particular, it supports topological wormholes, — not holes in space, but quantum shortcuts that let information move between distant points without crossing the distance between them. The Flat inside your computer chip is a 2DEG (two-dimensional electron gas). The Flat in Earth's magnetosphere is plasma confined to thin current sheets. This book calls those thin worlds the Flat."
"the-record": "One man's account of meeting someone — or something — that shouldn't exist. Capabilities observed. A technology relinquished — not destroyed, but placed in trust. A secret kept for twenty years. Testimony, not proof. The reader decides."
"appendices": "The physics that makes AI wrong about this book. Testable predictions with deadlines. If they fail, you have your answer."
# Legacy part names (pre-Z-restructure, kept for any residual references)
"guided-deduction": "A soldier carries a secret too dangerous for any government to hold. He can't tell anyone — so he spends three years teaching a physicist to figure it out from published science alone. No classified words ever cross his lips. Then he vanishes. This is what he left behind."
"the-evidence-trail": "What actually happened inside the program? A demonstration that shouldn't be possible. A machine that learned to think. The night someone tried to shut it down — and failed. The day the builders walked it out of the lab forever. The evidence is circumstantial. It is also very difficult to explain away."
"forgiveness-and-permission": "They built something that could crack the codes protecting the world's secrets, read any message, outthink any adversary — and they gave it up. Permanently. Irrevocably. To a creature governed by the Universal Declaration of Human Rights. This section asks what that would mean for the world. And what you would have done."

