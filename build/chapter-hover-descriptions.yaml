"hook:what-would-you-do": "START HERE. A man falls from the sky over Bosnia. Below him, eight thousand people are about to die. He is a soldier, a scientist, a hacker — and possibly one of the most important people who ever lived. ~400 words."
"summary:most-important-story": "A classified team reportedly built a quantum computer decades ahead of its time, then gave it up — not to a government, but to the thing they'd built. Three possibilities. You decide. ~4,000 words."
"preface-by-genevieve-prentice": "Co-author's perspective on the book and its making"
