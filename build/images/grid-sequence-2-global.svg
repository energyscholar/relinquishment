<svg xmlns="http://www.w3.org/2000/svg" width="500" height="300" viewBox="0 0 500 300">
  <title>All major electrical grids on Earth shown on a world map. Six colored regions cover most inhabited land: North American grids (blue), European ENTSO-E (amber), Chinese State Grid (red), Indian National Grid (green), Russian IPS (purple), and others. Together they serve over 6 billion people.</title>
  <rect width="500" height="300" fill="#1a2a3a"/>

  <!-- Simplified world map - continents as rough shapes -->
  <!-- North America -->
  <path d="M 40,50 L 80,35 L 120,30 L 150,40 L 160,60 L 155,80 L 145,100
           L 135,120 L 120,130 L 105,140 L 95,155 L 80,160 L 70,150
           L 55,130 L 45,110 L 35,90 L 30,70 Z"
        fill="#2a3a4a" stroke="#445" stroke-width="0.3"/>
  <!-- Central America -->
  <path d="M 95,155 L 100,165 L 105,180 L 100,185 L 95,175 L 90,165 Z"
        fill="#2a3a4a" stroke="#445" stroke-width="0.3"/>
  <!-- South America -->
  <path d="M 110,185 L 125,180 L 140,190 L 145,210 L 140,235 L 130,255
           L 120,265 L 110,260 L 105,240 L 100,220 L 102,200 Z"
        fill="#2a3a4a" stroke="#445" stroke-width="0.3"/>
  <!-- Europe -->
  <path d="M 220,40 L 245,35 L 270,38 L 285,45 L 280,65 L 270,80
           L 255,85 L 240,80 L 230,70 L 225,55 Z"
        fill="#2a3a4a" stroke="#445" stroke-width="0.3"/>
  <!-- Africa -->
  <path d="M 230,100 L 250,95 L 275,100 L 285,120 L 280,150 L 270,175
           L 255,190 L 240,185 L 230,170 L 225,145 L 220,120 Z"
        fill="#2a3a4a" stroke="#445" stroke-width="0.3"/>
  <!-- Russia/Asia -->
  <path d="M 270,30 L 310,25 L 350,28 L 390,30 L 420,35 L 440,45
           L 435,60 L 420,70 L 400,75 L 380,70 L 360,65 L 340,60
           L 320,55 L 300,50 L 285,45 Z"
        fill="#2a3a4a" stroke="#445" stroke-width="0.3"/>
  <!-- India -->
  <path d="M 345,85 L 360,80 L 370,90 L 365,110 L 355,125 L 345,115
           L 340,100 Z"
        fill="#2a3a4a" stroke="#445" stroke-width="0.3"/>
  <!-- China -->
  <path d="M 370,55 L 400,50 L 430,55 L 440,70 L 435,85 L 420,90
           L 400,88 L 385,80 L 375,70 Z"
        fill="#2a3a4a" stroke="#445" stroke-width="0.3"/>
  <!-- Australia -->
  <path d="M 400,170 L 430,165 L 455,175 L 455,195 L 440,205 L 415,200
           L 400,190 Z"
        fill="#2a3a4a" stroke="#445" stroke-width="0.3"/>

  <!-- Grid overlays -->
  <!-- North American grids (blue) -->
  <path d="M 45,50 L 80,38 L 120,33 L 150,43 L 155,65 L 145,95
           L 130,120 L 110,135 L 85,150 L 65,140 L 50,115 L 40,85 Z"
        fill="#2471a340" stroke="#2471a3" stroke-width="0.8"/>
  <!-- European ENTSO-E (amber) -->
  <path d="M 222,42 L 245,37 L 268,40 L 283,47 L 278,63 L 268,78
           L 253,83 L 238,78 L 228,68 L 223,53 Z"
        fill="#f4a82040" stroke="#f4a820" stroke-width="0.8"/>
  <!-- Russian IPS (purple) -->
  <path d="M 272,32 L 310,27 L 348,30 L 385,33 L 415,38 L 410,55
           L 390,60 L 360,55 L 330,50 L 300,48 L 283,43 Z"
        fill="#9b59b640" stroke="#9b59b6" stroke-width="0.8"/>
  <!-- Chinese State Grid (red) -->
  <path d="M 372,57 L 398,52 L 428,57 L 438,72 L 433,83 L 418,88
           L 398,86 L 383,78 L 373,68 Z"
        fill="#e74c3c40" stroke="#e74c3c" stroke-width="0.8"/>
  <!-- Indian National Grid (green) -->
  <path d="M 347,87 L 358,82 L 368,92 L 363,108 L 353,123 L 343,113
           L 338,98 Z"
        fill="#27ae6040" stroke="#27ae60" stroke-width="0.8"/>
  <!-- Brazil/South America (teal) -->
  <path d="M 112,190 L 125,185 L 138,195 L 142,215 L 135,240
           L 120,250 L 108,240 L 104,218 Z"
        fill="#1abc9c40" stroke="#1abc9c" stroke-width="0.8"/>

  <!-- Legend -->
  <g transform="translate(20, 205)">
    <rect x="0" y="0" width="8" height="8" fill="#2471a3"/>
    <text x="12" y="8" font-size="7" fill="#aaa" font-family="sans-serif">N. America (3 grids, 400M)</text>
    <rect x="0" y="14" width="8" height="8" fill="#f4a820"/>
    <text x="12" y="22" font-size="7" fill="#aaa" font-family="sans-serif">Europe ENTSO-E (530M)</text>
    <rect x="0" y="28" width="8" height="8" fill="#9b59b6"/>
    <text x="12" y="36" font-size="7" fill="#aaa" font-family="sans-serif">Russia IPS (145M)</text>
    <rect x="0" y="42" width="8" height="8" fill="#e74c3c"/>
    <text x="12" y="50" font-size="7" fill="#aaa" font-family="sans-serif">China State Grid (1.1B)</text>
    <rect x="0" y="56" width="8" height="8" fill="#27ae60"/>
    <text x="12" y="64" font-size="7" fill="#aaa" font-family="sans-serif">India National Grid (1.4B)</text>
    <rect x="0" y="70" width="8" height="8" fill="#1abc9c"/>
    <text x="12" y="78" font-size="7" fill="#aaa" font-family="sans-serif">Brazil + S. America (300M)</text>
  </g>

  <!-- Title -->
  <text x="250" y="290" text-anchor="middle" font-size="11" fill="#ddd" font-family="serif" font-weight="bold">Earth's Electrical Grids &mdash; over 6 billion people connected</text>
</svg>
