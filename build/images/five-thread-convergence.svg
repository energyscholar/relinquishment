<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="520" height="480" viewBox="0 0 520 480">
  <title>Five scientific disciplines arranged in a pentagon converge on a central nexus. Solid State Physics, Quantum Computation, Neural Networks, Complex System Biology, and NKS each flow inward along curved threads toward a glowing central point labeled with a question mark. Particles pulse along each thread, representing the flow of ideas toward a single synthesis.</title>
  <defs>
    <style>
      @media(prefers-reduced-motion:reduce){animate,animateMotion,animateTransform{display:none}}
      .conv-label { font-family: Georgia, serif; font-size: 12px; fill: #c4a97d; }
      .conv-name { font-family: Georgia, serif; font-size: 9.5px; fill: #999; font-style: italic; }
      .conv-node { stroke-width: 1.5; }
    </style>
    <radialGradient id="nexus-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#d4a017" stop-opacity="0.4"/>
      <stop offset="60%" stop-color="#d4a017" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#d4a017" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="nexus-core" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#f5e6c8"/>
      <stop offset="100%" stop-color="#c4a97d"/>
    </radialGradient>
    <filter id="conv-soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" />
    </filter>
  </defs>

  <!-- Pentagon connecting lines (discipline relationships) -->
  <polygon points="260,62 410,143 355,365 165,365 110,143" fill="none" stroke="#555" stroke-width="0.5" stroke-dasharray="3,5" opacity="0.3"/>

  <!-- Background glow at center — layered for depth -->
  <circle cx="260" cy="230" r="100" fill="url(#nexus-glow)" opacity="0.4">
    <animate attributeName="r" values="95;108;95" dur="10s" repeatCount="indefinite"/>
  </circle>
  <circle cx="260" cy="230" r="60" fill="url(#nexus-glow)">
    <animate attributeName="r" values="55;65;55" dur="8s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.6;0.9;0.6" dur="8s" repeatCount="indefinite"/>
  </circle>

  <!-- Thread paths (curved from each node to center) -->
  <!-- 1. Solid State Physics (top) — deep blue -->
  <path id="thread-ss" d="M 260,72 C 250,120 240,160 260,230" fill="none" stroke="#2471a3" stroke-width="2.5" opacity="0.5"/>
  <path d="M 260,72 C 250,120 240,160 260,230" fill="none" stroke="#2471a3" stroke-width="1" opacity="0.3" stroke-dasharray="4,6">
    <animate attributeName="stroke-dashoffset" values="0;-10" dur="3s" repeatCount="indefinite"/>
  </path>

  <!-- 2. Quantum Computation (upper right) — purple -->
  <path id="thread-qc" d="M 402,148 C 360,170 310,195 260,230" fill="none" stroke="#7d3c98" stroke-width="2.5" opacity="0.5"/>
  <path d="M 402,148 C 360,170 310,195 260,230" fill="none" stroke="#7d3c98" stroke-width="1" opacity="0.3" stroke-dasharray="4,6">
    <animate attributeName="stroke-dashoffset" values="0;-10" dur="3.5s" repeatCount="indefinite"/>
  </path>

  <!-- 3. Neural Networks (lower right) — green -->
  <path id="thread-nn" d="M 348,358 C 320,320 290,270 260,230" fill="none" stroke="#27ae60" stroke-width="2.5" opacity="0.5"/>
  <path d="M 348,358 C 320,320 290,270 260,230" fill="none" stroke="#27ae60" stroke-width="1" opacity="0.3" stroke-dasharray="4,6">
    <animate attributeName="stroke-dashoffset" values="0;-10" dur="3.2s" repeatCount="indefinite"/>
  </path>

  <!-- 4. Complex System Biology (lower left) — gold -->
  <path id="thread-csb" d="M 172,358 C 200,320 230,270 260,230" fill="none" stroke="#d4a017" stroke-width="2.5" opacity="0.5"/>
  <path d="M 172,358 C 200,320 230,270 260,230" fill="none" stroke="#d4a017" stroke-width="1" opacity="0.3" stroke-dasharray="4,6">
    <animate attributeName="stroke-dashoffset" values="0;-10" dur="2.8s" repeatCount="indefinite"/>
  </path>

  <!-- 5. NKS (upper left) — warm red -->
  <path id="thread-nks" d="M 118,148 C 160,170 210,195 260,230" fill="none" stroke="#c0392b" stroke-width="2.5" opacity="0.5"/>
  <path d="M 118,148 C 160,170 210,195 260,230" fill="none" stroke="#c0392b" stroke-width="1" opacity="0.3" stroke-dasharray="4,6">
    <animate attributeName="stroke-dashoffset" values="0;-10" dur="3.3s" repeatCount="indefinite"/>
  </path>

  <!-- Flowing particles along each thread -->
  <!-- Solid State (blue) -->
  <circle r="3.5" fill="#5dade2" opacity="0">
    <animateMotion dur="4s" repeatCount="indefinite" begin="0s" path="M 260,72 C 250,120 240,160 260,230"/>
    <animate attributeName="opacity" values="0;0.9;0.9;0.9;0" keyTimes="0;0.08;0.75;0.9;1" dur="4s" repeatCount="indefinite" begin="0s"/>
    <animate attributeName="r" values="3.5;2.5;3.5" dur="4s" repeatCount="indefinite" begin="0s"/>
  </circle>
  <circle r="2.5" fill="#85c1e9" opacity="0">
    <animateMotion dur="4s" repeatCount="indefinite" begin="2s" path="M 260,72 C 250,120 240,160 260,230"/>
    <animate attributeName="opacity" values="0;0.7;0.7;0.7;0" keyTimes="0;0.08;0.75;0.9;1" dur="4s" repeatCount="indefinite" begin="2s"/>
  </circle>

  <!-- Quantum Computation (purple) -->
  <circle r="3.5" fill="#a569bd" opacity="0">
    <animateMotion dur="4.5s" repeatCount="indefinite" begin="0.5s" path="M 402,148 C 360,170 310,195 260,230"/>
    <animate attributeName="opacity" values="0;0.9;0.9;0.9;0" keyTimes="0;0.08;0.75;0.9;1" dur="4.5s" repeatCount="indefinite" begin="0.5s"/>
  </circle>
  <circle r="2.5" fill="#c39bd3" opacity="0">
    <animateMotion dur="4.5s" repeatCount="indefinite" begin="2.7s" path="M 402,148 C 360,170 310,195 260,230"/>
    <animate attributeName="opacity" values="0;0.7;0.7;0.7;0" keyTimes="0;0.08;0.75;0.9;1" dur="4.5s" repeatCount="indefinite" begin="2.7s"/>
  </circle>

  <!-- Neural Networks (green) -->
  <circle r="3.5" fill="#52be80" opacity="0">
    <animateMotion dur="4.2s" repeatCount="indefinite" begin="1s" path="M 348,358 C 320,320 290,270 260,230"/>
    <animate attributeName="opacity" values="0;0.9;0.9;0.9;0" keyTimes="0;0.08;0.75;0.9;1" dur="4.2s" repeatCount="indefinite" begin="1s"/>
  </circle>
  <circle r="2.5" fill="#82e0aa" opacity="0">
    <animateMotion dur="4.2s" repeatCount="indefinite" begin="3.1s" path="M 348,358 C 320,320 290,270 260,230"/>
    <animate attributeName="opacity" values="0;0.7;0.7;0.7;0" keyTimes="0;0.08;0.75;0.9;1" dur="4.2s" repeatCount="indefinite" begin="3.1s"/>
  </circle>

  <!-- Complex System Biology (gold) -->
  <circle r="3.5" fill="#f4d03f" opacity="0">
    <animateMotion dur="3.8s" repeatCount="indefinite" begin="1.5s" path="M 172,358 C 200,320 230,270 260,230"/>
    <animate attributeName="opacity" values="0;0.9;0.9;0.9;0" keyTimes="0;0.08;0.75;0.9;1" dur="3.8s" repeatCount="indefinite" begin="1.5s"/>
  </circle>
  <circle r="2.5" fill="#f9e79f" opacity="0">
    <animateMotion dur="3.8s" repeatCount="indefinite" begin="3.4s" path="M 172,358 C 200,320 230,270 260,230"/>
    <animate attributeName="opacity" values="0;0.7;0.7;0.7;0" keyTimes="0;0.08;0.75;0.9;1" dur="3.8s" repeatCount="indefinite" begin="3.4s"/>
  </circle>

  <!-- NKS (red) -->
  <circle r="3.5" fill="#e74c3c" opacity="0">
    <animateMotion dur="4.3s" repeatCount="indefinite" begin="0.8s" path="M 118,148 C 160,170 210,195 260,230"/>
    <animate attributeName="opacity" values="0;0.9;0.9;0.9;0" keyTimes="0;0.08;0.75;0.9;1" dur="4.3s" repeatCount="indefinite" begin="0.8s"/>
  </circle>
  <circle r="2.5" fill="#f1948a" opacity="0">
    <animateMotion dur="4.3s" repeatCount="indefinite" begin="2.9s" path="M 118,148 C 160,170 210,195 260,230"/>
    <animate attributeName="opacity" values="0;0.7;0.7;0.7;0" keyTimes="0;0.08;0.75;0.9;1" dur="4.3s" repeatCount="indefinite" begin="2.9s"/>
  </circle>

  <!-- Discipline nodes -->
  <!-- 1. Solid State Physics (top) -->
  <circle cx="260" cy="62" r="24" fill="#1a3a5c" stroke="#2471a3" class="conv-node" opacity="0.85"/>
  <text x="260" y="58" text-anchor="middle" font-family="Georgia, serif" font-size="9" fill="#85c1e9">Solid</text>
  <text x="260" y="70" text-anchor="middle" font-family="Georgia, serif" font-size="9" fill="#85c1e9">State</text>
  <text x="260" y="40" text-anchor="middle" class="conv-name">Hasslacher</text>

  <!-- 2. Quantum Computation (upper right) -->
  <circle cx="410" cy="143" r="24" fill="#3a1a50" stroke="#7d3c98" class="conv-node" opacity="0.85"/>
  <text x="410" y="139" text-anchor="middle" font-family="Georgia, serif" font-size="9" fill="#c39bd3">Quantum</text>
  <text x="410" y="151" text-anchor="middle" font-family="Georgia, serif" font-size="9" fill="#c39bd3">Comp.</text>
  <text x="448" y="120" text-anchor="start" class="conv-name">Freedman?</text>

  <!-- 3. Neural Networks (lower right) -->
  <circle cx="355" cy="365" r="24" fill="#1a3a2e" stroke="#27ae60" class="conv-node" opacity="0.85"/>
  <text x="355" y="361" text-anchor="middle" font-family="Georgia, serif" font-size="9" fill="#82e0aa">Neural</text>
  <text x="355" y="373" text-anchor="middle" font-family="Georgia, serif" font-size="9" fill="#82e0aa">Nets</text>
  <text x="393" y="388" text-anchor="start" class="conv-name">Hillis</text>

  <!-- 4. Complex System Biology (lower left) -->
  <circle cx="165" cy="365" r="24" fill="#3a2a0a" stroke="#d4a017" class="conv-node" opacity="0.85"/>
  <text x="165" y="361" text-anchor="middle" font-family="Georgia, serif" font-size="8.5" fill="#f9e79f">Complex</text>
  <text x="165" y="373" text-anchor="middle" font-family="Georgia, serif" font-size="8.5" fill="#f9e79f">Systems</text>
  <text x="127" y="388" text-anchor="end" class="conv-name">Kauffman</text>

  <!-- 5. NKS (upper left) -->
  <circle cx="110" cy="143" r="24" fill="#3a1a1a" stroke="#c0392b" class="conv-node" opacity="0.85"/>
  <text x="110" y="147" text-anchor="middle" font-family="Georgia, serif" font-size="10" fill="#f1948a">NKS</text>
  <text x="72" y="120" text-anchor="end" class="conv-name">Wolfram</text>

  <!-- Central nexus -->
  <circle cx="260" cy="230" r="30" fill="url(#nexus-core)" stroke="#8b6914" stroke-width="2" opacity="0.9">
    <animate attributeName="r" values="29;32;29" dur="6s" repeatCount="indefinite"/>
  </circle>
  <text x="260" y="226" text-anchor="middle" font-family="Georgia, serif" font-size="13" fill="#5a3e1b" font-weight="bold">TQNN</text>
  <text x="260" y="240" text-anchor="middle" font-family="Georgia, serif" font-size="10" fill="#8b6914" font-style="italic">?</text>

  <!-- Three Possibilities note -->
  <text x="260" y="460" text-anchor="middle" font-family="Georgia, serif" font-size="9" fill="#777" font-style="italic">
    Real convergence — or a well-informed reconstruction? The reader decides.
  </text>
</svg>