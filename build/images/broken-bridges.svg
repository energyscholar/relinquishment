<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="580" height="380" viewBox="0 0 580 380">
  <title>Five research silos with broken bridges between them — no journal, no career, no funding spans these gaps</title>

  <!-- Five silos (vertical rectangles) -->
  <rect x="30" y="60" width="60" height="200" rx="4" fill="#5B7B94" opacity="0.85"/>
  <rect x="140" y="60" width="60" height="200" rx="4" fill="#5B7B94" opacity="0.85"/>
  <rect x="250" y="60" width="60" height="200" rx="4" fill="#5B7B94" opacity="0.85"/>
  <rect x="360" y="60" width="60" height="200" rx="4" fill="#5B7B94" opacity="0.85"/>
  <rect x="470" y="60" width="60" height="200" rx="4" fill="#5B7B94" opacity="0.85"/>

  <!-- Silo labels -->
  <text x="60" y="290" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#333">Topology</text>
  <text x="170" y="290" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#333">Autocatalysis</text>
  <text x="280" y="290" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#333">Computation</text>
  <text x="390" y="290" text-anchor="middle" font-family="Georgia, serif" font-size="10" fill="#333">Plasma Physics</text>
  <text x="500" y="290" text-anchor="middle" font-family="Georgia, serif" font-size="10" fill="#333">Condensed Matter</text>

  <!-- Broken bridges (dashed lines between adjacent pairs, broken at midpoint) -->
  <!-- Bridge 1: Topology — Autocatalysis -->
  <line x1="90" y1="160" x2="118" y2="160" stroke="#888" stroke-width="1.5" stroke-dasharray="4,3"/>
  <line x1="122" y1="160" x2="140" y2="160" stroke="#888" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="120" y="164" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#CC4444" font-weight="bold">×</text>

  <!-- Bridge 2: Autocatalysis — Computation -->
  <line x1="200" y1="160" x2="228" y2="160" stroke="#888" stroke-width="1.5" stroke-dasharray="4,3"/>
  <line x1="232" y1="160" x2="250" y2="160" stroke="#888" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="230" y="164" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#CC4444" font-weight="bold">×</text>

  <!-- Bridge 3: Computation — Plasma Physics -->
  <line x1="310" y1="160" x2="338" y2="160" stroke="#888" stroke-width="1.5" stroke-dasharray="4,3"/>
  <line x1="342" y1="160" x2="360" y2="160" stroke="#888" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="340" y="164" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#CC4444" font-weight="bold">×</text>

  <!-- Bridge 4: Plasma Physics — Condensed Matter -->
  <line x1="420" y1="160" x2="448" y2="160" stroke="#888" stroke-width="1.5" stroke-dasharray="4,3"/>
  <line x1="452" y1="160" x2="470" y2="160" stroke="#888" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="450" y="164" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#CC4444" font-weight="bold">×</text>

  <!-- Caption -->
  <text x="290" y="340" text-anchor="middle" font-family="Georgia, serif" font-size="13" fill="#555" font-style="italic">No journal. No career. No funding. No one's job.</text>
</svg>
