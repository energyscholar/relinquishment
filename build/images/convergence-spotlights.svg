<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="520" height="400" viewBox="0 0 520 400">
  <title>Five research spotlights converging on a central question: Can this support life? Four strong beams, one weak.</title>

  <defs>
    <linearGradient id="beam-strong" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#D4A017" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#D4A017" stop-opacity="0.1"/>
    </linearGradient>
    <linearGradient id="beam-weak" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#aaa" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#aaa" stop-opacity="0.05"/>
    </linearGradient>
  </defs>

  <!-- Central question circle -->
  <circle cx="260" cy="200" r="50" fill="#fdfaf0" stroke="#D4A017" stroke-width="2"/>
  <text x="260" y="195" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#333">Can this</text>
  <text x="260" y="212" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#333">support life?</text>

  <!-- Beam 1: Kauffman (top-left) — strong -->
  <polygon points="60,50 210,180 210,220" fill="#D4A017" opacity="0.25"/>
  <line x1="60" y1="50" x2="210" y2="195" stroke="#D4A017" stroke-width="1.5" opacity="0.7"/>
  <text x="50" y="40" text-anchor="middle" font-family="Georgia, serif" font-size="10" fill="#333" font-weight="bold">Kauffman</text>
  <text x="50" y="54" text-anchor="middle" font-family="Georgia, serif" font-size="9" fill="#666">(Autocatalysis)</text>

  <!-- Beam 2: Wolfram (top-right) — strong -->
  <polygon points="460,50 310,180 310,220" fill="#D4A017" opacity="0.25"/>
  <line x1="460" y1="50" x2="310" y2="195" stroke="#D4A017" stroke-width="1.5" opacity="0.7"/>
  <text x="460" y="40" text-anchor="middle" font-family="Georgia, serif" font-size="10" fill="#333" font-weight="bold">Wolfram</text>
  <text x="460" y="54" text-anchor="middle" font-family="Georgia, serif" font-size="9" fill="#666">(Universality)</text>

  <!-- Beam 3: Freedman (left) — strong -->
  <polygon points="30,240 210,195 210,205" fill="#D4A017" opacity="0.25"/>
  <line x1="30" y1="240" x2="210" y2="200" stroke="#D4A017" stroke-width="1.5" opacity="0.7"/>
  <text x="40" y="265" text-anchor="middle" font-family="Georgia, serif" font-size="10" fill="#333" font-weight="bold">Freedman</text>
  <text x="40" y="279" text-anchor="middle" font-family="Georgia, serif" font-size="9" fill="#666">(Topology)</text>

  <!-- Beam 4: Hasslacher (bottom-left) — strong -->
  <polygon points="100,370 220,220 240,230" fill="#D4A017" opacity="0.25"/>
  <line x1="100" y1="370" x2="230" y2="225" stroke="#D4A017" stroke-width="1.5" opacity="0.7"/>
  <text x="90" y="390" text-anchor="middle" font-family="Georgia, serif" font-size="10" fill="#333" font-weight="bold">Hasslacher</text>
  <text x="90" y="400" text-anchor="middle" font-family="Georgia, serif" font-size="9" fill="#666">(Lattice Dynamics)</text>

  <!-- Beam 5: Topological QFT (bottom-right) — WEAK / dashed -->
  <polygon points="430,370 290,220 310,230" fill="#aaa" opacity="0.1"/>
  <line x1="430" y1="370" x2="295" y2="230" stroke="#aaa" stroke-width="1.5" stroke-dasharray="5,4" opacity="0.6"/>
  <text x="440" y="380" text-anchor="middle" font-family="Georgia, serif" font-size="10" fill="#888" font-weight="bold">Topological QFT</text>
  <text x="440" y="395" text-anchor="middle" font-family="Georgia, serif" font-size="9" fill="#999" font-style="italic">(the hard bridge)</text>
  <text x="380" y="320" text-anchor="middle" font-family="Georgia, serif" font-size="14" fill="#aaa">?</text>
</svg>
