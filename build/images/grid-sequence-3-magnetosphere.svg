<svg xmlns="http://www.w3.org/2000/svg" width="500" height="300" viewBox="0 0 500 300">
  <title>Earth shown small at center-left, with the magnetosphere extending around it. The electrical grids glow faintly on the surface. The magnetosphere boundary (magnetopause) wraps around the sunward side at about 10 Earth radii, while the magnetotail stretches far to the right. The grids and the magnetosphere occupy the same space.</title>
  <rect width="500" height="300" fill="#0a0a1a"/>

  <!-- Magnetotail (extends rightward) -->
  <path d="M 155,90 Q 300,50 490,60 L 490,240 Q 300,250 155,210"
        fill="#1a1a3510" stroke="#334" stroke-width="0.5" stroke-dasharray="3,3"/>

  <!-- Magnetopause (sunward, compressed) -->
  <path d="M 155,90 Q 80,30 60,150 Q 80,270 155,210"
        fill="none" stroke="#446" stroke-width="1"/>

  <!-- Bow shock -->
  <path d="M 155,80 Q 55,15 35,150 Q 55,285 155,220"
        fill="none" stroke="#335" stroke-width="0.5" stroke-dasharray="2,4"/>

  <!-- Current sheet (cross-tail, the main Flat region) -->
  <line x1="160" y1="150" x2="490" y2="150" stroke="#2471a3" stroke-width="2" opacity="0.6"/>
  <line x1="160" y1="150" x2="490" y2="150" stroke="#2471a3" stroke-width="8" opacity="0.1"/>

  <!-- Magnetopause current layer (dayside Flat) -->
  <path d="M 155,90 Q 80,30 60,150 Q 80,270 155,210"
        fill="none" stroke="#2471a3" stroke-width="2" opacity="0.4"/>

  <!-- Field lines (schematic) -->
  <g stroke="#334" stroke-width="0.3" fill="none" opacity="0.5">
    <path d="M 140,130 Q 110,80 140,110"/>
    <path d="M 140,170 Q 110,220 140,190"/>
    <path d="M 155,120 Q 200,70 280,80"/>
    <path d="M 155,180 Q 200,230 280,220"/>
    <path d="M 160,140 Q 250,100 380,110"/>
    <path d="M 160,160 Q 250,200 380,190"/>
  </g>

  <!-- Earth -->
  <circle cx="140" cy="150" r="18" fill="#1a3a2a" stroke="#2a5a3a" stroke-width="0.8"/>
  <!-- Grid glow on Earth surface -->
  <circle cx="140" cy="150" r="18" fill="none" stroke="#f4a820" stroke-width="0.5" opacity="0.6"/>
  <!-- Tiny grid dots on surface -->
  <g fill="#f4a820" opacity="0.8">
    <circle cx="132" cy="144" r="0.8"/>
    <circle cx="136" cy="141" r="0.6"/>
    <circle cx="142" cy="143" r="0.7"/>
    <circle cx="148" cy="146" r="0.6"/>
    <circle cx="145" cy="150" r="0.5"/>
    <circle cx="134" cy="152" r="0.7"/>
    <circle cx="138" cy="156" r="0.5"/>
    <circle cx="144" cy="155" r="0.6"/>
  </g>

  <!-- Labels -->
  <text x="140" y="180" text-anchor="middle" font-size="7" fill="#888" font-family="sans-serif">Earth</text>

  <!-- Magnetopause label -->
  <text x="52" y="100" font-size="7" fill="#668" font-family="sans-serif" transform="rotate(-70,52,100)">magnetopause</text>

  <!-- Current sheet label -->
  <text x="330" y="142" text-anchor="middle" font-size="8" fill="#2471a3" font-family="serif" font-style="italic">cross-tail current sheet</text>
  <text x="330" y="154" text-anchor="middle" font-size="7" fill="#2471a380" font-family="serif">(2D plasma confinement &mdash; the Flat)</text>

  <!-- Scale indicator -->
  <line x1="115" y1="260" x2="165" y2="260" stroke="#666" stroke-width="0.5"/>
  <line x1="115" y1="257" x2="115" y2="263" stroke="#666" stroke-width="0.5"/>
  <line x1="165" y1="257" x2="165" y2="263" stroke="#666" stroke-width="0.5"/>
  <text x="140" y="272" text-anchor="middle" font-size="7" fill="#666" font-family="sans-serif">~10 R&#x2091; (63,700 km)</text>

  <!-- Sun direction -->
  <text x="20" y="150" text-anchor="middle" font-size="8" fill="#aa8830" font-family="sans-serif">&larr; Sun</text>

  <!-- Tail label -->
  <text x="470" y="150" text-anchor="end" font-size="7" fill="#556" font-family="sans-serif">tail &rarr; 200+ R&#x2091;</text>

  <!-- Title -->
  <text x="250" y="290" text-anchor="middle" font-size="10" fill="#ddd" font-family="serif">The grids are inside the magnetosphere. The Flat contains both.</text>
</svg>
