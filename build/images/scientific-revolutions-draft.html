<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Scientific Revolutions — Abstract Kuhn Cycle</title>
<style>
  body { margin: 0; background: #1a1a2e; display: flex; justify-content: center; align-items: center; min-height: 100vh; font-family: Georgia, serif; }
  svg { max-width: 100vw; max-height: 100vh; }
</style>
</head>
<body>
<svg id="main" viewBox="0 0 1200 700" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="glow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-strong">
      <feGaussianBlur stdDeviation="10" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1200" height="700" fill="#1a1a2e"/>

  <!-- Main stage area -->
  <g id="stage">
    <path id="cycle-path" d="" fill="none" stroke="#e8e0d044" stroke-width="2" stroke-dasharray="6,4"/>
    <g id="loop-labels"></g>
    <g id="center-stage"></g>
    <rect id="golden-flash" x="0" y="0" width="1200" height="700" fill="#d4a017" opacity="0" pointer-events="none"/>
    <g id="you-are-here" opacity="0"></g>

    <!-- Title bar (segments 1+) -->
    <g id="title-bar" opacity="0">
      <text id="title-line1" x="600" y="22" text-anchor="middle" fill="#ffffff" font-size="20" font-family="Georgia, serif" font-weight="bold" letter-spacing="1"></text>
      <text id="title-line2" x="600" y="45" text-anchor="middle" fill="#e8e0d0" font-size="15" font-family="Georgia, serif" font-style="italic" opacity="0.67"></text>
      <line id="title-strike" x1="300" y1="45" x2="300" y2="45" stroke="#c45c5c" stroke-width="2" opacity="0"/>
      <text id="title-line3" x="600" y="68" text-anchor="middle" fill="#d4a017" font-size="15" font-family="Georgia, serif" font-weight="bold" opacity="0"></text>
    </g>

    <!-- Year display (upper-right) -->
    <text id="year-display" x="1150" y="30" text-anchor="end" fill="#e8e0d0" font-size="14" font-family="Georgia, serif" opacity="0"></text>
  </g>

  <!-- Scrubber bar -->
  <g id="scrubber">
    <rect x="60" y="660" width="1080" height="2" fill="#e8e0d033" rx="1"/>
    <rect id="progress-bar" x="60" y="660" width="0" height="2" fill="#d4a017" rx="1"/>
    <g id="play-btn" cursor="pointer">
      <circle cx="30" cy="661" r="14" fill="none" stroke="#e8e0d066" stroke-width="1.5"/>
      <text id="play-icon" x="30" y="667" text-anchor="middle" fill="#e8e0d0" font-size="16" font-family="Georgia, serif"></text>
    </g>
    <g id="scrubber-dots"></g>
  </g>
</svg>

<script>
(function() {
  const SVG_NS = "http://www.w3.org/2000/svg";

  const phases = [
    { name: "NORMAL SCIENCE", color: "#4a90d9", angle: -90 },
    { name: "ANOMALY",        color: "#d4a574", angle: -18 },
    { name: "CRISIS",         color: "#c45c5c", angle: 54  },
    { name: "REVOLUTION",     color: "#d4a017", angle: 126 },
    { name: "NEW PARADIGM",   color: "#5c9c5c", angle: 198 },
  ];

  const CX = 600, CY = 310, CR = 270;

  function phasePos(i) {
    const a = phases[i].angle * Math.PI / 180;
    return { x: CX + CR * Math.cos(a), y: CY + CR * Math.sin(a) };
  }

  const segmentLabels = ["Abstract", "1", "2", "3", "4", "5", "6", "7", "8"];
  const scrubberYears = ["", "1543", "1770", "1859", "1847", "", "", "", ""];

  const engine = {
    segment: 0,
    phase: 0,
    playing: false,
    timelineStart: 0,
    timelinePaused: 0,
    pauseOffset: 0,
    rafId: null,
    resolved: false,
  };

  const centerStage = document.getElementById("center-stage");
  const loopLabels = document.getElementById("loop-labels");
  const cyclePath = document.getElementById("cycle-path");
  const goldenFlash = document.getElementById("golden-flash");
  const youAreHere = document.getElementById("you-are-here");
  const progressBar = document.getElementById("progress-bar");
  const playIcon = document.getElementById("play-icon");
  const playBtn = document.getElementById("play-btn");
  const scrubberDots = document.getElementById("scrubber-dots");
  const titleBar = document.getElementById("title-bar");
  const titleLine1 = document.getElementById("title-line1");
  const titleLine2 = document.getElementById("title-line2");
  const titleStrike = document.getElementById("title-strike");
  const titleLine3 = document.getElementById("title-line3");
  const yearDisplay = document.getElementById("year-display");

  // Easing
  function easeOutBack(t) {
    const c = 1.7;
    return 1 + (t - 1) * (t - 1) * ((c + 1) * (t - 1) + c);
  }
  function easeInOutCubic(t) {
    return t < 0.5 ? 4*t*t*t : 1 - Math.pow(-2*t + 2, 3) / 2;
  }
  function easeOutCubic(t) {
    return 1 - Math.pow(1 - t, 3);
  }

  // SVG helpers
  function createText(text, x, y, size, color, opts = {}) {
    const el = document.createElementNS(SVG_NS, "text");
    el.setAttribute("x", x);
    el.setAttribute("y", y);
    el.setAttribute("text-anchor", "middle");
    el.setAttribute("dominant-baseline", "central");
    el.setAttribute("fill", color);
    el.setAttribute("font-size", size);
    el.setAttribute("font-family", "Georgia, serif");
    el.setAttribute("font-weight", "bold");
    el.setAttribute("letter-spacing", "2");
    if (opts.filter) el.setAttribute("filter", opts.filter);
    if (opts.opacity !== undefined) el.setAttribute("opacity", opts.opacity);
    el.textContent = text;
    return el;
  }

  function arcPathFromAngles(startDeg, endDeg) {
    let sweep = endDeg - startDeg;
    if (sweep < 0) sweep += 360;
    const steps = Math.max(2, Math.ceil(sweep / 30));
    let d = "";
    for (let i = 0; i <= steps; i++) {
      const frac = i / steps;
      const aDeg = startDeg + sweep * frac;
      const a = aDeg * Math.PI / 180;
      const x = CX + CR * Math.cos(a);
      const y = CY + CR * Math.sin(a);
      d += (i === 0 ? `M ${x} ${y}` : ` L ${x} ${y}`);
    }
    return d;
  }

  function fullCirclePath() {
    const steps = 72;
    let d = "";
    for (let i = 0; i <= steps; i++) {
      const a = (i / steps) * 2 * Math.PI - Math.PI / 2;
      const x = CX + CR * Math.cos(a);
      const y = CY + CR * Math.sin(a);
      d += (i === 0 ? `M ${x} ${y}` : ` L ${x} ${y}`);
    }
    return d + " Z";
  }

  // Scrubber
  function buildScrubber() {
    const x0 = 60, x1 = 1140, span = x1 - x0;
    for (let i = 0; i < 9; i++) {
      const x = x0 + (span * i / 8);
      const active = (i <= 4);
      const g = document.createElementNS(SVG_NS, "g");
      g.setAttribute("cursor", active ? "pointer" : "default");

      const c = document.createElementNS(SVG_NS, "circle");
      c.setAttribute("cx", x);
      c.setAttribute("cy", 661);
      c.setAttribute("r", active ? 7 : 5);
      c.setAttribute("fill", active ? "#d4a017" : "#e8e0d044");
      if (active) { c.setAttribute("stroke", "#d4a017"); c.setAttribute("stroke-width", "2"); }
      g.appendChild(c);

      const t = document.createElementNS(SVG_NS, "text");
      t.setAttribute("x", x);
      t.setAttribute("y", 685);
      t.setAttribute("text-anchor", "middle");
      t.setAttribute("fill", active ? "#d4a017" : "#e8e0d066");
      t.setAttribute("font-size", "11");
      t.setAttribute("font-family", "Georgia, serif");
      t.textContent = segmentLabels[i];
      g.appendChild(t);

      if (scrubberYears[i]) {
        const yt = document.createElementNS(SVG_NS, "text");
        yt.setAttribute("x", x);
        yt.setAttribute("y", 697);
        yt.setAttribute("text-anchor", "middle");
        yt.setAttribute("fill", "#e8e0d044");
        yt.setAttribute("font-size", "9");
        yt.setAttribute("font-family", "Georgia, serif");
        yt.textContent = scrubberYears[i];
        g.appendChild(yt);
      }

      if (active) g.addEventListener("click", () => playSegment(i));
      scrubberDots.appendChild(g);
    }
    playIcon.textContent = "▶";
  }

  function updateProgress(fraction) {
    const x0 = 60, segWidth = (1140 - 60) / 8;
    progressBar.setAttribute("x", x0 + engine.segment * segWidth);
    progressBar.setAttribute("width", Math.max(0, segWidth * fraction));
  }

  function clearStage() {
    while (centerStage.firstChild) centerStage.removeChild(centerStage.firstChild);
    while (loopLabels.firstChild) loopLabels.removeChild(loopLabels.firstChild);
    cyclePath.setAttribute("d", "");
    cyclePath.setAttribute("opacity", 1);
    cyclePath.removeAttribute("stroke-dashoffset");
    goldenFlash.setAttribute("opacity", 0);
    youAreHere.setAttribute("opacity", 0);
    while (youAreHere.firstChild) youAreHere.removeChild(youAreHere.firstChild);
    titleBar.setAttribute("opacity", 0);
    titleLine1.textContent = "";
    titleLine2.textContent = "";
    titleLine3.textContent = "";
    titleLine3.setAttribute("opacity", 0);
    titleStrike.setAttribute("opacity", 0);
    yearDisplay.setAttribute("opacity", 0);
    yearDisplay.textContent = "";
    engine.resolved = false;
  }

  // --- Timeline for segment 0: Abstract Kuhn Cycle (~16.5s) ---

  function buildSegment0Timeline() {
    const TOTAL = 34;
    const accumulatedEls = [];
    const kf = [];

    function scatterOffset(index) {
      return { x: Math.sin(index * 2.7) * 60, y: Math.cos(index * 1.9) * 40 };
    }

    function showLoopFrame() {
      cyclePath.setAttribute("d", fullCirclePath());
      cyclePath.setAttribute("stroke-dasharray", "6,4");
      cyclePath.removeAttribute("stroke-dashoffset");
      cyclePath.setAttribute("opacity", "0.25");
      for (let i = 0; i < 5; i++) {
        const pos = phasePos(i);
        const el = createText(phases[i].name, pos.x, pos.y, 12, phases[i].color, { opacity: 0.25 });
        el.setAttribute("font-size", "12");
        loopLabels.appendChild(el);
      }
    }

    function parkText(text, x, y, size, color, index) {
      const el = createText(text, x, y, size, color);
      el.setAttribute("font-weight", "normal");
      el.setAttribute("letter-spacing", "0");
      if (index !== undefined) {
        el.setAttribute("transform", `rotate(${index % 2 ? 3 : -3}, ${x}, ${y})`);
      }
      loopLabels.appendChild(el);
      accumulatedEls.push(el);
    }

    function clearCenter() {
      while (centerStage.firstChild) centerStage.removeChild(centerStage.firstChild);
    }

    // === Setup: show loop frame ===
    kf.push({ t: 0, dur: 0.01, fn() { showLoopFrame(); } });

    // === Phase 1: Normal Science (0-4s, blue) ===
    kf.push({ t: 0.1, dur: 0.5, fn(p) {
      clearCenter();
      const el = createText("The accepted theory explains everything we see.", CX, CY - 10, 36, "#4a90d9");
      el.setAttribute("opacity", String(easeOutCubic(p)));
      el.setAttribute("font-size", String(Math.round(36 * easeOutBack(p))));
      centerStage.appendChild(el);
    }});
    kf.push({ t: 0.8, dur: 0.01, fn() {
      clearCenter();
      const el1 = createText("The accepted theory explains everything we see.", CX, CY - 10, 36, "#4a90d9");
      centerStage.appendChild(el1);
      const el2 = createText("Textbooks are written. Careers are built.", CX, CY + 30, 24, "#4a90d9");
      el2.setAttribute("opacity", "0.7");
      centerStage.appendChild(el2);
    }});
    kf.push({ t: 3.5, dur: 0.5, fn(p) {
      const t = easeInOutCubic(p);
      const pos = phasePos(0);
      for (const el of [...centerStage.childNodes]) {
        const startY = parseFloat(el.getAttribute("y"));
        const dx = pos.x - CX, dy = pos.y - startY;
        el.setAttribute("x", String(CX + dx * t));
        el.setAttribute("y", String(startY + dy * t));
        el.setAttribute("font-size", String(Math.round(parseFloat(el.getAttribute("font-size")) * (1 - t * 0.7))));
        el.setAttribute("opacity", String(1 - t * 0.5));
      }
    }});
    kf.push({ t: 4, dur: 0.01, fn() {
      clearCenter();
      const pos = phasePos(0);
      parkText("theory explains all", pos.x, pos.y + 20, 10, "#4a90d9", 0);
    }});

    // === Phase 2: Anomaly Accumulation (4-16s, amber) ===
    const anomalies = [
      { a: "Something doesn't fit.", d: "It's probably measurement error." },
      { a: "It happens again.", d: "Add a special case to the theory." },
      { a: "A third anomaly.", d: "The theory is fine. The data is noisy." },
      { a: "The special cases outnumber the rules.", d: "The theory works. Don't question it." },
    ];

    anomalies.forEach((pair, i) => {
      const start = 4 + i * 3;
      kf.push({ t: start, dur: 0.4, fn(p) {
        clearCenter();
        const el = createText(pair.a, CX, CY - 10, 36, "#d4a574");
        el.setAttribute("opacity", String(easeOutCubic(p)));
        el.setAttribute("font-size", String(Math.round(36 * easeOutBack(p))));
        centerStage.appendChild(el);
      }});
      kf.push({ t: start + 0.5, dur: 0.01, fn() {
        clearCenter();
        const el = createText(pair.a, CX, CY - 10, 36, "#d4a574");
        centerStage.appendChild(el);
      }});
      kf.push({ t: start + 1.2, dur: 0.3, fn(p) {
        if (p < 0.1) {
          const el2 = createText(pair.d, CX, CY + 30, 20, "#8a7a6a");
          el2.setAttribute("opacity", "0");
          centerStage.appendChild(el2);
        }
        for (const el of [...centerStage.childNodes]) {
          if (el.getAttribute("fill") === "#8a7a6a") {
            el.setAttribute("opacity", String(easeOutCubic(p)));
          }
        }
      }});
      kf.push({ t: start + 1.5, dur: 0.01, fn() {
        clearCenter();
        const el1 = createText(pair.a, CX, CY - 10, 36, "#d4a574");
        centerStage.appendChild(el1);
        const el2 = createText(pair.d, CX, CY + 30, 20, "#8a7a6a");
        centerStage.appendChild(el2);
      }});
      kf.push({ t: start + 2.4, dur: 0.5, fn(p) {
        const t = easeInOutCubic(p);
        const pos = phasePos(1);
        const off = scatterOffset(i);
        const tx = pos.x + off.x, ty = pos.y + off.y;
        for (const el of [...centerStage.childNodes]) {
          const startY = parseFloat(el.getAttribute("y"));
          el.setAttribute("x", String(CX + (tx - CX) * t));
          el.setAttribute("y", String(startY + (ty - startY) * t));
          el.setAttribute("font-size", String(Math.round(parseFloat(el.getAttribute("font-size")) * (1 - t * 0.75))));
          el.setAttribute("opacity", String(1 - t * 0.3));
        }
      }});
      kf.push({ t: start + 2.9, dur: 0.01, fn() {
        clearCenter();
        const pos = phasePos(1);
        const off = scatterOffset(i);
        parkText(pair.a.substring(0, 20), pos.x + off.x, pos.y + off.y, 9, "#d4a574", i);
        parkText(pair.d.substring(0, 18), pos.x + off.x + 5, pos.y + off.y + 12, 8, "#8a7a6a", i + 4);
      }});
    });

    // === Phase 3: Crisis (16-22s, red) ===
    const crisisQuotes = [
      "Anyone who questions the theory is not a serious scientist.",
      "And yet — someone looks where no one has looked.",
    ];

    crisisQuotes.forEach((quote, i) => {
      const start = 16 + i * 3;
      kf.push({ t: start, dur: 0.4, fn(p) {
        clearCenter();
        const el = createText(quote, CX, CY, 30, "#c45c5c");
        el.setAttribute("font-style", "italic");
        el.setAttribute("opacity", String(easeOutCubic(p)));
        centerStage.appendChild(el);
      }});
      kf.push({ t: start + 0.5, dur: 2, fn() {
        clearCenter();
        const el = createText(quote, CX, CY, 30, "#c45c5c");
        el.setAttribute("font-style", "italic");
        centerStage.appendChild(el);
      }});
      kf.push({ t: start + 2.5, dur: 0.4, fn(p) {
        const t = easeInOutCubic(p);
        const pos = phasePos(2);
        const off = scatterOffset(i + 8);
        for (const el of [...centerStage.childNodes]) {
          el.setAttribute("x", String(CX + (pos.x + off.x - CX) * t));
          el.setAttribute("y", String(CY + (pos.y + off.y - CY) * t));
          el.setAttribute("font-size", String(Math.round(30 * (1 - t * 0.7))));
          el.setAttribute("opacity", String(1 - t * 0.3));
        }
      }});
      kf.push({ t: start + 2.9, dur: 0.01, fn() {
        clearCenter();
        const pos = phasePos(2);
        const off = scatterOffset(i + 8);
        parkText(quote.substring(0, 25), pos.x + off.x, pos.y + off.y, 9, "#c45c5c", i + 8);
      }});
    });

    // === Phase 4: Crisis Moment (22-26s, gold) ===
    kf.push({ t: 22, dur: 0.5, fn(p) {
      clearCenter();
      const el = createText("An observation the old theory cannot explain.", CX, CY, 36, "#d4a017");
      el.setAttribute("opacity", String(easeOutCubic(p)));
      el.setAttribute("font-size", String(Math.round(36 * easeOutBack(p))));
      el.setAttribute("filter", "url(#glow)");
      centerStage.appendChild(el);
    }});
    kf.push({ t: 22.5, dur: 3, fn() {
      clearCenter();
      const el = createText("An observation the old theory cannot explain.", CX, CY, 36, "#d4a017");
      el.setAttribute("filter", "url(#glow)");
      centerStage.appendChild(el);
    }});
    kf.push({ t: 25.5, dur: 0.4, fn(p) {
      const t = easeInOutCubic(p);
      const pos = phasePos(2);
      const off = scatterOffset(10);
      for (const el of [...centerStage.childNodes]) {
        el.setAttribute("x", String(CX + (pos.x + off.x - CX) * t));
        el.setAttribute("y", String(CY + (pos.y + off.y - CY) * t));
        el.setAttribute("font-size", String(Math.round(36 * (1 - t * 0.75))));
        el.setAttribute("opacity", String(1 - t * 0.2));
      }
    }});
    kf.push({ t: 25.9, dur: 0.01, fn() {
      clearCenter();
      const pos = phasePos(2);
      const off = scatterOffset(10);
      parkText("cannot explain", pos.x + off.x, pos.y + off.y, 10, "#d4a017", 10);
    }});

    // === Phase 5: Paradigm Shake (26-28.5s) ===
    let shakeEl = null;
    kf.push({ t: 26, dur: 0.01, fn() {
      shakeEl = createText("THE ACCEPTED THEORY", CX, 80, 28, "#e8e0d0");
      shakeEl.setAttribute("font-weight", "bold");
      shakeEl.setAttribute("text-anchor", "middle");
      centerStage.appendChild(shakeEl);
    }});
    kf.push({ t: 26.01, dur: 2.5, fn(p) {
      if (!shakeEl) return;
      const amp = 3 + p * 5;
      const freq = 15;
      shakeEl.setAttribute("x", String(CX + amp * Math.sin(p * freq * Math.PI * 2)));
      shakeEl.setAttribute("y", String(80 + amp * Math.cos(p * freq * Math.PI * 2 * 0.7)));
      shakeEl.setAttribute("opacity", String(0.9 - p * 0.4));
    }});

    // === Phase 6: Resolution (28.5-32s) ===
    kf.push({ t: 28.5, dur: 0.5, fn(p) {
      if (shakeEl) shakeEl.setAttribute("opacity", String(0.5 * (1 - easeOutCubic(p))));
    }});
    kf.push({ t: 29, dur: 0.01, fn() {
      if (shakeEl && shakeEl.parentNode) shakeEl.parentNode.removeChild(shakeEl);
      shakeEl = null;
    }});
    kf.push({ t: 29, dur: 1, fn(p) {
      const fade = 1 - easeOutCubic(p);
      for (const el of accumulatedEls) {
        el.setAttribute("opacity", String(parseFloat(el.getAttribute("opacity") || 1) * fade));
      }
    }});
    kf.push({ t: 30, dur: 0.01, fn() {
      for (const el of accumulatedEls) { if (el.parentNode) el.parentNode.removeChild(el); }
      accumulatedEls.length = 0;
      clearCenter();
    }});
    // Clean moment (30-31s) — just the loop at 0.25
    kf.push({ t: 31, dur: 0.5, fn(p) {
      clearCenter();
      const el = createText("A new theory explains everything — including the anomalies.", CX, CY, 32, "#5c9c5c");
      el.setAttribute("opacity", String(easeOutCubic(p)));
      centerStage.appendChild(el);
    }});
    kf.push({ t: 31.5, dur: 0.01, fn() {
      clearCenter();
      const el = createText("A new theory explains everything — including the anomalies.", CX, CY, 32, "#5c9c5c");
      centerStage.appendChild(el);
    }});

    // === Phase 7: You Are Here (32-34s) ===
    kf.push({ t: 32, dur: 0.5, fn(p) {
      const t = easeInOutCubic(p);
      const pos = phasePos(4);
      for (const el of [...centerStage.childNodes]) {
        el.setAttribute("x", String(CX + (pos.x - CX) * t));
        el.setAttribute("y", String(CY + (pos.y - CY) * t));
        el.setAttribute("font-size", String(Math.round(32 * (1 - t * 0.65))));
      }
    }});
    kf.push({ t: 32.5, dur: 0.01, fn() {
      clearCenter();
    }});
    kf.push({ t: 32.5, dur: 1, fn(p) {
      // Fade loop labels from 0.25 to 1.0
      const opacity = 0.25 + 0.75 * easeOutCubic(p);
      for (const el of [...loopLabels.childNodes]) {
        el.setAttribute("opacity", String(opacity));
      }
      cyclePath.setAttribute("opacity", String(opacity));
    }});
    kf.push({ t: 33.5, dur: 0.5, fn(p) {
      const pos = phasePos(1);
      youAreHere.setAttribute("opacity", String(easeOutCubic(p)));
      if (!youAreHere.firstChild) {
        const arrow = createText("← YOU ARE HERE", pos.x + 55, pos.y, 14, "#d4a017", { filter: "url(#glow)" });
        arrow.setAttribute("text-anchor", "start");
        youAreHere.appendChild(arrow);

        const dot = document.createElementNS(SVG_NS, "circle");
        dot.setAttribute("cx", pos.x);
        dot.setAttribute("cy", pos.y);
        dot.setAttribute("r", 6);
        dot.setAttribute("fill", "#d4a017");
        dot.setAttribute("filter", "url(#glow)");
        dot.id = "yah-dot";
        youAreHere.appendChild(dot);
      }
    }});

    return { keyframes: kf, duration: TOTAL };
  }

  // --- Timeline for segment 1: Heliocentrism (20s) ---

  // --- Segment 1: Heliocentrism (factory-built) ---

  function buildSegment1Timeline() {
    return buildRevolutionTimeline({
      title1: "The Copernican Revolution (1543–1687)",
      title2: "The earth is at the center. The sun, moon, and stars revolve around it.",
      title3: "The earth moves around the sun. The solar system is vast.",
      years: {
        normal: "~1400",
        anomalies: ["1543", "1550", "1580", "1600", "1543"],
        crisis: "1543–1610",
        revolution: "1610",
        newParadigm: "1687"
      },
      normal: {
        main: "The sun rises east, crosses the sky, sets west. Earth feels still.",
        sub: "Ptolemy’s geocentric model. (~150 AD)"
      },
      anomalies: [
        { anomaly: "Mars stops. Reverses direction. Then moves forward again.",
          dismissal: "“Add an epicycle.”" },
        { anomaly: "Jupiter wobbles off its predicted path.",
          dismissal: "“Another epicycle.”" },
        { anomaly: "Planets get brighter and dimmer throughout the year.",
          dismissal: "“The sphere is slightly off-center.”" },
        { anomaly: "Epicycles needed: 40... 52... 79...",
          dismissal: "“The math works. Don’t question the model.”" },
        { anomaly: "Copernicus: what if the Earth moves around the Sun?",
          dismissal: "“Interesting mathematics. But obviously the Earth doesn’t move.”" },
      ],
      crisis: [
        "“The Earth MOVES? Absurd. I can feel that it doesn’t.”",
        "“De Revolutionibus — ignored for 70 years.”",
      ],
      revolution: {
        main: "Galileo points his telescope at Jupiter. Four moons — orbiting Jupiter, not Earth.",
        sub: "",
        name: "Galileo, 1610"
      },
      newParadigm: "Navigation. Celestial mechanics. Space travel.",
      transitionYears: "~150 years"
    });
  }

  // --- Revolution factory: paradigm death pattern ---

  function buildRevolutionTimeline(cfg) {
    const N = cfg.anomalies.length;
    const normalEnd = 5.5;
    const anomalyEnd = normalEnd + N * 5;
    const pauseEnd = anomalyEnd + 1;
    const crisisQ1Start = pauseEnd;
    const crisisQ2Start = pauseEnd + 4;
    const crisisParkStart = pauseEnd + 8;
    const crisisParkEnd = pauseEnd + 8.5;
    const momentStart = crisisParkEnd;
    const momentEnd = momentStart + 5.5;
    const momentParkEnd = momentEnd + 0.5;
    const deathMoveStart = momentParkEnd;
    const deathMoveEnd = deathMoveStart + 1.5;
    const shakeStart = deathMoveEnd;
    const shakeEnd = shakeStart + 2.5;
    const shakeOutEnd = shakeEnd + 0.5;
    const junkFadeEnd = shakeOutEnd + 1;
    const cleanEnd = junkFadeEnd + 1;
    const npCenterStart = cleanEnd;
    const npParkStart = npCenterStart + 2;
    const npParkEnd = npParkStart + 0.5;
    const techStart = npParkEnd;
    const techParkStart = techStart + 2;
    const techParkEnd = techParkStart + 0.5;
    const transStart = techParkEnd;
    const pauseFinal = transStart + 1;
    const TOTAL = pauseFinal + 1.5;

    const accumulatedEls = [];
    const kf = [];

    function scatterOffset(index) {
      return {
        x: Math.sin(index * 2.7) * 60,
        y: Math.cos(index * 1.9) * 50
      };
    }

    function leanAngle(index) {
      return Math.sin(index * 3.1) * 8;
    }

    function setYear(yr) {
      yearDisplay.textContent = yr;
      yearDisplay.setAttribute("opacity", "0.55");
    }

    function showLoopFrame() {
      cyclePath.setAttribute("d", fullCirclePath());
      cyclePath.setAttribute("stroke-dasharray", "6,4");
      cyclePath.removeAttribute("stroke-dashoffset");
      cyclePath.setAttribute("opacity", "0.25");
      for (let i = 0; i < 5; i++) {
        const pos = phasePos(i);
        const el = createText(phases[i].name, pos.x, pos.y, 12, phases[i].color, { opacity: 0.25 });
        el.setAttribute("font-size", "12");
        loopLabels.appendChild(el);
      }
    }

    function parkText(text, x, y, size, color, index) {
      const el = createText(text, x, y, size, color);
      el.setAttribute("font-weight", "normal");
      el.setAttribute("letter-spacing", "0");
      const angle = leanAngle(index !== undefined ? index : 0);
      if (index !== undefined) {
        el.setAttribute("transform", `rotate(${angle}, ${x}, ${y})`);
      }
      const opacity = 0.6 + Math.abs(Math.sin(index * 1.3)) * 0.2;
      el.setAttribute("opacity", String(opacity));
      loopLabels.appendChild(el);
      accumulatedEls.push(el);
    }

    function clearCenter() {
      while (centerStage.firstChild) centerStage.removeChild(centerStage.firstChild);
    }

    // === Setup: 0-0.5s ===
    kf.push({ t: 0, dur: 0.5, fn(p) {
      if (p < 0.02) {
        showLoopFrame();
        titleLine1.textContent = cfg.title1;
        titleLine2.textContent = cfg.title2;
        titleLine2.setAttribute("x", "600");
        titleLine2.setAttribute("y", "45");
        titleLine2.setAttribute("opacity", "1");
      }
      titleBar.setAttribute("opacity", easeOutCubic(p));
      setYear(cfg.years.normal);
    }});

    // === Normal Science: 0.5-5.5s ===
    let nMain = null, nSub = null;

    kf.push({ t: 0.5, dur: 0.5, fn(p) {
      if (!nMain) {
        nMain = createText(cfg.normal.main, CX, CY - 15, 30, "#4a90d9");
        nMain.setAttribute("letter-spacing", "0");
        centerStage.appendChild(nMain);
      }
      nMain.setAttribute("font-size", Math.round(30 * Math.max(0.1, easeOutBack(p))));
      nMain.setAttribute("opacity", Math.min(1, p * 2.5));
    }});

    kf.push({ t: 1.5, dur: 0.4, fn(p) {
      if (!nSub) {
        nSub = createText(cfg.normal.sub, CX, CY + 25, 17, "#4a90d9");
        nSub.setAttribute("font-weight", "normal");
        nSub.setAttribute("letter-spacing", "0");
        centerStage.appendChild(nSub);
      }
      nSub.setAttribute("opacity", easeOutCubic(p));
    }});

    kf.push({ t: 1.9, dur: 3.1, fn() {} });

    // Park normal text at Normal Science position
    kf.push({ t: 5, dur: 0.5, fn(p) {
      const t = easeInOutCubic(p);
      const pos = phasePos(0);
      const off = scatterOffset(0);
      if (nMain) {
        nMain.setAttribute("x", CX + (pos.x + off.x - CX) * t);
        nMain.setAttribute("y", (CY - 15) + (pos.y + off.y - (CY - 15)) * t);
        nMain.setAttribute("font-size", Math.round(30 - 20 * t));
        nMain.setAttribute("opacity", String(1 - t * 0.3));
      }
      if (nSub) nSub.setAttribute("opacity", String(1 - easeOutCubic(p)));
    }});

    kf.push({ t: 5.5, dur: 0.01, fn() {
      clearCenter();
      nMain = null; nSub = null;
      const pos = phasePos(0);
      const off = scatterOffset(0);
      parkText(cfg.normal.main.substring(0, 28) + "…", pos.x + off.x, pos.y + off.y, 10, "#4a90d9", 0);
    }});

    // === Anomaly-Dismissal Pairs (5s each) ===
    for (let i = 0; i < N; i++) {
      const base = normalEnd + i * 5;
      const pair = cfg.anomalies[i];
      const yr = cfg.years.anomalies[i] || cfg.years.anomalies[0];
      let aText = null, dText = null;

      kf.push({ t: base, dur: 0.01, fn() {
        clearCenter();
        setYear(yr);
      }});

      kf.push({ t: base + 0.05, dur: 0.45, fn(p) {
        if (!aText) {
          aText = createText(pair.anomaly, CX, CY - 15, 28, "#d4a574");
          aText.setAttribute("letter-spacing", "0");
          centerStage.appendChild(aText);
        }
        aText.setAttribute("font-size", Math.round(28 * Math.max(0.1, easeOutBack(p))));
        aText.setAttribute("opacity", Math.min(1, p * 2.5));
      }});

      kf.push({ t: base + 0.5, dur: 2, fn() {} });

      kf.push({ t: base + 2.5, dur: 0.4, fn(p) {
        if (!dText) {
          dText = createText(pair.dismissal, CX, CY + 25, 18, "#c45c5c");
          dText.setAttribute("font-weight", "normal");
          dText.setAttribute("font-style", "italic");
          dText.setAttribute("letter-spacing", "0");
          dText.setAttribute("opacity", "0");
          centerStage.appendChild(dText);
        }
        dText.setAttribute("opacity", String(easeOutCubic(p) * 0.6));
      }});

      kf.push({ t: base + 2.9, dur: 1.6, fn() {} });

      // Park at Anomaly position (messy scatter)
      kf.push({ t: base + 4.5, dur: 0.5, fn(p) {
        const t = easeInOutCubic(p);
        const pos = phasePos(1);
        const off = scatterOffset(i + 1);
        const tx = pos.x + off.x, ty = pos.y + off.y;
        if (aText) {
          aText.setAttribute("x", CX + (tx - CX) * t);
          aText.setAttribute("y", (CY - 15) + (ty - (CY - 15)) * t);
          aText.setAttribute("font-size", Math.round(28 - 18 * t));
          aText.setAttribute("opacity", String(1 - t * 0.3));
        }
        if (dText) {
          dText.setAttribute("x", CX + (tx - CX) * t);
          dText.setAttribute("y", (CY + 25) + (ty + 12 - (CY + 25)) * t);
          dText.setAttribute("font-size", Math.round(18 - 9 * t));
          dText.setAttribute("opacity", String(0.6 - t * 0.2));
        }
      }});

      kf.push({ t: base + 5, dur: 0.01, fn() {
        clearCenter();
        aText = null; dText = null;
        const pos = phasePos(1);
        const off = scatterOffset(i + 1);
        const px = pos.x + off.x, py = pos.y + off.y;
        parkText(pair.anomaly.substring(0, 32) + "…", px, py, 10, "#d4a574", i * 2 + 1);
        parkText(pair.dismissal.substring(0, 28) + "…", px, py + 12, 9, "#c45c5c88", i * 2 + 2);
      }});
    }

    // === Pause: accumulated mess visible (1s) ===
    kf.push({ t: anomalyEnd, dur: 1, fn() {} });

    // === Crisis Quotes (4s each, 2 quotes) ===
    let crisisEls = [];

    kf.push({ t: crisisQ1Start, dur: 0.01, fn() {
      clearCenter();
      setYear(cfg.years.crisis);
    }});

    kf.push({ t: crisisQ1Start + 0.05, dur: 0.45, fn(p) {
      if (crisisEls.length === 0) {
        const g = document.createElementNS(SVG_NS, "g");
        const yPos = CY - 20;
        const bw = 520, bh = 45, bx = CX - bw/2, by = yPos - 25;
        const rect = document.createElementNS(SVG_NS, "rect");
        rect.setAttribute("x", bx); rect.setAttribute("y", by);
        rect.setAttribute("width", bw); rect.setAttribute("height", bh);
        rect.setAttribute("rx", 10); rect.setAttribute("ry", 10);
        rect.setAttribute("fill", "#c45c5c22"); rect.setAttribute("stroke", "#c45c5c");
        rect.setAttribute("stroke-width", "1");
        g.appendChild(rect);
        const q = createText(cfg.crisis[0], CX, yPos, 18, "#c45c5c");
        q.setAttribute("font-style", "italic"); q.setAttribute("font-weight", "normal");
        q.setAttribute("letter-spacing", "0");
        g.appendChild(q);
        g.setAttribute("opacity", "0");
        centerStage.appendChild(g);
        crisisEls.push(g);
      }
      crisisEls[0].setAttribute("opacity", easeOutCubic(p));
    }});

    kf.push({ t: crisisQ1Start + 0.5, dur: 3.5, fn() {} });

    if (cfg.crisis.length > 1) {
      kf.push({ t: crisisQ2Start + 0.05, dur: 0.45, fn(p) {
        if (crisisEls.length < 2) {
          const g = document.createElementNS(SVG_NS, "g");
          const yPos = CY + 30;
          const bw = 520, bh = 45, bx = CX - bw/2, by = yPos - 25;
          const rect = document.createElementNS(SVG_NS, "rect");
          rect.setAttribute("x", bx); rect.setAttribute("y", by);
          rect.setAttribute("width", bw); rect.setAttribute("height", bh);
          rect.setAttribute("rx", 10); rect.setAttribute("ry", 10);
          rect.setAttribute("fill", "#c45c5c22"); rect.setAttribute("stroke", "#c45c5c");
          rect.setAttribute("stroke-width", "1");
          g.appendChild(rect);
          const q = createText(cfg.crisis[1], CX, yPos, 18, "#c45c5c");
          q.setAttribute("font-style", "italic"); q.setAttribute("font-weight", "normal");
          q.setAttribute("letter-spacing", "0");
          g.appendChild(q);
          g.setAttribute("opacity", "0");
          centerStage.appendChild(g);
          crisisEls.push(g);
        }
        crisisEls[1].setAttribute("opacity", easeOutCubic(p));
      }});

      kf.push({ t: crisisQ2Start + 0.5, dur: 3.5, fn() {} });
    }

    // Park crisis quotes at Crisis position
    kf.push({ t: crisisParkStart, dur: 0.5, fn(p) {
      for (const el of crisisEls) el.setAttribute("opacity", 1 - easeOutCubic(p));
    }});

    kf.push({ t: crisisParkEnd, dur: 0.01, fn() {
      clearCenter();
      crisisEls = [];
      for (let i = 0; i < cfg.crisis.length; i++) {
        const pos = phasePos(2);
        const off = scatterOffset(N + i + 2);
        parkText(cfg.crisis[i].substring(0, 32) + "…", pos.x + off.x, pos.y + off.y, 9, "#c45c5c88", N + i + 2);
      }
    }});

    // === Crisis Moment: dramatic revelation (5.5s center) ===
    let mMain = null, mName = null;

    kf.push({ t: momentStart, dur: 0.01, fn() {
      setYear(cfg.years.revolution);
    }});

    kf.push({ t: momentStart + 0.05, dur: 0.5, fn(p) {
      if (!mMain) {
        mMain = createText(cfg.revolution.main, CX, CY - 15, 28, "#d4a017", { filter: "url(#glow)" });
        mMain.setAttribute("letter-spacing", "0");
        centerStage.appendChild(mMain);
      }
      mMain.setAttribute("opacity", easeOutCubic(p));
      mMain.setAttribute("font-size", Math.round(28 * Math.max(0.1, easeOutBack(p))));
    }});

    kf.push({ t: momentStart + 0.8, dur: 0.3, fn(p) {
      if (!mName) {
        mName = createText(cfg.revolution.name, CX, CY + 20, 14, "#d4a017");
        mName.setAttribute("font-weight", "normal");
        centerStage.appendChild(mName);
      }
      mName.setAttribute("opacity", easeOutCubic(p) * 0.7);
    }});

    kf.push({ t: momentStart + 1.1, dur: 3.9, fn() {} });

    // Park crisis moment at Revolution position
    kf.push({ t: momentStart + 5, dur: 0.5, fn(p) {
      const t = easeInOutCubic(p);
      const pos = phasePos(3);
      const off = scatterOffset(N + cfg.crisis.length + 3);
      const tx = pos.x + off.x, ty = pos.y + off.y;
      if (mMain) {
        mMain.setAttribute("x", CX + (tx - CX) * t);
        mMain.setAttribute("y", (CY - 15) + (ty - (CY - 15)) * t);
        mMain.setAttribute("font-size", Math.round(28 - 18 * t));
        mMain.setAttribute("opacity", String(1 - t * 0.3));
      }
      if (mName) mName.setAttribute("opacity", String(0.7 * (1 - easeOutCubic(p))));
    }});

    kf.push({ t: momentEnd, dur: 0.01, fn() {
      clearCenter();
      const pos = phasePos(3);
      const off = scatterOffset(N + cfg.crisis.length + 3);
      parkText(cfg.revolution.main.substring(0, 32) + "…", pos.x + off.x, pos.y + off.y, 10, "#d4a01788", N + cfg.crisis.length + 3);
      mMain = null; mName = null;
    }});

    // === Paradigm Death Sequence ===

    // Step 1: Old paradigm moves from title bar to center (1.5s)
    let deathEl = null;
    kf.push({ t: deathMoveStart, dur: 0.01, fn() {
      titleLine2.setAttribute("opacity", "0");
      deathEl = createText(cfg.title2, CX, 45, 15, "#e8e0d0");
      deathEl.setAttribute("font-style", "italic");
      deathEl.setAttribute("text-anchor", "middle");
      centerStage.appendChild(deathEl);
    }});

    kf.push({ t: deathMoveStart + 0.01, dur: 1.5, fn(p) {
      if (!deathEl) return;
      const t = easeInOutCubic(p);
      deathEl.setAttribute("y", String(45 + (CY - 45) * t));
      deathEl.setAttribute("font-size", String(Math.round(15 + 25 * t)));
      deathEl.setAttribute("opacity", String(0.8 + 0.2 * t));
    }});

    // Step 2: Old paradigm shakes (2.5s)
    kf.push({ t: shakeStart, dur: 2.5, fn(p) {
      if (!deathEl) return;
      const amp = 3 + p * 7;
      const freq = 15;
      deathEl.setAttribute("x", String(CX + amp * Math.sin(p * freq * Math.PI * 2)));
      deathEl.setAttribute("y", String(CY + amp * Math.cos(p * freq * Math.PI * 2 * 0.7)));
      deathEl.setAttribute("opacity", String(1.0 - p * 0.7));
    }});

    // Step 3: Final fade out (0.5s)
    kf.push({ t: shakeEnd, dur: 0.5, fn(p) {
      if (!deathEl) return;
      deathEl.setAttribute("opacity", String(0.3 * (1 - easeOutCubic(p))));
    }});

    kf.push({ t: shakeOutEnd, dur: 0.01, fn() {
      if (deathEl && deathEl.parentNode) deathEl.parentNode.removeChild(deathEl);
      deathEl = null;
    }});

    // Step 4: All accumulated junk fades out (1s)
    kf.push({ t: shakeOutEnd + 0.01, dur: 1, fn(p) {
      const fade = 1 - easeOutCubic(p);
      for (const el of accumulatedEls) {
        el.setAttribute("opacity", String(parseFloat(el.getAttribute("opacity") || 1) * fade));
      }
    }});

    kf.push({ t: junkFadeEnd, dur: 0.01, fn() {
      for (const el of accumulatedEls) { if (el.parentNode) el.parentNode.removeChild(el); }
      accumulatedEls.length = 0;
      clearCenter();
    }});

    // Step 5: Clean moment (1s) — just the loop
    kf.push({ t: junkFadeEnd + 0.01, dur: 0.99, fn() {} });

    // Step 5+6: New paradigm enters center + title bar updates
    let npEl = null;

    kf.push({ t: npCenterStart, dur: 0.5, fn(p) {
      if (!npEl) {
        npEl = createText(cfg.title3, CX, CY, 48, "#5c9c5c");
        npEl.setAttribute("font-weight", "bold");
        npEl.setAttribute("letter-spacing", "0");
        centerStage.appendChild(npEl);
      }
      npEl.setAttribute("font-size", String(Math.round(48 * easeOutBack(p))));
      npEl.setAttribute("opacity", String(easeOutCubic(p)));
      // Title bar: strikethrough + new paradigm
      const bbox = titleLine2.getBBox ? titleLine2.getBBox() : { x: 200, width: 800 };
      titleStrike.setAttribute("x1", bbox.x || 200);
      titleStrike.setAttribute("x2", (bbox.x || 200) + (bbox.width || 800) * easeOutCubic(p));
      titleStrike.setAttribute("opacity", easeOutCubic(p));
      titleLine2.setAttribute("opacity", String(0.4 * easeOutCubic(p)));
      titleLine2.setAttribute("font-size", "12");
      titleLine3.textContent = cfg.title3;
      titleLine3.setAttribute("opacity", String(easeOutCubic(p)));
    }});

    kf.push({ t: npCenterStart + 0.5, dur: 1.5, fn() {} });

    // Step 7: New paradigm parks at New Paradigm position
    kf.push({ t: npParkStart, dur: 0.5, fn(p) {
      if (!npEl) return;
      const t = easeInOutCubic(p);
      const pos = phasePos(4);
      const off = scatterOffset(N * 2 + 5);
      npEl.setAttribute("x", String(CX + (pos.x + off.x - CX) * t));
      npEl.setAttribute("y", String(CY + (pos.y + off.y - CY) * t));
      npEl.setAttribute("font-size", String(Math.round(48 - 37 * t)));
      npEl.setAttribute("opacity", String(1 - t * 0.3));
    }});

    kf.push({ t: npParkEnd, dur: 0.01, fn() {
      clearCenter();
      npEl = null;
      const pos = phasePos(4);
      const off = scatterOffset(N * 2 + 5);
      parkText(cfg.title3.substring(0, 32) + "…", pos.x + off.x, pos.y + off.y, 10, "#5c9c5c", N * 2 + 5);
    }});

    // Step 8: Technology/outcome
    let techEl = null;

    kf.push({ t: techStart, dur: 0.5, fn(p) {
      if (!techEl) {
        techEl = createText(cfg.newParadigm, CX, CY, 26, "#5c9c5c");
        techEl.setAttribute("letter-spacing", "0");
        centerStage.appendChild(techEl);
      }
      techEl.setAttribute("opacity", String(easeOutCubic(p)));
      techEl.setAttribute("font-size", String(Math.round(26 * easeOutBack(p))));
    }});

    kf.push({ t: techStart + 0.5, dur: 1.5, fn() {} });

    // Park tech at New Paradigm position too
    kf.push({ t: techParkStart, dur: 0.5, fn(p) {
      if (!techEl) return;
      const t = easeInOutCubic(p);
      const pos = phasePos(4);
      const off = scatterOffset(N * 2 + 6);
      techEl.setAttribute("x", String(CX + (pos.x + off.x - CX) * t));
      techEl.setAttribute("y", String(CY + (pos.y + off.y - CY) * t));
      techEl.setAttribute("font-size", String(Math.round(26 - 16 * t)));
      techEl.setAttribute("opacity", String(1 - t * 0.3));
    }});

    kf.push({ t: techParkEnd, dur: 0.01, fn() {
      clearCenter();
      techEl = null;
      const pos = phasePos(4);
      const off = scatterOffset(N * 2 + 6);
      parkText(cfg.newParadigm.substring(0, 28) + "…", pos.x + off.x, pos.y + off.y, 9, "#5c9c5c", N * 2 + 6);
    }});

    // Step 9: Transition note
    kf.push({ t: transStart, dur: 0.5, fn(p) {
      if (cfg.transitionYears) {
        clearCenter();
        const el = createText(cfg.transitionYears, CX, CY, 16, "#e8e0d088");
        el.setAttribute("opacity", String(easeOutCubic(p) * 0.6));
        centerStage.appendChild(el);
      }
      setYear(cfg.years.newParadigm);
    }});

    // Step 10: Final pause
    kf.push({ t: pauseFinal, dur: 1.5, fn(p) {
      if (p > 0.5) clearCenter();
    }});

    return { keyframes: kf, duration: TOTAL };
  }

  // --- Segment 2: Oxygen / Chemical Revolution (34.5s) ---

  // --- Segment 3: Evolution / Darwinian Revolution (38.5s) ---

  function buildSegment3Timeline() {
    return buildRevolutionTimeline({
      title1: "The Darwinian Revolution (1831–1953)",
      title2: "Each species was created in its present form. Species do not change.",
      title3: "Species descend from common ancestors through natural selection.",
      years: {

        anomalies: ["1811", "1822", "1835", "1838", "1844"],
        crisis: "1844–1858",
        revolution: "1859",
        newParadigm: "1953"
      },
      normal: {
        main: "Every living thing in its place. The Great Chain of Being.",
        sub: "Linnaeus’s fixed classification (~1735)"
      },
      anomalies: [
        { anomaly: "Fossils of creatures that no longer exist.",
          dismissal: "“God created them and then un-created them.”" },
        { anomaly: "A whale’s flipper has the same bones as a human hand.",
          dismissal: "“The Creator reused a good design.”" },
        { anomaly: "Same fossils found in South America AND Africa.",
          dismissal: "“They were placed there independently.”" },
        { anomaly: "Selective breeding changes animals dramatically in generations.",
          dismissal: "“That’s artificial, not natural. Different thing entirely.”" },
        { anomaly: "Galápagos finches: different beaks on different islands.",
          dismissal: "“Each island received its own creation.”" },
      ],
      crisis: [
        "“To suggest we descend from apes is an insult to our Creator.”",
        "“Darwin delays publication twenty years, dreading the response.”"
      ],
      revolution: {
        main: "On the Origin of Species. Descent with modification.",
        sub: "Natural selection. Variation. Inheritance. Competition. Time.",

      newParadigm: "DNA. Genetics. Gene therapy. CRISPR.",
      transitionYears: "~122 years"
    });
  }

  // --- Segment 4: Germ Theory (34.5s) ---

  function buildSegment4Timeline() {
    return buildRevolutionTimeline({
      title1: "The Germ Theory Revolution (1847–1885)",
      title2: "Disease arises from miasma — foul vapors from rotting matter.",
      title3: "Disease is caused by microorganisms. Hygiene saves lives.",
      years: {
        normal: "~1840",
        anomalies: ["1847", "1854", "1856", "1858"],
        crisis: "1850–1861",
        revolution: "1861",
        newParadigm: "1885"
      },
      normal: {

        sub: "Miasma theory, ancient tradition. Galen, ~200 AD"
      },

        { anomaly: "Semmelweis: wash hands between patients. Deaths drop 18% → 1%.",
          dismissal: "“A gentleman’s hands are always clean.”" },

          dismissal: "“The miasma was already present in the wound.”" },
        { anomaly: "Semmelweis committed to an asylum. Dies there, age 47.",
          dismissal: "“He was clearly unstable. His ideas were offensive.”" },
      ],

      ],

        sub: "No spontaneous generation. Germs are real. They can be killed.",

      },

  // --- Playback ---
  let currentTimeline = null;

  function tick(timestamp) {
    if (!engine.playing) return;

    const elapsed = (timestamp - engine.timelineStart - engine.pauseOffset) / 1000;
    const tl = currentTimeline;

    if (elapsed >= tl.duration) {
      engine.playing = false;
      engine.resolved = true;
      playIcon.textContent = "▶";
      updateProgress(1);
      if (engine.segment === 0) startYahPulse();
      return;
    }

    updateProgress(elapsed / tl.duration);

    // First: finalize any completed keyframes in forward order
    // (fixes bug where point-events at same timestamp as later keyframes were skipped)
    for (let i = 0; i < tl.keyframes.length; i++) {
      const kf = tl.keyframes[i];
      if (elapsed >= kf.t + kf.dur && !kf._done) {
        kf.fn(1);
        kf._done = true;
      }
    }

    // Then: run the current active keyframe (last matching wins)
    for (let i = tl.keyframes.length - 1; i >= 0; i--) {
      const kf = tl.keyframes[i];
      if (elapsed >= kf.t && elapsed < kf.t + kf.dur) {
        kf.fn(Math.min(1, Math.max(0, (elapsed - kf.t) / kf.dur)));
        break;
      }
    }

    engine.rafId = requestAnimationFrame(tick);
  }

  // YOU ARE HERE pulse
  let yahPulseId = null;
  function startYahPulse() {
    if (yahPulseId) return;
    let start = null;
    function pulse(ts) {
      if (!engine.resolved) { yahPulseId = null; return; }
      if (!start) start = ts;
      const t = (ts - start) / 1000;
      const dot = document.getElementById("yah-dot");
      if (dot) {
        dot.setAttribute("r", String(6 + 2 * Math.sin(t * 2.5)));
        dot.setAttribute("opacity", String(0.7 + 0.3 * Math.sin(t * 2.5)));
      }
      yahPulseId = requestAnimationFrame(pulse);
    }
    yahPulseId = requestAnimationFrame(pulse);
  }

  function stopYahPulse() {
    if (yahPulseId) { cancelAnimationFrame(yahPulseId); yahPulseId = null; }
  }

  // Public API
  const segmentBuilders = [
    buildSegment0Timeline, buildSegment1Timeline,
    buildSegment2Timeline, buildSegment3Timeline, buildSegment4Timeline
  ];

  function playSegment(n) {
    if (n < 0 || n >= segmentBuilders.length) return;
    stopYahPulse();
    if (engine.rafId) cancelAnimationFrame(engine.rafId);
    clearStage();

    const tl = segmentBuilders[n]();
    currentTimeline = tl;
    engine.segment = n;
    engine.phase = 0;
    engine.playing = true;
    engine.pauseOffset = 0;
    engine.timelineStart = performance.now();
    playIcon.textContent = "⏸";
    engine.rafId = requestAnimationFrame(tick);
  }

  function pause() {
    if (!engine.playing) return;
    engine.playing = false;
    engine.timelinePaused = performance.now();
    playIcon.textContent = "▶";
    if (engine.rafId) cancelAnimationFrame(engine.rafId);
  }

  function resume() {
    if (engine.playing) return;
    if (!currentTimeline) { playSegment(0); return; }
    engine.playing = true;
    engine.pauseOffset += performance.now() - engine.timelinePaused;
    playIcon.textContent = "⏸";
    engine.rafId = requestAnimationFrame(tick);
  }

  function seekTo(n, phaseFraction) {
    if (n < 0 || n >= segmentBuilders.length) return;
    playSegment(n);
    const targetTime = phaseFraction * currentTimeline.duration;
    engine.timelineStart = performance.now() - targetTime * 1000;
  }

  // Events
  playBtn.addEventListener("click", () => {
    if (engine.playing) pause();
    else if (engine.resolved || !currentTimeline) playSegment(engine.segment || 0);
    else resume();
  });

  // Init
  buildScrubber();
  playIcon.textContent = "▶";
  setTimeout(() => playSegment(0), 500);

  window.kuhnEngine = { playSegment, seekTo, pause, resume };
})();
