<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Scientific Revolutions — Abstract Kuhn Cycle</title>
<style>
  body { margin: 0; background: #1a1a2e; display: flex; justify-content: center; align-items: center; min-height: 100vh; font-family: Georgia, serif; }
  svg { max-width: 100vw; max-height: 100vh; }
</style>
</head>
<body>
<svg id="main" viewBox="0 0 1200 700" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="glow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-strong">
      <feGaussianBlur stdDeviation="10" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1200" height="700" fill="#1a1a2e"/>

  <!-- Main stage area -->
  <g id="stage">
    <path id="cycle-path" d="" fill="none" stroke="#e8e0d044" stroke-width="2" stroke-dasharray="6,4"/>
    <g id="loop-labels"></g>
    <g id="center-stage"></g>
    <rect id="golden-flash" x="0" y="0" width="1200" height="700" fill="#d4a017" opacity="0" pointer-events="none"/>
    <g id="you-are-here" opacity="0"></g>

    <!-- Title bar (segments 1+) -->
    <g id="title-bar" opacity="0">
      <text id="title-line1" x="600" y="22" text-anchor="middle" fill="#ffffff" font-size="20" font-family="Georgia, serif" font-weight="bold" letter-spacing="1"></text>
      <text id="title-line2" x="600" y="45" text-anchor="middle" fill="#e8e0d0" font-size="15" font-family="Georgia, serif" font-style="italic" opacity="0.67"></text>
      <line id="title-strike" x1="300" y1="45" x2="300" y2="45" stroke="#c45c5c" stroke-width="2" opacity="0"/>
      <text id="title-line3" x="600" y="68" text-anchor="middle" fill="#d4a017" font-size="15" font-family="Georgia, serif" font-weight="bold" opacity="0"></text>
    </g>

    <!-- Year display (upper-right) -->
    <text id="year-display" x="1150" y="30" text-anchor="end" fill="#e8e0d0" font-size="14" font-family="Georgia, serif" opacity="0"></text>
  </g>

  <!-- Scrubber bar -->
  <g id="scrubber">
    <rect x="60" y="660" width="1080" height="2" fill="#e8e0d033" rx="1"/>
    <rect id="progress-bar" x="60" y="660" width="0" height="2" fill="#d4a017" rx="1"/>
    <g id="play-btn" cursor="pointer">
      <circle cx="30" cy="661" r="14" fill="none" stroke="#e8e0d066" stroke-width="1.5"/>
      <text id="play-icon" x="30" y="667" text-anchor="middle" fill="#e8e0d0" font-size="16" font-family="Georgia, serif"></text>
    </g>
    <g id="scrubber-dots"></g>
  </g>
</svg>

<script>
(function() {
  const SVG_NS = "http://www.w3.org/2000/svg";

  const phases = [
    { name: "NORMAL SCIENCE", color: "#4a90d9", angle: -90 },
    { name: "ANOMALY",        color: "#d4a574", angle: -18 },
    { name: "CRISIS",         color: "#c45c5c", angle: 54  },
    { name: "REVOLUTION",     color: "#d4a017", angle: 126 },
    { name: "NEW NORMAL",     color: "#5c9c5c", angle: 198 },
  ];

  const CX = 600, CY = 310, CR = 270;

  function phasePos(i) {
    const a = phases[i].angle * Math.PI / 180;
    return { x: CX + CR * Math.cos(a), y: CY + CR * Math.sin(a) };
  }

  const segmentLabels = ["Abstract", "1", "2", "3", "4", "5", "6", "7", "8"];

  const engine = {
    segment: 0,
    phase: 0,
    playing: false,
    timelineStart: 0,
    timelinePaused: 0,
    pauseOffset: 0,
    rafId: null,
    resolved: false,
  };

  const centerStage = document.getElementById("center-stage");
  const loopLabels = document.getElementById("loop-labels");
  const cyclePath = document.getElementById("cycle-path");
  const goldenFlash = document.getElementById("golden-flash");
  const youAreHere = document.getElementById("you-are-here");
  const progressBar = document.getElementById("progress-bar");
  const playIcon = document.getElementById("play-icon");
  const playBtn = document.getElementById("play-btn");
  const scrubberDots = document.getElementById("scrubber-dots");
  const titleBar = document.getElementById("title-bar");
  const titleLine1 = document.getElementById("title-line1");
  const titleLine2 = document.getElementById("title-line2");
  const titleStrike = document.getElementById("title-strike");
  const titleLine3 = document.getElementById("title-line3");
  const yearDisplay = document.getElementById("year-display");

  // Easing
  function easeOutBack(t) {
    const c = 1.7;
    return 1 + (t - 1) * (t - 1) * ((c + 1) * (t - 1) + c);
  }
  function easeInOutCubic(t) {
    return t < 0.5 ? 4*t*t*t : 1 - Math.pow(-2*t + 2, 3) / 2;
  }
  function easeOutCubic(t) {
    return 1 - Math.pow(1 - t, 3);
  }

  // SVG helpers
  function createText(text, x, y, size, color, opts = {}) {
    const el = document.createElementNS(SVG_NS, "text");
    el.setAttribute("x", x);
    el.setAttribute("y", y);
    el.setAttribute("text-anchor", "middle");
    el.setAttribute("dominant-baseline", "central");
    el.setAttribute("fill", color);
    el.setAttribute("font-size", size);
    el.setAttribute("font-family", "Georgia, serif");
    el.setAttribute("font-weight", "bold");
    el.setAttribute("letter-spacing", "2");
    if (opts.filter) el.setAttribute("filter", opts.filter);
    if (opts.opacity !== undefined) el.setAttribute("opacity", opts.opacity);
    el.textContent = text;
    return el;
  }

  function arcPathFromAngles(startDeg, endDeg) {
    let sweep = endDeg - startDeg;
    if (sweep < 0) sweep += 360;
    const steps = Math.max(2, Math.ceil(sweep / 30));
    let d = "";
    for (let i = 0; i <= steps; i++) {
      const frac = i / steps;
      const aDeg = startDeg + sweep * frac;
      const a = aDeg * Math.PI / 180;
      const x = CX + CR * Math.cos(a);
      const y = CY + CR * Math.sin(a);
      d += (i === 0 ? `M ${x} ${y}` : ` L ${x} ${y}`);
    }
    return d;
  }

  function fullCirclePath() {
    const steps = 72;
    let d = "";
    for (let i = 0; i <= steps; i++) {
      const a = (i / steps) * 2 * Math.PI - Math.PI / 2;
      const x = CX + CR * Math.cos(a);
      const y = CY + CR * Math.sin(a);
      d += (i === 0 ? `M ${x} ${y}` : ` L ${x} ${y}`);
    }
    return d + " Z";
  }

  // Scrubber
  function buildScrubber() {
    const x0 = 60, x1 = 1140, span = x1 - x0;
    for (let i = 0; i < 9; i++) {
      const x = x0 + (span * i / 8);
      const active = (i <= 1);
      const g = document.createElementNS(SVG_NS, "g");
      g.setAttribute("cursor", active ? "pointer" : "default");

      const c = document.createElementNS(SVG_NS, "circle");
      c.setAttribute("cx", x);
      c.setAttribute("cy", 661);
      c.setAttribute("r", active ? 7 : 5);
      c.setAttribute("fill", active ? "#d4a017" : "#e8e0d044");
      if (active) { c.setAttribute("stroke", "#d4a017"); c.setAttribute("stroke-width", "2"); }
      g.appendChild(c);

      const t = document.createElementNS(SVG_NS, "text");
      t.setAttribute("x", x);
      t.setAttribute("y", 685);
      t.setAttribute("text-anchor", "middle");
      t.setAttribute("fill", active ? "#d4a017" : "#e8e0d066");
      t.setAttribute("font-size", "11");
      t.setAttribute("font-family", "Georgia, serif");
      t.textContent = segmentLabels[i];
      g.appendChild(t);

      if (active) g.addEventListener("click", () => playSegment(i));
      scrubberDots.appendChild(g);
    }
    playIcon.textContent = "▶";
  }

  function updateProgress(fraction) {
    const x0 = 60, segWidth = (1140 - 60) / 8;
    progressBar.setAttribute("x", x0 + engine.segment * segWidth);
    progressBar.setAttribute("width", Math.max(0, segWidth * fraction));
  }

  function clearStage() {
    while (centerStage.firstChild) centerStage.removeChild(centerStage.firstChild);
    while (loopLabels.firstChild) loopLabels.removeChild(loopLabels.firstChild);
    cyclePath.setAttribute("d", "");
    cyclePath.setAttribute("opacity", 1);
    cyclePath.removeAttribute("stroke-dashoffset");
    goldenFlash.setAttribute("opacity", 0);
    youAreHere.setAttribute("opacity", 0);
    while (youAreHere.firstChild) youAreHere.removeChild(youAreHere.firstChild);
    titleBar.setAttribute("opacity", 0);
    titleLine1.textContent = "";
    titleLine2.textContent = "";
    titleLine3.textContent = "";
    titleLine3.setAttribute("opacity", 0);
    titleStrike.setAttribute("opacity", 0);
    yearDisplay.setAttribute("opacity", 0);
    yearDisplay.textContent = "";
    engine.resolved = false;
  }

  // --- Timeline for segment 0: Abstract Kuhn Cycle (~16.5s) ---

  function buildSegment0Timeline() {
    const TOTAL = 16.5;
    const loopLabelEls = [];
    let centerEl = null;

    function showCenter(name, color, scale, opacity, glowing) {
      if (!centerEl || centerEl.dataset.name !== name) {
        if (centerEl && centerEl.parentNode) centerStage.removeChild(centerEl);
        centerEl = createText(name, CX, CY, 48, color, glowing ? { filter: "url(#glow-strong)" } : {});
        centerEl.dataset.name = name;
        centerStage.appendChild(centerEl);
      }
      centerEl.setAttribute("fill", color);
      centerEl.setAttribute("font-size", Math.round(48 * scale));
      centerEl.setAttribute("opacity", opacity);
      centerEl.setAttribute("x", CX);
      centerEl.setAttribute("y", CY);
      if (glowing) centerEl.setAttribute("filter", "url(#glow-strong)");
      else centerEl.removeAttribute("filter");
    }

    function removeCenter() {
      if (centerEl && centerEl.parentNode) centerStage.removeChild(centerEl);
      centerEl = null;
    }

    function addLoopLabel(idx, opacity, scale) {
      const p = phasePos(idx);
      let el = loopLabelEls[idx];
      if (!el) {
        el = createText(phases[idx].name, p.x, p.y, 16, phases[idx].color);
        loopLabels.appendChild(el);
        loopLabelEls[idx] = el;
      }
      el.setAttribute("opacity", opacity);
      el.setAttribute("font-size", Math.round(16 * scale));
    }

    function flyToLoop(idx, progress) {
      const t = easeInOutCubic(progress);
      const p = phasePos(idx);
      const dx = p.x - CX, dy = p.y - CY;
      const perpX = -dy, perpY = dx;
      const arcBow = Math.sin(t * Math.PI) * 0.2;
      const fx = CX + dx * t + perpX * arcBow;
      const fy = CY + dy * t + perpY * arcBow;
      const size = 48 - 32 * t;
      if (centerEl) {
        centerEl.setAttribute("x", fx);
        centerEl.setAttribute("y", fy);
        centerEl.setAttribute("font-size", Math.round(size));
      }
    }

    function drawArcProgressTo(idx, progress) {
      if (idx <= 0) return;
      const startAngle = phases[0].angle;
      let prevAngle = phases[idx - 1].angle;
      let targetAngle = phases[idx].angle;
      let delta = targetAngle - prevAngle;
      if (delta < 0) delta += 360;
      const currentEnd = prevAngle + delta * progress;
      // Full arc from phase 0 to currentEnd
      let totalEnd = currentEnd - startAngle;
      if (totalEnd < 0) totalEnd += 360;
      cyclePath.setAttribute("d", arcPathFromAngles(startAngle, startAngle + totalEnd));
    }

    function drawArcTo(idx) {
      const startAngle = phases[0].angle;
      let endAngle = phases[idx].angle;
      let sweep = endAngle - startAngle;
      if (sweep < 0) sweep += 360;
      cyclePath.setAttribute("d", arcPathFromAngles(startAngle, startAngle + sweep));
    }

    // Build keyframes: [{ t, dur, fn(progress) }]
    // fn called with progress 0..1 within the keyframe's duration
    const kf = [];

    // Phase 0: NORMAL SCIENCE — 0s to 3s display, then fly
    kf.push({ t: 0, dur: 0.5, fn(p) {
      showCenter("NORMAL SCIENCE", "#4a90d9", easeOutBack(p), 1, false);
    }});
    kf.push({ t: 0.5, dur: 2.5, fn() {
      showCenter("NORMAL SCIENCE", "#4a90d9", 1, 1, false);
    }});
    kf.push({ t: 3, dur: 0.5, fn(p) {
      flyToLoop(0, p);
    }});
    kf.push({ t: 3.5, dur: 0.01, fn() {
      removeCenter();
      addLoopLabel(0, 1, 1);
    }});

    // Phase 1: ANOMALY — 3.5s to 6s display, then fly
    kf.push({ t: 3.5, dur: 0.5, fn(p) {
      showCenter("ANOMALY", "#d4a574", easeOutBack(p), 1, false);
    }});
    kf.push({ t: 4, dur: 2, fn() {
      showCenter("ANOMALY", "#d4a574", 1, 1, false);
    }});
    kf.push({ t: 6, dur: 0.5, fn(p) {
      flyToLoop(1, p);
      drawArcProgressTo(1, p);
    }});
    kf.push({ t: 6.5, dur: 0.01, fn() {
      removeCenter();
      addLoopLabel(1, 1, 1);
      drawArcTo(1);
    }});

    // Phase 2: CRISIS — 6.5s to 9s display, then fly
    kf.push({ t: 6.5, dur: 0.5, fn(p) {
      showCenter("CRISIS", "#c45c5c", easeOutBack(p), 1, false);
    }});
    kf.push({ t: 7, dur: 2, fn() {
      showCenter("CRISIS", "#c45c5c", 1, 1, false);
    }});
    kf.push({ t: 9, dur: 0.5, fn(p) {
      flyToLoop(2, p);
      drawArcProgressTo(2, p);
    }});
    kf.push({ t: 9.5, dur: 0.01, fn() {
      removeCenter();
      addLoopLabel(2, 1, 1);
      drawArcTo(2);
    }});

    // Phase 3: REVOLUTION — 9.5s to 11s display
    kf.push({ t: 9.5, dur: 0.5, fn(p) {
      showCenter("REVOLUTION", "#d4a017", easeOutBack(p), 1, true);
    }});
    kf.push({ t: 10, dur: 1, fn() {
      showCenter("REVOLUTION", "#d4a017", 1, 1, true);
    }});

    // 11s: GOLDEN FLASH — clears accumulated labels
    kf.push({ t: 11, dur: 0.4, fn(p) {
      let flashOp;
      if (p < 0.35) flashOp = easeOutCubic(p / 0.35) * 0.6;
      else flashOp = 0.6 * (1 - easeOutCubic((p - 0.35) / 0.65));
      goldenFlash.setAttribute("opacity", flashOp);

      const fadeOut = 1 - easeOutCubic(Math.min(1, p * 2));
      for (let i = 0; i < loopLabelEls.length; i++) {
        if (loopLabelEls[i]) loopLabelEls[i].setAttribute("opacity", fadeOut);
      }
      cyclePath.setAttribute("opacity", fadeOut);
    }});
    kf.push({ t: 11.4, dur: 0.01, fn() {
      goldenFlash.setAttribute("opacity", 0);
      while (loopLabels.firstChild) loopLabels.removeChild(loopLabels.firstChild);
      loopLabelEls.length = 0;
      cyclePath.setAttribute("d", "");
      cyclePath.setAttribute("opacity", 1);
      showCenter("REVOLUTION", "#d4a017", 1, 1, true);
    }});

    // 11.4-13s: Clean moment — REVOLUTION glowing center with gentle pulse
    kf.push({ t: 11.41, dur: 1.59, fn(p) {
      const pulse = 1 + 0.04 * Math.sin(p * Math.PI * 3);
      showCenter("REVOLUTION", "#d4a017", pulse, 1, true);
    }});

    // 13-15s: Fade out center, redraw all 5 labels + full circle
    kf.push({ t: 13, dur: 0.4, fn(p) {
      showCenter("REVOLUTION", "#d4a017", 1, 1 - easeOutCubic(p), true);
    }});
    kf.push({ t: 13.4, dur: 0.01, fn() {
      removeCenter();
    }});
    kf.push({ t: 13.41, dur: 1.59, fn(p) {
      const t = easeOutCubic(p);
      // Draw full circle
      const fc = fullCirclePath();
      cyclePath.setAttribute("d", fc);
      const totalLen = 2 * Math.PI * CR;
      cyclePath.setAttribute("stroke-dasharray", String(totalLen));
      cyclePath.setAttribute("stroke-dashoffset", String(totalLen * (1 - t)));

      // Stagger fade-in for labels
      for (let i = 0; i < 5; i++) {
        const stagger = i * 0.12;
        const lp = Math.max(0, Math.min(1, (p - stagger) / (1 - stagger)));
        addLoopLabel(i, easeOutCubic(lp), 0.6 + 0.4 * easeOutBack(Math.min(1, lp)));
      }
    }});

    // 15-15.5s: Settle resolved state
    kf.push({ t: 15, dur: 0.5, fn() {
      cyclePath.setAttribute("stroke-dashoffset", "0");
      cyclePath.setAttribute("stroke-dasharray", "6,4");
      for (let i = 0; i < 5; i++) addLoopLabel(i, 1, 1);
    }});

    // 15.5-16.5s: YOU ARE HERE at Anomaly
    kf.push({ t: 15.5, dur: 1, fn(p) {
      const pos = phasePos(1);
      youAreHere.setAttribute("opacity", easeOutCubic(p));
      if (!youAreHere.firstChild) {
        const arrow = createText("← YOU ARE HERE", pos.x + 55, pos.y, 14, "#d4a017", { filter: "url(#glow)" });
        arrow.setAttribute("text-anchor", "start");
        youAreHere.appendChild(arrow);

        const dot = document.createElementNS(SVG_NS, "circle");
        dot.setAttribute("cx", pos.x);
        dot.setAttribute("cy", pos.y);
        dot.setAttribute("r", 6);
        dot.setAttribute("fill", "#d4a017");
        dot.setAttribute("filter", "url(#glow)");
        dot.id = "yah-dot";
        youAreHere.appendChild(dot);
      }
    }});

    return { keyframes: kf, duration: TOTAL };
  }

  // --- Timeline for segment 1: Heliocentrism (20s) ---

  function buildSegment1Timeline() {
    const TOTAL = 20;
    const accumulatedEls = [];
    const years = ["~1400", "1543", "1543–1610", "1610", "1687"];

    function setYear(yr) {
      yearDisplay.textContent = yr;
      yearDisplay.setAttribute("opacity", "0.55");
    }

    function showLoopFrame() {
      cyclePath.setAttribute("d", fullCirclePath());
      cyclePath.setAttribute("stroke-dasharray", "6,4");
      cyclePath.removeAttribute("stroke-dashoffset");
      cyclePath.setAttribute("opacity", "0.25");
      for (let i = 0; i < 5; i++) {
        const p = phasePos(i);
        const el = createText(phases[i].name, p.x, p.y, 12, phases[i].color, { opacity: 0.25 });
        el.setAttribute("font-size", "12");
        loopLabels.appendChild(el);
      }
    }

    function addLoopContent(idx, shortText, color) {
      const p = phasePos(idx);
      const el = createText(shortText, p.x, p.y + 18, 11, color);
      el.setAttribute("font-weight", "normal");
      el.setAttribute("letter-spacing", "0");
      loopLabels.appendChild(el);
      accumulatedEls.push(el);
    }

    function flyMainToLoop(el, startX, startY, idx, p) {
      const t = easeInOutCubic(p);
      const pos = phasePos(idx);
      const dx = pos.x - startX, dy = (pos.y + 18) - startY;
      const perpX = -dy, perpY = dx;
      const len = Math.sqrt(dx*dx + dy*dy) || 1;
      const arcBow = Math.sin(t * Math.PI) * 40 / len;
      el.setAttribute("x", startX + dx * t + perpX * arcBow);
      el.setAttribute("y", startY + dy * t);
    }

    const kf = [];

    // === Setup: loop frame + title bar fade in (0-0.5s) ===
    kf.push({ t: 0, dur: 0.5, fn(p) {
      if (p < 0.02) {
        showLoopFrame();
        titleLine1.textContent = "The Copernican Revolution (1543–1687)";
        titleLine2.textContent = "The earth is at the center. The sun, moon, and stars revolve around it.";
      }
      titleBar.setAttribute("opacity", easeOutCubic(p));
      setYear(years[0]);
    }});

    // === NORMAL SCIENCE: 0.5-4s ===
    let nMain = null, nSub = null, nIcon = null;

    kf.push({ t: 0.5, dur: 0.5, fn(p) {
      if (!nMain) {
        nMain = createText("The sun rises east, crosses the sky, sets west.", CX, CY - 20, 32, "#4a90d9");
        nMain.setAttribute("letter-spacing", "0");
        centerStage.appendChild(nMain);
      }
      nMain.setAttribute("font-size", Math.round(32 * Math.max(0.1, easeOutBack(p))));
      nMain.setAttribute("opacity", Math.min(1, p * 2.5));
    }});

    kf.push({ t: 1.5, dur: 0.4, fn(p) {
      if (!nSub) {
        nSub = createText("They built a model to explain this.", CX, CY + 25, 22, "#4a90d9");
        nSub.setAttribute("font-weight", "normal");
        nSub.setAttribute("letter-spacing", "0");
        centerStage.appendChild(nSub);
      }
      nSub.setAttribute("opacity", easeOutCubic(p));
    }});

    kf.push({ t: 2, dur: 0.4, fn(p) {
      if (!nIcon) {
        nIcon = document.createElementNS(SVG_NS, "g");
        const earth = document.createElementNS(SVG_NS, "circle");
        earth.setAttribute("cx", CX); earth.setAttribute("cy", CY + 70);
        earth.setAttribute("r", 6); earth.setAttribute("fill", "#4a90d9");
        nIcon.appendChild(earth);
        for (const r of [20, 35, 50]) {
          const orbit = document.createElementNS(SVG_NS, "circle");
          orbit.setAttribute("cx", CX); orbit.setAttribute("cy", CY + 70);
          orbit.setAttribute("r", r); orbit.setAttribute("fill", "none");
          orbit.setAttribute("stroke", "#4a90d944"); orbit.setAttribute("stroke-width", "1");
          nIcon.appendChild(orbit);
        }
        const sun = document.createElementNS(SVG_NS, "circle");
        sun.setAttribute("cx", CX + 35); sun.setAttribute("cy", CY + 70);
        sun.setAttribute("r", 4); sun.setAttribute("fill", "#d4a574");
        nIcon.appendChild(sun);
        nIcon.setAttribute("opacity", "0");
        centerStage.appendChild(nIcon);
      }
      nIcon.setAttribute("opacity", easeOutCubic(p));
    }});

    kf.push({ t: 2.4, dur: 1.1, fn() {} });

    kf.push({ t: 3.5, dur: 0.5, fn(p) {
      flyMainToLoop(nMain, CX, CY - 20, 0, p);
      nMain.setAttribute("font-size", Math.round(32 - 21 * easeInOutCubic(p)));
      if (nSub) nSub.setAttribute("opacity", 1 - easeOutCubic(p));
      if (nIcon) nIcon.setAttribute("opacity", 1 - easeOutCubic(p));
    }});

    kf.push({ t: 4, dur: 0.01, fn() {
      while (centerStage.firstChild) centerStage.removeChild(centerStage.firstChild);
      nMain = null; nSub = null; nIcon = null;
      addLoopContent(0, "Sun crosses the sky", "#4a90d9");
    }});

    // === ANOMALY: 4-8s ===
    let aMain = null, aSub = null;

    kf.push({ t: 4, dur: 0.01, fn() { setYear(years[1]); }});

    kf.push({ t: 4.05, dur: 0.5, fn(p) {
      if (!aMain) {
        aMain = createText("Mars stops. Goes backward. Then forward again.", CX, CY - 15, 30, "#d4a574");
        aMain.setAttribute("letter-spacing", "0");
        centerStage.appendChild(aMain);
      }
      aMain.setAttribute("font-size", Math.round(30 * Math.max(0.1, easeOutBack(p))));
      aMain.setAttribute("opacity", Math.min(1, p * 2.5));
    }});

    kf.push({ t: 5, dur: 2.5, fn(p) {
      if (!aSub) {
        aSub = createText("Epicycles needed: 12", CX, CY + 30, 20, "#d4a574");
        aSub.setAttribute("font-weight", "normal");
        aSub.setAttribute("letter-spacing", "0");
        centerStage.appendChild(aSub);
      }
      const count = Math.round(12 + 67 * easeOutCubic(p));
      aSub.textContent = "Epicycles needed: " + count;
    }});

    kf.push({ t: 7.5, dur: 0.5, fn(p) {
      flyMainToLoop(aMain, CX, CY - 15, 1, p);
      aMain.setAttribute("font-size", Math.round(30 - 19 * easeInOutCubic(p)));
      if (aSub) aSub.setAttribute("opacity", 1 - easeOutCubic(p));
    }});

    kf.push({ t: 8, dur: 0.01, fn() {
      while (centerStage.firstChild) centerStage.removeChild(centerStage.firstChild);
      aMain = null; aSub = null;
      addLoopContent(1, "Retrograde + 79 epicycles", "#d4a574");
    }});

    // === CRISIS: 8-12s ===
    let crisisGroup = null;

    kf.push({ t: 8, dur: 0.01, fn() { setYear(years[2]); }});

    kf.push({ t: 8.05, dur: 0.5, fn(p) {
      if (!crisisGroup) {
        crisisGroup = document.createElementNS(SVG_NS, "g");
        const bw = 520, bh = 80, bx = CX - bw/2, by = CY - 50;
        const rect = document.createElementNS(SVG_NS, "rect");
        rect.setAttribute("x", bx); rect.setAttribute("y", by);
        rect.setAttribute("width", bw); rect.setAttribute("height", bh);
        rect.setAttribute("rx", 12); rect.setAttribute("ry", 12);
        rect.setAttribute("fill", "#c45c5c22"); rect.setAttribute("stroke", "#c45c5c");
        rect.setAttribute("stroke-width", "1.5");
        crisisGroup.appendChild(rect);
        const tx = CX - 30, ty = by + bh;
        const tri = document.createElementNS(SVG_NS, "polygon");
        tri.setAttribute("points", tx+","+ty+" "+(tx+20)+","+ty+" "+(tx+10)+","+(ty+12));
        tri.setAttribute("fill", "#c45c5c22"); tri.setAttribute("stroke", "#c45c5c");
        tri.setAttribute("stroke-width", "1.5");
        crisisGroup.appendChild(tri);
        const quote = createText("“The Earth MOVES? Absurd. I can feel that it doesn’t.”", CX, CY - 15, 22, "#c45c5c");
        quote.setAttribute("font-style", "italic");
        quote.setAttribute("font-weight", "normal");
        quote.setAttribute("letter-spacing", "0");
        crisisGroup.appendChild(quote);
        const sub = createText("De Revolutionibus — ignored for 70 years", CX, CY + 55, 16, "#c45c5c");
        sub.setAttribute("font-weight", "normal");
        sub.setAttribute("letter-spacing", "0");
        sub.setAttribute("opacity", "0.6");
        crisisGroup.appendChild(sub);
        crisisGroup.setAttribute("opacity", "0");
        centerStage.appendChild(crisisGroup);
      }
      crisisGroup.setAttribute("opacity", easeOutCubic(p));
    }});

    kf.push({ t: 8.55, dur: 2.95, fn() {} });

    kf.push({ t: 11.5, dur: 0.5, fn(p) {
      if (crisisGroup) crisisGroup.setAttribute("opacity", 1 - easeOutCubic(p));
    }});

    kf.push({ t: 12, dur: 0.01, fn() {
      while (centerStage.firstChild) centerStage.removeChild(centerStage.firstChild);
      crisisGroup = null;
      addLoopContent(2, "“Absurd — I can feel it”", "#c45c5c");
    }});

    // === REVOLUTION: 12-16s ===

    kf.push({ t: 12, dur: 0.4, fn(p) {
      setYear(years[3]);
      let flashOp;
      if (p < 0.35) flashOp = easeOutCubic(p / 0.35) * 0.6;
      else flashOp = 0.6 * (1 - easeOutCubic((p - 0.35) / 0.65));
      goldenFlash.setAttribute("opacity", flashOp);
      const fadeOut = 1 - easeOutCubic(Math.min(1, p * 2));
      for (const el of accumulatedEls) el.setAttribute("opacity", fadeOut);
    }});

    kf.push({ t: 12.4, dur: 0.01, fn() {
      goldenFlash.setAttribute("opacity", 0);
      for (const el of accumulatedEls) { if (el.parentNode) el.parentNode.removeChild(el); }
      accumulatedEls.length = 0;
    }});

    let rMain = null, rSub = null, rIcon = null, rName = null;

    kf.push({ t: 12.5, dur: 0.5, fn(p) {
      if (!rMain) {
        rMain = createText("Galileo points his telescope at Jupiter.", CX, CY - 30, 32, "#d4a017", { filter: "url(#glow)" });
        rMain.setAttribute("letter-spacing", "0");
        centerStage.appendChild(rMain);
      }
      rMain.setAttribute("opacity", easeOutCubic(p));
      rMain.setAttribute("font-size", Math.round(32 * Math.max(0.1, easeOutBack(p))));
    }});

    kf.push({ t: 13.2, dur: 0.4, fn(p) {
      if (!rSub) {
        rSub = createText("Four moons. Orbiting Jupiter. Not Earth.", CX, CY + 10, 24, "#d4a017");
        rSub.setAttribute("font-weight", "normal");
        rSub.setAttribute("letter-spacing", "1");
        centerStage.appendChild(rSub);
      }
      rSub.setAttribute("opacity", easeOutCubic(p));
    }});

    kf.push({ t: 13.7, dur: 0.3, fn(p) {
      if (!rIcon) {
        rIcon = document.createElementNS(SVG_NS, "g");
        const jup = document.createElementNS(SVG_NS, "circle");
        jup.setAttribute("cx", CX); jup.setAttribute("cy", CY + 55);
        jup.setAttribute("r", 14); jup.setAttribute("fill", "#d4a017");
        jup.setAttribute("opacity", "0.8");
        rIcon.appendChild(jup);
        const moons = [[-30, -5], [-18, 10], [22, -3], [35, 6]];
        for (const [mx, my] of moons) {
          const m = document.createElementNS(SVG_NS, "circle");
          m.setAttribute("cx", CX + mx); m.setAttribute("cy", CY + 55 + my);
          m.setAttribute("r", 3); m.setAttribute("fill", "#e8e0d0");
          rIcon.appendChild(m);
        }
        rIcon.setAttribute("opacity", "0");
        centerStage.appendChild(rIcon);
      }
      rIcon.setAttribute("opacity", easeOutCubic(p));
    }});

    kf.push({ t: 14.1, dur: 0.3, fn(p) {
      if (!rName) {
        rName = createText("Galileo, 1610", CX, CY + 85, 14, "#d4a017");
        rName.setAttribute("font-weight", "normal");
        centerStage.appendChild(rName);
      }
      rName.setAttribute("opacity", easeOutCubic(p) * 0.7);
    }});

    kf.push({ t: 14.4, dur: 1.6, fn() {} });

    // === NEW NORMAL: 16-20s ===
    kf.push({ t: 16, dur: 0.4, fn(p) {
      setYear(years[4]);
      const fade = 1 - easeOutCubic(p);
      if (rMain) rMain.setAttribute("opacity", fade);
      if (rSub) rSub.setAttribute("opacity", fade);
      if (rIcon) rIcon.setAttribute("opacity", fade);
      if (rName) rName.setAttribute("opacity", fade);
    }});

    kf.push({ t: 16.4, dur: 0.01, fn() {
      while (centerStage.firstChild) centerStage.removeChild(centerStage.firstChild);
      rMain = null; rSub = null; rIcon = null; rName = null;
    }});

    let gMain = null, gIcon = null;

    kf.push({ t: 16.5, dur: 0.5, fn(p) {
      if (!gMain) {
        gMain = createText("Navigation. Celestial mechanics. Space travel.", CX, CY - 10, 30, "#5c9c5c");
        gMain.setAttribute("letter-spacing", "0");
        centerStage.appendChild(gMain);
      }
      gMain.setAttribute("opacity", easeOutCubic(p));
      gMain.setAttribute("font-size", Math.round(30 * Math.max(0.1, easeOutBack(p))));
    }});

    kf.push({ t: 17, dur: 0.4, fn(p) {
      if (!gIcon) {
        gIcon = document.createElementNS(SVG_NS, "g");
        const sun = document.createElementNS(SVG_NS, "circle");
        sun.setAttribute("cx", CX); sun.setAttribute("cy", CY + 50);
        sun.setAttribute("r", 8); sun.setAttribute("fill", "#d4a574");
        gIcon.appendChild(sun);
        for (const r of [22, 36, 52]) {
          const orbit = document.createElementNS(SVG_NS, "circle");
          orbit.setAttribute("cx", CX); orbit.setAttribute("cy", CY + 50);
          orbit.setAttribute("r", r); orbit.setAttribute("fill", "none");
          orbit.setAttribute("stroke", "#5c9c5c44"); orbit.setAttribute("stroke-width", "1");
          gIcon.appendChild(orbit);
        }
        const earth = document.createElementNS(SVG_NS, "circle");
        earth.setAttribute("cx", CX + 36); earth.setAttribute("cy", CY + 50);
        earth.setAttribute("r", 4); earth.setAttribute("fill", "#4a90d9");
        gIcon.appendChild(earth);
        gIcon.setAttribute("opacity", "0");
        centerStage.appendChild(gIcon);
      }
      gIcon.setAttribute("opacity", easeOutCubic(p));
    }});

    // Title bar resolve: strikethrough old paradigm
    kf.push({ t: 17.5, dur: 0.8, fn(p) {
      const bbox = titleLine2.getBBox ? titleLine2.getBBox() : { x: 200, width: 800 };
      titleStrike.setAttribute("x1", bbox.x);
      titleStrike.setAttribute("x2", bbox.x + bbox.width * easeOutCubic(p));
      titleStrike.setAttribute("opacity", easeOutCubic(p));
    }});

    // New paradigm in gold
    kf.push({ t: 18.3, dur: 0.5, fn(p) {
      titleLine3.textContent = "The earth moves around the sun. The solar system is vast.";
      titleLine3.setAttribute("opacity", easeOutCubic(p));
    }});

    kf.push({ t: 18.8, dur: 1.2, fn() {} });

    return { keyframes: kf, duration: TOTAL };
  }

  // --- Playback ---
  let currentTimeline = null;

  function tick(timestamp) {
    if (!engine.playing) return;

    const elapsed = (timestamp - engine.timelineStart - engine.pauseOffset) / 1000;
    const tl = currentTimeline;

    if (elapsed >= tl.duration) {
      engine.playing = false;
      engine.resolved = true;
      playIcon.textContent = "▶";
      updateProgress(1);
      if (engine.segment === 0) startYahPulse();
      return;
    }

    updateProgress(elapsed / tl.duration);

    // First: finalize any completed keyframes in forward order
    // (fixes bug where point-events at same timestamp as later keyframes were skipped)
    for (let i = 0; i < tl.keyframes.length; i++) {
      const kf = tl.keyframes[i];
      if (elapsed >= kf.t + kf.dur && !kf._done) {
        kf.fn(1);
        kf._done = true;
      }
    }

    // Then: run the current active keyframe (last matching wins)
    for (let i = tl.keyframes.length - 1; i >= 0; i--) {
      const kf = tl.keyframes[i];
      if (elapsed >= kf.t && elapsed < kf.t + kf.dur) {
        kf.fn(Math.min(1, Math.max(0, (elapsed - kf.t) / kf.dur)));
        break;
      }
    }

    engine.rafId = requestAnimationFrame(tick);
  }

  // YOU ARE HERE pulse
  let yahPulseId = null;
  function startYahPulse() {
    if (yahPulseId) return;
    let start = null;
    function pulse(ts) {
      if (!engine.resolved) { yahPulseId = null; return; }
      if (!start) start = ts;
      const t = (ts - start) / 1000;
      const dot = document.getElementById("yah-dot");
      if (dot) {
        dot.setAttribute("r", String(6 + 2 * Math.sin(t * 2.5)));
        dot.setAttribute("opacity", String(0.7 + 0.3 * Math.sin(t * 2.5)));
      }
      yahPulseId = requestAnimationFrame(pulse);
    }
    yahPulseId = requestAnimationFrame(pulse);
  }

  function stopYahPulse() {
    if (yahPulseId) { cancelAnimationFrame(yahPulseId); yahPulseId = null; }
  }

  // Public API
  function playSegment(n) {
    if (n < 0 || n > 1) return;
    stopYahPulse();
    if (engine.rafId) cancelAnimationFrame(engine.rafId);
    clearStage();

    const tl = (n === 0) ? buildSegment0Timeline() : buildSegment1Timeline();
    currentTimeline = tl;
    engine.segment = n;
    engine.phase = 0;
    engine.playing = true;
    engine.pauseOffset = 0;
    engine.timelineStart = performance.now();
    playIcon.textContent = "⏸";
    engine.rafId = requestAnimationFrame(tick);
  }

  function pause() {
    if (!engine.playing) return;
    engine.playing = false;
    engine.timelinePaused = performance.now();
    playIcon.textContent = "▶";
    if (engine.rafId) cancelAnimationFrame(engine.rafId);
  }

  function resume() {
    if (engine.playing) return;
    if (!currentTimeline) { playSegment(0); return; }
    engine.playing = true;
    engine.pauseOffset += performance.now() - engine.timelinePaused;
    playIcon.textContent = "⏸";
    engine.rafId = requestAnimationFrame(tick);
  }

  function seekTo(n, phaseFraction) {
    if (n < 0 || n > 1) return;
    playSegment(n);
    const targetTime = phaseFraction * currentTimeline.duration;
    engine.timelineStart = performance.now() - targetTime * 1000;
  }

  // Events
  playBtn.addEventListener("click", () => {
    if (engine.playing) pause();
    else if (engine.resolved || !currentTimeline) playSegment(engine.segment || 0);
    else resume();
  });

  // Init
  buildScrubber();
  playIcon.textContent = "▶";
  setTimeout(() => playSegment(0), 500);

  window.kuhnEngine = { playSegment, seekTo, pause, resume };
})();
</script>
