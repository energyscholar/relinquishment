<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="600" height="280" viewBox="0 0 600 280">
  <title>Two paths from classified knowledge: direct disclosure leads to prosecution; guided deduction leads to a clean record</title>

  <!-- Arrow marker definitions -->
  <defs>
    <marker id="arrow-red" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#CC4444"/>
    </marker>
    <marker id="arrow-blue" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#2B6CB0"/>
    </marker>
  </defs>

  <!-- Origin node -->
  <rect x="20" y="110" width="120" height="50" rx="10" fill="#eee" stroke="#888" stroke-width="1.2"/>
  <text x="80" y="132" text-anchor="middle" font-family="Georgia, serif" font-size="10" fill="#333">Classified</text>
  <text x="80" y="148" text-anchor="middle" font-family="Georgia, serif" font-size="10" fill="#333">Knowledge</text>

  <!-- TOP PATH (red): Direct Disclosure → CRIME → Prosecution -->
  <line x1="140" y1="120" x2="170" y2="80" stroke="#CC4444" stroke-width="1.5" marker-end="url(#arrow-red)"/>

  <rect x="175" y="55" width="110" height="40" rx="8" fill="#fff0f0" stroke="#CC4444" stroke-width="1.2"/>
  <text x="230" y="79" text-anchor="middle" font-family="Georgia, serif" font-size="10" fill="#CC4444">Direct Disclosure</text>

  <line x1="285" y1="75" x2="320" y2="75" stroke="#CC4444" stroke-width="1.5" marker-end="url(#arrow-red)"/>

  <rect x="325" y="55" width="80" height="40" rx="8" fill="#fff0f0" stroke="#CC4444" stroke-width="1.5"/>
  <text x="365" y="80" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="#CC4444" font-weight="bold">CRIME</text>

  <line x1="405" y1="75" x2="440" y2="75" stroke="#CC4444" stroke-width="1.5" marker-end="url(#arrow-red)"/>

  <rect x="445" y="55" width="110" height="40" rx="8" fill="#fff0f0" stroke="#CC4444" stroke-width="1.2"/>
  <text x="500" y="79" text-anchor="middle" font-family="Georgia, serif" font-size="10" fill="#CC4444">Prosecution</text>

  <!-- BOTTOM PATH (blue): Guided Deduction → Published Domains → Student Deduces → Clean Record -->
  <line x1="140" y1="150" x2="170" y2="190" stroke="#2B6CB0" stroke-width="1.5" marker-end="url(#arrow-blue)"/>

  <rect x="175" y="175" width="110" height="40" rx="8" fill="#f0f4ff" stroke="#2B6CB0" stroke-width="1.2"/>
  <text x="230" y="192" text-anchor="middle" font-family="Georgia, serif" font-size="10" fill="#2B6CB0">Guided</text>
  <text x="230" y="206" text-anchor="middle" font-family="Georgia, serif" font-size="10" fill="#2B6CB0">Deduction</text>

  <line x1="285" y1="195" x2="310" y2="195" stroke="#2B6CB0" stroke-width="1.5" marker-end="url(#arrow-blue)"/>

  <rect x="315" y="175" width="100" height="40" rx="8" fill="#f0f4ff" stroke="#2B6CB0" stroke-width="1.2"/>
  <text x="365" y="192" text-anchor="middle" font-family="Georgia, serif" font-size="10" fill="#2B6CB0">Published</text>
  <text x="365" y="206" text-anchor="middle" font-family="Georgia, serif" font-size="10" fill="#2B6CB0">Domains</text>

  <line x1="415" y1="195" x2="440" y2="195" stroke="#2B6CB0" stroke-width="1.5" marker-end="url(#arrow-blue)"/>

  <rect x="445" y="175" width="100" height="40" rx="8" fill="#f0f4ff" stroke="#2B6CB0" stroke-width="1.2"/>
  <text x="495" y="192" text-anchor="middle" font-family="Georgia, serif" font-size="10" fill="#2B6CB0">Student</text>
  <text x="495" y="206" text-anchor="middle" font-family="Georgia, serif" font-size="10" fill="#2B6CB0">Deduces</text>

  <line x1="545" y1="195" x2="555" y2="195" stroke="#2B6CB0" stroke-width="1.5" marker-end="url(#arrow-blue)"/>

  <rect x="445" y="235" width="110" height="40" rx="8" fill="#e8f0ff" stroke="#2B6CB0" stroke-width="1.5"/>
  <text x="500" y="260" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="#2B6CB0" font-weight="bold">Clean Record</text>

  <line x1="495" y1="215" x2="500" y2="235" stroke="#2B6CB0" stroke-width="1.5" marker-end="url(#arrow-blue)"/>
</svg>
