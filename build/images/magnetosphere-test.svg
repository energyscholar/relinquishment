<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 440 260" width="440" height="260">
  <defs>
    <radialGradient id="earth" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#4a90d9"/>
      <stop offset="70%" stop-color="#2c5f8a"/>
      <stop offset="100%" stop-color="#1a3d5c"/>
    </radialGradient>
    <linearGradient id="plasma" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#c4a0e0" stop-opacity="0.7"/>
      <stop offset="30%" stop-color="#9b7db8" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#9b7db8" stop-opacity="0.08"/>
    </linearGradient>
    <linearGradient id="plasmaEdge" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#c4a0e0" stop-opacity="0"/>
      <stop offset="45%" stop-color="#c4a0e0" stop-opacity="0.25"/>
      <stop offset="55%" stop-color="#c4a0e0" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#c4a0e0" stop-opacity="0"/>
    </linearGradient>
    <marker id="solarArrow" viewBox="0 0 8 6" refX="7" refY="3" markerWidth="6" markerHeight="5" orient="auto">
      <path d="M 0,0.5 L 7,3 L 0,5.5" fill="#f0c040" opacity="0.5"/>
    </marker>
  </defs>

  <!-- Background — deep space -->
  <rect width="440" height="260" fill="#060612"/>

  <!-- Solar wind arrows -->
  <g stroke="#f0c040" stroke-width="1" fill="none" marker-end="url(#solarArrow)">
    <line x1="5" y1="35" x2="55" y2="45" opacity="0.3"/>
    <line x1="5" y1="70" x2="60" y2="78" opacity="0.35"/>
    <line x1="5" y1="105" x2="65" y2="108" opacity="0.4"/>
    <line x1="5" y1="130" x2="68" y2="130" opacity="0.45"/>
    <line x1="5" y1="155" x2="65" y2="152" opacity="0.4"/>
    <line x1="5" y1="190" x2="60" y2="182" opacity="0.35"/>
    <line x1="5" y1="225" x2="55" y2="215" opacity="0.3"/>
  </g>
  <text x="8" y="25" fill="#f0c040" font-size="9" font-family="sans-serif" opacity="0.6">Solar wind</text>

  <!-- Magnetopause boundary -->
  <path d="M 100,12 Q 82,130 100,248
           Q 160,230 250,210 L 435,175
           L 435,85
           L 250,50 Q 160,30 100,12 Z"
        fill="none" stroke="#6a9fb5" stroke-width="0.8" stroke-opacity="0.3" stroke-dasharray="6,4"/>

  <!-- Magnetosheath (faint fill between bow shock and magnetopause) -->
  <path d="M 100,12 Q 82,130 100,248 Q 160,230 250,210 L 435,175 L 435,85 L 250,50 Q 160,30 100,12 Z"
        fill="#1a3050" fill-opacity="0.15"/>

  <!-- Closed dayside field lines (dipole, compressed) -->
  <g stroke="#4a90d9" stroke-width="0.9" fill="none" opacity="0.5">
    <!-- Tight inner loops -->
    <path d="M 130,118 Q 118,95 122,75 Q 126,60 135,55"/>
    <path d="M 130,142 Q 118,165 122,185 Q 126,200 135,205"/>
    <!-- Medium loops -->
    <path d="M 128,112 Q 108,80 112,48 Q 118,28 132,22"/>
    <path d="M 128,148 Q 108,180 112,212 Q 118,232 132,238"/>
    <!-- Wide loops -->
    <path d="M 126,108 Q 98,65 105,30 Q 112,14 128,10"/>
    <path d="M 126,152 Q 98,195 105,230 Q 112,246 128,250"/>
  </g>

  <!-- Open tail field lines (stretched nightward) -->
  <g stroke="#4a90d9" stroke-width="0.7" fill="none" opacity="0.45">
    <!-- Northern lobe -->
    <path d="M 140,108 Q 180,85 260,68 Q 340,56 435,52"/>
    <path d="M 142,104 Q 190,78 280,62 Q 360,50 435,44"/>
    <path d="M 145,100 Q 200,70 290,55 Q 370,42 435,36"/>
    <path d="M 148,96 Q 210,62 300,48 Q 375,35 435,28"/>
    <!-- Southern lobe -->
    <path d="M 140,152 Q 180,175 260,192 Q 340,204 435,208"/>
    <path d="M 142,156 Q 190,182 280,198 Q 360,210 435,216"/>
    <path d="M 145,160 Q 200,190 290,205 Q 370,218 435,224"/>
    <path d="M 148,164 Q 210,198 300,212 Q 375,225 435,232"/>
  </g>

  <!-- Plasma sheet — THE FLAT — glowing band at magnetic equator -->
  <path d="M 155,125 Q 220,122 320,126 Q 380,128 435,130
           L 435,132
           Q 380,134 320,136 Q 220,140 155,137 Z"
        fill="url(#plasma)" stroke="#9b7db8" stroke-width="1.2" stroke-opacity="0.7"/>
  <!-- Glow effect around plasma sheet -->
  <path d="M 155,118 Q 220,114 320,120 Q 380,122 435,125
           L 435,137
           Q 380,140 320,142 Q 220,148 155,144 Z"
        fill="url(#plasmaEdge)" stroke="none"/>

  <!-- Neutral point / reconnection hint -->
  <circle cx="155" cy="131" r="2" fill="#c4a0e0" opacity="0.6"/>

  <!-- Earth -->
  <circle cx="135" cy="130" r="14" fill="url(#earth)" stroke="#6ab0e8" stroke-width="0.6"/>
  <!-- Polar caps (tiny) -->
  <ellipse cx="135" cy="119" rx="6" ry="2" fill="#cce8ff" opacity="0.3"/>
  <ellipse cx="135" cy="141" rx="6" ry="2" fill="#cce8ff" opacity="0.3"/>

  <!-- Bow shock -->
  <path d="M 80,8 Q 62,130 80,252" fill="none" stroke="#f0c040" stroke-width="1" stroke-dasharray="4,3" opacity="0.4"/>

  <!-- Labels -->
  <text x="135" y="158" fill="#6ab0e8" font-size="8" font-family="sans-serif" text-anchor="middle" opacity="0.8">Earth</text>
  <text x="52" y="248" fill="#f0c040" font-size="7" font-family="sans-serif" opacity="0.4">Bow shock</text>
  <text x="280" y="119" fill="#c4a0e0" font-size="8" font-family="sans-serif" opacity="0.8">Plasma sheet (2DEG)</text>
  <text x="340" y="148" fill="#9b7db8" font-size="11" font-family="sans-serif" font-weight="bold" opacity="0.9">The Flat</text>
  <text x="400" y="90" fill="#4a90d9" font-size="7" font-family="sans-serif" opacity="0.4" text-anchor="end">Northern lobe</text>
  <text x="400" y="180" fill="#4a90d9" font-size="7" font-family="sans-serif" opacity="0.4" text-anchor="end">Southern lobe</text>

  <!-- Scale bar -->
  <line x1="280" y1="235" x2="380" y2="235" stroke="#ffffff" stroke-width="0.5" opacity="0.25"/>
  <line x1="280" y1="232" x2="280" y2="238" stroke="#ffffff" stroke-width="0.5" opacity="0.25"/>
  <line x1="380" y1="232" x2="380" y2="238" stroke="#ffffff" stroke-width="0.5" opacity="0.25"/>
  <text x="330" y="248" fill="#ffffff" font-size="7" font-family="sans-serif" opacity="0.25" text-anchor="middle">~50 Earth radii</text>
</svg>
