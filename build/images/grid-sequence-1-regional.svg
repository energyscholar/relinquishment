<svg xmlns="http://www.w3.org/2000/svg" width="400" height="300" viewBox="0 0 400 300">
  <title>The European ENTSO-E electrical grid spans from Portugal to Turkey, serving 530 million people across 36 countries. Shown as a colored overlay on a simplified map of Europe.</title>
  <rect width="400" height="300" fill="#1a2a3a"/>

  <!-- Simplified European continent outline -->
  <path d="M 80,40 L 120,35 L 150,30 L 190,35 L 230,25 L 270,30 L 310,40
           L 330,55 L 340,80 L 335,100 L 340,120 L 330,140 L 310,150
           L 290,155 L 280,170 L 260,180 L 240,175 L 220,185 L 200,190
           L 180,200 L 160,210 L 140,205 L 130,220 L 120,240 L 110,250
           L 95,245 L 85,230 L 80,210 L 75,190 L 70,170 L 65,150
           L 60,130 L 55,110 L 60,90 L 65,70 L 70,55 Z"
        fill="#2a3a4a" stroke="#445" stroke-width="0.5"/>

  <!-- UK/Ireland -->
  <path d="M 85,60 L 95,55 L 105,60 L 110,75 L 105,90 L 95,95 L 85,85 L 80,70 Z"
        fill="#2a3a4a" stroke="#445" stroke-width="0.5"/>
  <ellipse cx="70" cy="75" rx="12" ry="15" fill="#2a3a4a" stroke="#445" stroke-width="0.5"/>

  <!-- Scandinavia -->
  <path d="M 190,15 L 200,10 L 215,15 L 210,45 L 205,70 L 195,55 L 190,35 Z"
        fill="#2a3a4a" stroke="#445" stroke-width="0.5"/>

  <!-- Grid coverage overlay - glowing -->
  <path d="M 80,40 L 120,35 L 150,30 L 190,35 L 230,25 L 270,30 L 310,40
           L 330,55 L 340,80 L 335,100 L 340,120 L 330,140 L 310,150
           L 290,155 L 280,170 L 260,180 L 240,175 L 220,185 L 200,190
           L 180,200 L 160,210 L 140,205 L 130,220 L 120,240 L 110,250
           L 95,245 L 85,230 L 80,210 L 75,190 L 70,170 L 65,150
           L 60,130 L 55,110 L 60,90 L 65,70 L 70,55 Z"
        fill="#f4a82080" stroke="#f4a820" stroke-width="1"/>
  <path d="M 85,60 L 95,55 L 105,60 L 110,75 L 105,90 L 95,95 L 85,85 L 80,70 Z"
        fill="#f4a82080" stroke="#f4a820" stroke-width="1"/>
  <path d="M 190,15 L 200,10 L 215,15 L 210,45 L 205,70 L 195,55 L 190,35 Z"
        fill="#f4a82080" stroke="#f4a820" stroke-width="1"/>

  <!-- Grid lines (transmission network, schematic) -->
  <g stroke="#f4a820" stroke-width="0.5" opacity="0.6">
    <line x1="90" y1="80" x2="130" y2="70"/>
    <line x1="130" y1="70" x2="170" y2="65"/>
    <line x1="170" y1="65" x2="210" y2="55"/>
    <line x1="210" y1="55" x2="250" y2="60"/>
    <line x1="250" y1="60" x2="290" y2="70"/>
    <line x1="290" y1="70" x2="320" y2="90"/>
    <line x1="170" y1="65" x2="180" y2="100"/>
    <line x1="180" y1="100" x2="200" y2="130"/>
    <line x1="200" y1="130" x2="170" y2="160"/>
    <line x1="130" y1="70" x2="120" y2="110"/>
    <line x1="120" y1="110" x2="140" y2="150"/>
    <line x1="140" y1="150" x2="120" y2="190"/>
    <line x1="250" y1="60" x2="240" y2="100"/>
    <line x1="240" y1="100" x2="260" y2="140"/>
    <line x1="200" y1="40" x2="195" y2="55"/>
  </g>

  <!-- Grid nodes -->
  <g fill="#f4a820">
    <circle cx="90" cy="80" r="2"/>
    <circle cx="130" cy="70" r="2"/>
    <circle cx="170" cy="65" r="2.5"/>
    <circle cx="210" cy="55" r="2"/>
    <circle cx="250" cy="60" r="2.5"/>
    <circle cx="290" cy="70" r="2"/>
    <circle cx="320" cy="90" r="2"/>
    <circle cx="180" cy="100" r="2"/>
    <circle cx="200" cy="130" r="2.5"/>
    <circle cx="120" cy="110" r="2"/>
    <circle cx="140" cy="150" r="2"/>
    <circle cx="240" cy="100" r="2"/>
    <circle cx="260" cy="140" r="2"/>
  </g>

  <!-- Labels -->
  <text x="200" y="275" text-anchor="middle" font-size="12" fill="#f4a820" font-family="serif" font-weight="bold">ENTSO-E Grid</text>
  <text x="200" y="292" text-anchor="middle" font-size="9" fill="#888" font-family="serif">36 countries &middot; 530 million people &middot; 380,000 km of transmission lines</text>

  <!-- Ocean labels -->
  <text x="30" y="160" font-size="8" fill="#334" font-family="serif" font-style="italic">Atlantic</text>
</svg>
