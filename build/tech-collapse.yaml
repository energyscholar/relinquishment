# Collapsible Technical Sections — Plan 0219
# Sections marked for DEFAULT HIDE in HTML output.
# GA readers see collapsed title + tooltip summary.
# Physicists/specialists click to expand.
# PDF renders normally (no collapse).
#
# Status: pending = identified, not yet tooltip-drafted
#         drafted = tooltip written, awaiting approval
#         approved = ready for implementation
#         live = implemented and deployed

sections:

  # ── THE BRAID ──────────────────────────────────────────────────────

  - title: "The Particles"
    spine_file: manuscript/spine/the-braid.tex
    spine_label: "spine:braid-the-particles"
    bridge_file: null
    bridge_label: null
    assessment: GA-AVERSE
    tooltip: "The particles that make braiding-as-computation work are exotic — they only exist in flat, two-dimensional systems, and they remember the exact path they took when swapped. Three Nobel Prizes confirm they're real."
    conclusion: "Non-abelian anyons — quasiparticles in two-dimensional electron gases — remember the topology of their exchange paths. The braid encodes the computation."
    status: approved

  - title: "Hasslacher's Trajectory"
    spine_file: manuscript/spine/the-braid.tex
    spine_label: "spine:braid-hasslachers-trajectory"
    bridge_file: manuscript/bridge/pos10-the-braid.tex
    bridge_label: "pos10:hasslachers-trajectory"
    assessment: GA-AVERSE
    tooltip: "One physicist's published papers — spanning a decade at Los Alamos — contain all the mathematical pieces needed for topological quantum computing. Each was ordinary science; the pattern connecting them only becomes visible in hindsight."
    conclusion: "Hasslacher's published work maps precisely to the mathematical infrastructure needed for topological quantum computation."
    status: approved

  - title: "Hasslacher's Lattice"
    spine_file: manuscript/spine/the-braid.tex
    spine_label: "spine:braid-hasslacher-lattice"
    bridge_file: null  # pos10 has "But What Is a Soliton?" instead
    bridge_label: null
    assessment: GA-AVERSE
    tooltip: "How does a quantum system communicate with ordinary electronics? Through phonons — coordinated vibrations in a crystal lattice that act as translators between the quantum world and classical signals."
    conclusion: "Discrete lattice structures produce collective wave behavior via phonons — the bridge between quantum substrate and classical electronics."
    status: approved

  - title: "Topological Error Correction"
    spine_file: manuscript/spine/the-braid.tex
    spine_label: "spine:braid-topological-error-correction"
    bridge_file: manuscript/bridge/pos10-the-braid.tex
    bridge_label: "pos10:topological-error-correction"
    assessment: GA-AVERSE
    tooltip: "Topology protects quantum information the way a knot holds its shape — small disturbances don't undo it. Combined with a classical feedback channel, this protection is what makes room-temperature quantum computing physically possible."
    conclusion: "Topology gives passive protection against errors; active error correction via classical backchannel buys reliability. Room-temperature operation is physically possible."
    status: approved

  - title: "Quantum Teleportation and the Classical Constraint"
    spine_file: manuscript/spine/the-braid.tex
    spine_label: "spine:braid-quantum-teleportation-and-the-classical-constraint"
    bridge_file: manuscript/bridge/pos10-the-braid.tex
    bridge_label: "pos10:quantum-teleportation-and-the-classical-constraint"
    assessment: GA-AVERSE
    tooltip: "Quantum teleportation has been demonstrated from lab benches to satellites — but every transfer requires a conventional message alongside it. This is a law of physics, not a technical limitation: no faster-than-light communication."
    conclusion: "Quantum teleportation is proven experimentally. It REQUIRES a classical backchannel — this is a theorem, not a limitation of current technology."
    status: approved

  # ── THE FLAT ───────────────────────────────────────────────────────

  - title: "The Substrate"
    spine_file: manuscript/spine/the-flat.tex
    spine_label: "spine:flat-substrate"
    bridge_file: manuscript/track-3-awakening/pos-what-is-the-flat.tex
    bridge_label: "what-is-the-flat:the-substrate"
    assessment: GA-AVERSE
    tooltip: "The physics behind this isn't exotic — two-dimensional electron layers already exist in every phone and WiFi router. Earth's magnetosphere creates the same structure naturally, at planetary scale."
    conclusion: "The 2DEG — a layer where electrons are trapped flat — is in every chip you own. The magnetosphere has the same geometry at planetary scale."
    status: approved

  - title: "The Wormhole"
    spine_file: manuscript/spine/the-flat.tex
    spine_label: "spine:flat-wormhole"
    bridge_file: manuscript/track-3-awakening/pos-what-is-the-flat.tex
    bridge_label: "what-is-the-flat:the-wormhole"
    assessment: GA-AVERSE
    tooltip: "A topological wormhole — not a hole in space, but a quantum shortcut through the Flat — lets information move between distant points. Every transfer requires a conventional signal to complete, so nothing moves faster than light."
    conclusion: "A wormhole works by braiding anyons. Information can teleport between distant points, but every transfer requires a classical message to complete. No FTL."
    status: approved

  - title: "The I/O Problem"
    spine_file: manuscript/spine/the-flat.tex
    spine_label: "spine:flat-io-problem"
    bridge_file: manuscript/track-3-awakening/pos-what-is-the-flat.tex
    bridge_label: "what-is-the-flat:the-io-problem"
    assessment: GA-AVERSE
    tooltip: "How does quantum information become a classical signal? Through phonons — lattice vibrations native to the substrate that bridge quantum state to electronics and electronics to radiation. No conversion is engineered; the physics provides it."
    conclusion: "Electron-phonon and phonon-photon coupling provide the quantum-to-classical interface natively in any 2DEG crystal lattice."
    status: approved

