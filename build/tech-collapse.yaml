      <p style="margin:0 0 0.5em;font-size:0.95em;line-height:1.5;"><strong>Buttons and Threads</strong> &mdash; Kauffman's illustration of autocatalytic closure</p>
      <p style="margin:0 0 0.4em;font-size:0.88em;line-height:1.4;">Scatter buttons on a floor and connect random pairs with thread. At a critical density, pulling one button lifts most of the room &mdash; not gradually, but all at once.</p>
