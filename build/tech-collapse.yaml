  - title: "But It's Hot"
    spine_file: manuscript/spine/the-wrong-substrate.tex
    spine_label: "spine:ws-but-its-hot"
    bridge_file: manuscript/track-3-awakening/pos32-the-magnetosphere.tex
    bridge_label: "pos32:but-its-hot"
    assessment: GA-AVERSE
    tooltip: "'Hot' doesn't mean 'noisy.' The kind of noise that destroys quantum states is far quieter than the temperature suggests. The thermal objection doesn't hold."
    conclusion: "'Hot' in a collisionless plasma doesn't mean 'thermally noisy.' The noise that destroys quantum states is orders of magnitude quieter than the kinetic temperature."
    status: approved

