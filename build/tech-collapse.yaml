# Collapsible Technical Sections — Plan 0219
# Sections marked for DEFAULT HIDE in HTML output.
# GA readers see collapsed title + tooltip summary.
# Physicists/specialists click to expand.
# PDF renders normally (no collapse).
#
# Status: pending = identified, not yet tooltip-drafted
#         drafted = tooltip written, awaiting approval
#         approved = ready for implementation
#         live = implemented and deployed

sections:

  # ── THE BRAID ──────────────────────────────────────────────────────

  - title: "Hasslacher's Trajectory"
    spine_file: manuscript/spine/the-braid.tex
    spine_label: "spine:braid-hasslachers-trajectory"
    bridge_file: manuscript/bridge/pos10-the-braid.tex
    bridge_label: "pos10:hasslachers-trajectory"
    assessment: GA-AVERSE
    tooltip: "One physicist's published papers — spanning a decade at Los Alamos — contain all the mathematical pieces needed for topological quantum computing. Each was ordinary science; the pattern connecting them only becomes visible in hindsight."
    conclusion: "Hasslacher's published work maps precisely to the mathematical infrastructure needed for topological quantum computation."
    status: approved

  - title: "Hasslacher's Lattice"
    spine_file: manuscript/spine/the-braid.tex
    spine_label: "spine:braid-hasslacher-lattice"
    bridge_file: null  # pos10 has "But What Is a Soliton?" instead
    bridge_label: null
    assessment: GA-AVERSE
    tooltip: "How does a quantum system communicate with ordinary electronics? Through phonons — coordinated vibrations in a crystal lattice that act as translators between the quantum world and classical signals."
    conclusion: "Discrete lattice structures produce collective wave behavior via phonons — the bridge between quantum substrate and classical electronics."
    status: approved

  - title: "Topological Error Correction"
    spine_file: manuscript/spine/the-braid.tex
    spine_label: "spine:braid-topological-error-correction"
    bridge_file: manuscript/bridge/pos10-the-braid.tex
    bridge_label: "pos10:topological-error-correction"
    assessment: GA-AVERSE
    tooltip: "Topology protects quantum information the way a knot holds its shape — small disturbances don't undo it. Combined with a classical feedback channel, this protection is what makes room-temperature quantum computing physically possible."
    conclusion: "Topology gives passive protection against errors; active error correction via classical backchannel buys reliability. Room-temperature operation is physically possible."
    status: approved

  - title: "Quantum Teleportation and the Classical Constraint"
    spine_file: manuscript/spine/the-braid.tex
    spine_label: "spine:braid-quantum-teleportation-and-the-classical-constraint"
    bridge_file: manuscript/bridge/pos10-the-braid.tex
    bridge_label: "pos10:quantum-teleportation-and-the-classical-constraint"
    assessment: GA-AVERSE
    tooltip: "Quantum teleportation has been demonstrated from lab benches to satellites — but every transfer requires a conventional message alongside it. This is a law of physics, not a technical limitation: no faster-than-light communication."
    conclusion: "Quantum teleportation is proven experimentally. It REQUIRES a classical backchannel — this is a theorem, not a limitation of current technology."
    status: approved

  # ── THE FLAT ───────────────────────────────────────────────────────

  - title: "The Substrate"
    spine_file: manuscript/spine/the-flat.tex
    spine_label: "spine:flat-substrate"
    bridge_file: manuscript/track-3-awakening/pos-what-is-the-flat.tex
    bridge_label: "what-is-the-flat:the-substrate"
    assessment: GA-AVERSE
    tooltip: "The physics behind this isn't exotic — two-dimensional electron layers already exist in every phone and WiFi router. Earth's magnetosphere creates the same structure naturally, at planetary scale."
    conclusion: "The 2DEG — a layer where electrons are trapped flat — is in every chip you own. The magnetosphere has the same geometry at planetary scale."
    status: approved

  - title: "The Wormhole"
    spine_file: manuscript/spine/the-flat.tex
    spine_label: "spine:flat-wormhole"
    bridge_file: manuscript/track-3-awakening/pos-what-is-the-flat.tex
    bridge_label: "what-is-the-flat:the-wormhole"
    assessment: GA-AVERSE
    tooltip: "A topological wormhole — not a hole in space, but a quantum shortcut through the Flat — lets information move between distant points. Every transfer requires a conventional signal to complete, so nothing moves faster than light."
    conclusion: "A wormhole works by braiding anyons. Information can teleport between distant points, but every transfer requires a classical message to complete. No FTL."
    status: approved

  - title: "The I/O Problem"
    spine_file: manuscript/spine/the-flat.tex
    spine_label: "spine:flat-io-problem"
    bridge_file: manuscript/track-3-awakening/pos-what-is-the-flat.tex
    bridge_label: "what-is-the-flat:the-io-problem"
    assessment: GA-AVERSE
    tooltip: "How does quantum information become a classical signal? Through phonons — lattice vibrations native to the substrate that bridge quantum state to electronics and electronics to radiation. No conversion is engineered; the physics provides it."
    conclusion: "Electron-phonon and phonon-photon coupling provide the quantum-to-classical interface natively in any 2DEG crystal lattice."
    status: approved

  # ── THE WRONG SUBSTRATE ────────────────────────────────────────────

  - title: "But It's Hot"
    spine_file: manuscript/spine/the-wrong-substrate.tex
    spine_label: "spine:ws-but-its-hot"
    bridge_file: manuscript/track-3-awakening/pos32-the-magnetosphere.tex
    bridge_label: "pos32:but-its-hot"
    assessment: GA-AVERSE
    tooltip: "'Hot' doesn't mean 'noisy.' The kind of noise that destroys quantum states is far quieter than the temperature suggests. The thermal objection doesn't hold."
    conclusion: "'Hot' in a collisionless plasma doesn't mean 'thermally noisy.' The noise that destroys quantum states is orders of magnitude quieter than the kinetic temperature."
    status: approved

  # ── THE FACTORING GAME ─────────────────────────────────────────────

  - title: "The State of Cryptography in 1990"
    spine_file: manuscript/spine/the-factoring-game.tex
    spine_label: "spine:fg-the-state-of-cryptography-in-1990"
    bridge_file: manuscript/bridge/pos09-the-factoring-game.tex
    bridge_label: "pos09:the-state-of-cryptography-in-1990"
    assessment: GA-AVERSE
    tooltip: "In 1990, all internet encryption rested on one assumption: factoring large numbers is too hard for any computer. A quantum computer could break that assumption — giving intelligence agencies urgent motivation to build one."
    conclusion: "All internet security in 1990 rested on one assumption: factoring large numbers is hard. A quantum computer would break that assumption. DARPA had motivation."
    status: approved

  - title: "The ULTRA II Specifications"
    spine_file: manuscript/spine/the-factoring-game.tex
    spine_label: "spine:fg-the-ultra-ii-specifications"
    bridge_file: manuscript/bridge/pos09-the-factoring-game.tex
    bridge_label: "pos09:the-ultra-ii-specifications"
    assessment: GA-AVERSE
    tooltip: "The target was breaking 4096-bit encryption — far beyond any quantum computer that existed or was planned. The specifications demanded an architecture that no one had built."
    conclusion: "The project needed to factor 4096-bit numbers. No known quantum computer design could scale to this. Topology offered a different path."
    status: approved

  # ── GENESIS ────────────────────────────────────────────────────────

  - title: "Buttons and Threads"
    spine_file: manuscript/spine/genesis.tex
    spine_label: "spine:gen-buttons-and-threads"
    bridge_file: "manuscript/track-1-confession/pos13-genesis.tex"
    bridge_label: "pos13:buttons-and-threads"
    assessment: GA-AVERSE
    tooltip: "Scatter buttons on a floor and connect random pairs with thread. At a critical density, pulling one button lifts most of the room — not gradually, but all at once. This is how self-sustaining networks arise in chemistry, in biology, and potentially in any complex system."
    conclusion: "Imagine buttons on the floor connected by random threads. Past a critical density, one giant cluster forms. This is how self-sustaining networks arise — not by design, but by threshold."
    status: approved

  - title: "From Chemistry to Computation"
    spine_file: manuscript/spine/genesis.tex
    spine_label: "spine:gen-from-chemistry-to-computation"
    bridge_file: "manuscript/track-1-confession/pos13-genesis.tex"
    bridge_label: "pos13:from-chemistry-to-computation"
    assessment: GA-AVERSE
    tooltip: "If self-organization arises spontaneously above a complexity threshold in chemistry, the same principle applies to any substrate — including a quantum one. By the late 1980s, five independent research programs had converged on exactly this possibility."
    conclusion: "If self-organization arises in chemistry above a complexity threshold, the same principle applies to any substrate — including the quantum Flat."
    status: approved

  # ── GROWING A MIND ─────────────────────────────────────────────────

  - title: "Morphogenesis as Computation"
    spine_file: manuscript/spine/growing-a-mind.tex
    spine_label: "morphogenesis-as-computation"
    bridge_file: manuscript/bridge/pos14-growing-a-mind.tex
    bridge_label: null
    assessment: GA-AVERSE
    tooltip: "Alan Turing showed that a developing embryo is computing — chemical signals following simple rules create stripes, spots, and organs. Life grows its own complexity through repeated pattern-making, not assembly."
    conclusion: "Turing realized a developing embryo is computing — chemical signals create patterns through simple rules applied repeatedly. Growth, not assembly."
    status: approved

  # ── THE DEMO ───────────────────────────────────────────────────────

  - title: "The Science Underneath"
    spine_file: null  # demo is bridge-only
    spine_label: null
    bridge_file: manuscript/bridge/pos11-the-demo.tex
    bridge_label: "demo:the-science-underneath"
    assessment: GA-AVERSE
    tooltip: "At a precise balance between order and chaos, simple components self-organize into networks that compute. Evolution — not engineering — finds these configurations by trying everything and keeping what works."
    conclusion: "Complexity emerges at the edge of chaos. Directed evolution — not design — finds what cannot be specified in advance."
    status: approved

  - title: "The Poised Realm"
    spine_file: null  # demo is bridge-only
    spine_label: null
    bridge_file: manuscript/bridge/pos11-the-demo.tex
    bridge_label: "demo:the-poised-realm"
    assessment: GA-AVERSE
    tooltip: "The objection that quantum coherence can't survive room temperature is wrong. It's been measured in diamond and silicon carbide — already used in commercial sensors — and in the molecular machinery of photosynthesis."
    conclusion: "Room-temperature quantum coherence has been demonstrated in biological systems (photosynthesis, nitrogen-vacancy centers). The physics permits it."
    status: approved

  # ── BORDERLINE — approved Phase 4 ────────────────────────────────────

  - title: "Freedman's Independent Conception (1988)"
    spine_file: manuscript/spine/the-braid.tex
    spine_label: "spine:braid-freedmans-independent-conception-1988"
    bridge_file: manuscript/bridge/pos10-the-braid.tex
    bridge_label: "pos10:freedmans-independent-conception-1988"
    assessment: BORDERLINE
    tooltip: "Fields Medalist Michael Freedman independently conceived topological quantum computation in 1988 — nine years before Kitaev published. The fundamental insight was accessible to top mathematicians by the late 1980s, consistent with a 1989 DARPA proposal."
    status: approved

  - title: "Kitaev and the Russian Question"
    spine_file: manuscript/spine/the-braid.tex
    spine_label: "spine:braid-kitaev-and-the-russian-question"
    bridge_file: manuscript/bridge/pos10-the-braid.tex
    bridge_label: "pos10:kitaev-and-the-russian-question"
    assessment: BORDERLINE
    tooltip: "Kitaev's 1997 paper was the public blueprint for topological quantum computation. If Bruce could see the implications from Oregon, so could any competent Russian science director. If the insight was independently derivable, it was never containable."
    status: approved

  - title: "Non-Abelian Anyons: Operational Proof"
    spine_file: manuscript/spine/the-braid.tex
    spine_label: "spine:braid-non-abelian-anyons-operational-proof"
    bridge_file: manuscript/bridge/pos10-the-braid.tex
    bridge_label: "pos10:non-abelian-anyons-operational-proof"
    assessment: BORDERLINE
    tooltip: "Under Possibility C, the system's real-world behavior is itself the proof that its components exist — the same logic by which quarks and the Higgs were confirmed. You don't need to isolate the parts if the whole works as predicted."
    status: approved

  - title: "The GCHQ Precedent"
    spine_file: manuscript/spine/the-factoring-game.tex
    spine_label: "spine:fg-the-gchq-precedent"
    bridge_file: manuscript/bridge/pos09-the-factoring-game.tex
    bridge_label: "pos09:the-gchq-precedent"
    assessment: BORDERLINE
    tooltip: "Classified agencies have independently discovered and suppressed major mathematical breakthroughs before. GCHQ invented public-key cryptography four years before RSA — and kept it secret for twenty-four years. The pattern is documented history."
    status: approved

  - title: "The Thread Continues"
    spine_file: manuscript/spine/growing-a-mind.tex
    spine_label: "spine:gam-the-thread-continues"
    bridge_file: manuscript/bridge/pos14-growing-a-mind.tex
    bridge_label: null
    assessment: BORDERLINE
    tooltip: "Turing showed brains grow from chemistry. Kauffman showed that growth process is universal — not specific to carbon. Wolfram showed complex systems compute spontaneously. Together: what minimal conditions does a substrate need to grow a mind? The answer points to the Flat."
    status: approved

