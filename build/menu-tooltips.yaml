  "afterword-the-engine":
    text: "The engine that drives the book — how and why it was structured this way."
    filter-group: M
  "app:timeline":
    text: "Events from 1873 through 2026. Chronological backbone of the story and the science."
    epistemic: B
    filter-group: M
  "app:sources":
    text: "Every source cited, with DOIs where available."
    filter-group: M
  "topic-guide":
    text: "Find what you need by subject — physics, people, events, and arguments indexed by topic."
    filter-group: M
  "corrections-and-concessions":
    text: "What Bruce got wrong, what he changed his mind about, and what he still isn't sure of. Honest accounting."
    filter-group: M
