parts:
  "Front Matter": "Start here. Something may have grown — not been built — inside a quantum layer that exists in every chip and wraps every planet. Five scientific fields had to converge before anyone could ask the question. Nobody has."
  "The Flat": "Published physics, true under all three possibilities. Every chip has a flat world that supports quantum teleportation. Every planet with a magnetic field has one at planetary scale. Five fields are needed to ask whether anything lives there. No journal covers all five. Nobody asked."
  "The Record": "One man's account of meeting someone — or something — that shouldn't exist. Capabilities observed. A secret kept for twenty years. Testimony, not proof. The reader decides."
  "Appendices": "The physics that makes AI wrong about this book. Testable predictions with deadlines. If they fail, you have your answer."
