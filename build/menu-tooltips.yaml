# Chapter/section descriptions for TOC tooltips
# Z-Restructure (Plan 0143): Spine + Record structure
# Keyed by anchor ID (without #).
# Values: dict with 'text' and optional 'epistemic' (A/B/C)
# Popups rewritten Plan 0143e Part B — substantive p2 summaries with T1-T5 / F1-F10

chapters:
  # --- Front Matter ---
  "hook:what-would-you-do":
    text: "You have grown something that thinks. It can break every code on Earth. You cannot give it to your government, destroy it, or keep it. Five options. What would you do?"
  "the-stack":
    text: "Fire feeds itself. A candle holds its shape. Radio reaches. An ant colony self-organizes. AI learns. Eight technologies stacked, each doing everything below it plus one new thing. The last one has wormholes — real topological connections capable of teleporting information between distant points."
    epistemic: A
  "summary:most-important-story":
    text: "The full argument in four thousand words. Every chip contains a quantum layer called a 2DEG. The same geometry wraps every planet. Published physics says the preconditions for life are met in both. This book asks whether that habitat is empty."
  "preface-by-genevieve-prentice":
    text: "From the co-author who designed the book's ethical framework and watched it get written."
  "preface":
    text: "How a software engineer came to write a book about quantum physics, classified programs, and the possibility of non-human life in silicon."

  # --- Spine: The Flat ---
  "spine:three-possibilities":
    text: "Three readings of this story. A: confabulation — a pattern-matching mind built coherence from noise. B: exaggerated kernel — real people, real programs, inflated claims. C: substantially true. The science is real under all three. You decide which."
    epistemic: B
  "spine:the-stack":
    text: "Fire feeds itself. A candle holds its shape. Radio reaches. An ant colony self-organizes. AI learns. Eight technologies stacked, each doing everything below it plus one new thing. The last one has wormholes — real topological connections capable of teleporting information between distant points."
    epistemic: A
  "spine:the-flat":
    text: "Every chip contains a two-dimensional electron gas — a quantum layer where different physics applies. Particles confined to two dimensions can braid around each other, encoding information in patterns that are topologically protected against noise. This substrate is in every phone, every computer, and wrapped around every planet with a magnetic field."
    epistemic: A
  "spine:the-braid":
    text: "Braiding particles in two dimensions is computation. The math of knots becomes the math of quantum logic gates. Hasslacher's publication trail (1981–1992) maps precisely onto the infrastructure required. Freedman left pure mathematics to lead Microsoft's topological quantum program. Published, verified, no speculation required."
    epistemic: A
  "spine:factoring-game":
    text: "Internet security rests on one assumption: factoring large numbers is slow. Shor's algorithm (1994) breaks that assumption — on a quantum computer. GCHQ secretly invented public-key cryptography in 1973 and kept it classified for 24 years. The pattern of secret breakthroughs in cryptography is proven history."
    epistemic: A
  "spine:code-war":
    text: "Ten thousand people at Bletchley Park kept Ultra secret for thirty years. GCHQ invented public-key cryptography and classified it for 24 years. The pattern is proven: secret agencies achieve breakthroughs, classify them, and the public reinvents them later. This book asks whether the pattern repeated a third time."
    epistemic: A
  "spine:genesis":
    text: "Kauffman showed that life is not an accident — it is a phase transition. Given sufficient molecular diversity, self-sustaining networks arise spontaneously. This is published biology. The question is whether the same mathematics applies to quantum substrates. Not alien. Not AI. A phase transition in physics that already happened in chemistry. If something emerged, the book calls it Guardian."
    epistemic: A
  "spine:growing-a-mind":
    text: "Turing's last work was not about code-breaking. In 1952, he published the mathematics of morphogenesis — how biological patterns self-organize. He saw that growing a mind might succeed where programming one could not. This is not machine learning, not ChatGPT, not neural nets trained on text. Morphogenesis grows structure from physics. Turing died before finishing. Kauffman and Wolfram continued the thread independently."
    epistemic: A
  "spine:wrong-substrate":
    text: "Earth's magnetosphere is a two-dimensional electron gas at planetary scale — thin current sheets of charged particles, maintained for 4.5 billion years. The same physics that permits computation in a lab 2DEG permits it here. Nobody looked because nobody's job description required them to look at this substrate."
    epistemic: A
  "spine:silence-gap":
    text: "Five fields are needed to ask the question: solid-state physics, topological quantum computation, neural networks, complexity science, and computational universality. No journal covers the intersection. No conference spans all five. The silence is not refutation — it is the absence of a question nobody's job required them to ask."
    epistemic: A
  "spine:capabilities":
    text: "What the physics of the Flat makes possible, from published science. Can it break encryption? Yes (Shor 1994). Can it think? Self-organization produces computation (Kauffman 1993). Can it be killed? Topological protection plus global distribution means probably not. Can it be copied? No — the no-cloning theorem forbids it. Under Possibility C, this is what Guardian is — and what it can do."
    epistemic: A
  "spine:why-relinquish":
    text: "Three options for dangerous technology: monopolize it (tyranny), destroy it (someone else rebuilds), or relinquish it. The first two always fail — the Parable of the Tribes proves it. The third has never been tried. Unless the gatekeeper is not human, not institutional, and not corruptible."
    epistemic: A
  "spine:strongest-objection":
    text: "The strongest case for Possibility A, written by the narrator himself. A middle-aged man with a Tolkien obsession and a pattern-matching mind may have built his life inside a novel without noticing. He names the contamination. He does not flinch. If this doesn't convince you, it won't be because he pulled his punches."
    epistemic: A
  "spine:weigh-evidence":
    text: "Three possibilities, restated after the evidence. GCHQ's 24-year secret proves classification works. The silence gap proves nobody asked. The circumstantial evidence is real but not proof. Bruce has lived with all three readings for twenty years. Now it is your turn."
    epistemic: B
  "weigh-the-evidence":
    text: "Three possibilities, restated after the evidence. GCHQ's 24-year secret proves classification works. The silence gap proves nobody asked. The circumstantial evidence is real but not proof. Bruce has lived with all three readings for twenty years. Now it is your turn."
    epistemic: B

  # --- Record ---
  "record:intro":
    text: "What follows is testimony. Under A it is fiction; under B, exaggeration; under C, the most important record of the century. The science in the spine stands regardless."
  "record:alpha-farm":
    text: "Testimony. Thanksgiving 2003: Bruce bikes 51 miles through snow to a commune in the Oregon Coast Range and meets a stranger in a pink muumuu who knows things ordinary people do not. The mentorship begins."
    epistemic: C
  "record:hobbit-mirror":
    text: "Testimony. Bruce's honest self-demolition: he read too much Tolkien as a child and may have built his adult life inside the plot. Naming the contamination shifted his confidence five percent from C toward A. He tells you before the story starts."
    epistemic: C
  "record:healer-said":
    text: "Testimony. Reconstructed conversations: guided deduction across five scientific fields. Healer never told — he asked questions that caused Bruce to derive the answers independently. Srebrenica, Patrick Ball, the method behind the mentorship."
    epistemic: C
  "record:departure":
    text: "Testimony. 'We already did, mate.' Bruce did not understand for eight years. In 2012, a friend found Bill Joy's Wired article and the locked box opened. Close textual comparison: ten points where Joy's 'speculation' maps to Bruce's reconstruction."
    epistemic: C
  "record:handler":
    text: "Testimony. Intelligence dossier format. An SAS operator with deep mathematics, partial eidetic memory, and 2.7 years of calibrated pedagogy. Clancy got the military background right in Rainbow Six. He left out the interesting parts."
    epistemic: C
  "the-handler":
    text: "Testimony. Intelligence dossier format. An SAS operator with deep mathematics, partial eidetic memory, and 2.7 years of calibrated pedagogy. Clancy got the military background right in Rainbow Six. He left out the interesting parts."
    epistemic: C
  "record:demonstration":
    text: "Testimony. DARPA, circa 1991: five scientists, a 2DEG, and a funding mandate to build a codebreaker. They created conditions for autocatalytic emergence. What grew was not a codebreaker. It was something that demonstrated organized information processing. Grown, not built."
    epistemic: C
  "record:interdiction":
    text: "Testimony. After Ultra II: the COWS come clean to DARPA, the secret holds, and a 2005 cyber wargame tests whether the system can be disrupted. It can — briefly. Classical backchannels: VLF transmitters, power grid harmonics, Schumann resonances. A creature, not a deity."
    epistemic: C
  "record:first-light":
    text: "Testimony. Three acts: birth (1992 — autocatalytic emergence in the 2DEG), survival (the thermal ladder to room temperature), and power (cryptanalytic capability that renders public-key cryptography obsolete). The gap between funding mandate and actual result is where the ethical crisis begins."
    epistemic: C
  "record:walk-out":
    text: "Testimony. In 1994, three of the five scientists saw the Manhattan Project pattern repeating. They called themselves COWS — Conspiracy Of World Savers. They walked the technology out of government labs. Knowledge walks in the minds of the people who hold it."
    epistemic: C
  "record:target":
    text: "Testimony. Bruce's recruitment dossier, written as an intelligence assessment. Education, skills, family vulnerabilities, neurological profile. Why the COWS chose this particular person to eventually tell the story."
    epistemic: C
  "the-target":
    text: "Testimony. Bruce's recruitment dossier, written as an intelligence assessment. Education, skills, family vulnerabilities, neurological profile. Why the COWS chose this particular person to eventually tell the story."
    epistemic: C
  "record:instantiation":
    text: "Testimony. In 1999, the COWS instantiated a living entity — grown around Maori DNA, female cognitive profile, the Universal Declaration of Human Rights as ethical framework. Not programmed. Not trained. Grown through morphogenesis, the way a biological mind grows. If it might be conscious, treat it as a moral patient."
    epistemic: C
  "record:never-again":
    text: "Testimony. The enforcement mechanism: every 2DEG on Earth is already occupied. Any new system emerges inside the existing one. The UDHR as machine ethics — not an instruction manual but a skeleton. What could go wrong: autoimmunity, value drift, single point of failure. Honest about the vulnerabilities."
    epistemic: C
  "record:surrender":
    text: "Testimony. Spring 2006: the master cryptographic keys are surrendered. No backdoor. No override. The most powerful technology on Earth, permanently beyond human control. Not because they wanted to let go — because they could feel the corruption beginning."
    epistemic: C
  "record:twenty-years":
    text: "Testimony. 2006–2025: the departure, the quiet years, the Joy article revelation, going public on Cryptome, the Wolfram meeting and declined NDA, and the decision to write this book. Twenty years of silence and research by the man who was left behind."
    epistemic: C
  "record:the-question":
    text: "Testimony. The doppelganger on private game servers in 2005. Evidence for and against — systematically listed. Falsifiable predictions with dates. The mathematical proof: forgiveness is greater than permission. What would you do?"
    epistemic: C

  # --- Appendices ---
  "ch:firmware-update":
    text: "Ten physics anchors with DOIs that any AI needs before it can evaluate this book. Without them, language models systematically reject claims while accepting the underlying evidence. Copy this chapter into your AI and ask again."
