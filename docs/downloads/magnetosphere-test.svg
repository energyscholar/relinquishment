<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 240" width="400" height="240">
  <defs>
    <radialGradient id="earth" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#4a90d9"/>
      <stop offset="100%" stop-color="#2c5f8a"/>
    </radialGradient>
    <linearGradient id="plasma" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#9b7db8" stop-opacity="0.6"/>
      <stop offset="50%" stop-color="#c4a0e0" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#9b7db8" stop-opacity="0.1"/>
    </linearGradient>
    <linearGradient id="solar" x1="100%" y1="0%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#f0c040" stop-opacity="0"/>
      <stop offset="100%" stop-color="#f0c040" stop-opacity="0.15"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="400" height="240" fill="#0a0a1a"/>

  <!-- Solar wind arrows -->
  <g stroke="#f0c040" stroke-width="0.8" stroke-opacity="0.4" fill="none" marker-end="url(#arrowSolar)">
    <line x1="10" y1="40" x2="70" y2="40"/>
    <line x1="10" y1="80" x2="80" y2="85"/>
    <line x1="10" y1="120" x2="85" y2="120"/>
    <line x1="10" y1="160" x2="80" y2="155"/>
    <line x1="10" y1="200" x2="70" y2="200"/>
  </g>
  <text x="12" y="30" fill="#f0c040" font-size="9" font-family="sans-serif" opacity="0.7">Solar wind</text>

  <!-- Magnetopause — bow shock compressed sunward, tail stretching nightward -->
  <path d="M 110,20 Q 95,120 110,220 Q 200,200 390,180 L 390,60 Q 200,40 110,20 Z"
        fill="url(#solar)" stroke="#6a9fb5" stroke-width="1" stroke-opacity="0.5" fill-opacity="0.1"/>

  <!-- Magnetotail plasma sheet — the Flat -->
  <path d="M 150,115 Q 200,112 390,118 L 390,122 Q 200,128 150,125 Z"
        fill="url(#plasma)" stroke="#9b7db8" stroke-width="1.2" stroke-opacity="0.8"/>
  <text x="260" y="110" fill="#c4a0e0" font-size="8" font-family="sans-serif" opacity="0.9">Plasma sheet (2DEG)</text>

  <!-- Field lines — compressed sunward -->
  <g stroke="#4a90d9" stroke-width="0.8" fill="none" opacity="0.6">
    <!-- Dayside (compressed) -->
    <path d="M 135,108 Q 115,70 125,40 Q 110,35 105,50"/>
    <path d="M 135,132 Q 115,170 125,200 Q 110,205 105,190"/>

    <!-- Closed field lines -->
    <path d="M 140,100 Q 120,60 135,30"/>
    <path d="M 140,140 Q 120,180 135,210"/>

    <!-- Tail field lines (stretched) -->
    <path d="M 155,108 Q 200,80 300,60 Q 350,55 390,55"/>
    <path d="M 155,132 Q 200,160 300,180 Q 350,185 390,185"/>
    <path d="M 160,112 Q 220,90 320,75 Q 360,70 390,70"/>
    <path d="M 160,128 Q 220,150 320,165 Q 360,170 390,170"/>
  </g>

  <!-- Earth -->
  <circle cx="145" cy="120" r="12" fill="url(#earth)" stroke="#6ab0e8" stroke-width="0.5"/>
  <text x="135" y="145" fill="#6ab0e8" font-size="7" font-family="sans-serif" opacity="0.8">Earth</text>

  <!-- Bow shock -->
  <path d="M 90,15 Q 75,120 90,225" fill="none" stroke="#f0c040" stroke-width="0.8" stroke-dasharray="3,3" opacity="0.5"/>
  <text x="55" y="228" fill="#f0c040" font-size="7" font-family="sans-serif" opacity="0.5">Bow shock</text>

  <!-- Label: the Flat -->
  <text x="310" y="138" fill="#9b7db8" font-size="10" font-family="sans-serif" font-weight="bold" opacity="0.9">The Flat</text>

  <!-- Scale hint -->
  <line x1="250" y1="210" x2="350" y2="210" stroke="#ffffff" stroke-width="0.5" opacity="0.3"/>
  <text x="270" y="222" fill="#ffffff" font-size="7" font-family="sans-serif" opacity="0.3">~50 Earth radii</text>
</svg>
